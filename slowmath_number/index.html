  var en=vv.find(function(x){return x.date===today;});
  if(!en) return;
  var sess=en.sessions[en.sessions.length-1];
  if(!sess) return;
  sess.total++;
  if(isCorrect) sess.correct++;
  en.totalProblems=(en.totalProblems||0)+1;
  if(isCorrect) en.totalCorrect=(en.totalCorrect||0)+1;
  localStorage.setItem(_VK,JSON.stringify(vv));
}

function _startObserving(){
  _stopObserving();
  var ql=document.getElementById('q-label');
  var sl=document.getElementById('play-score');
  if(!ql) return;
  _prevQ=1; _prevSc=0;
  _obsv=new MutationObserver(function(){
    var m=(ql.textContent||'').match(/(\d+)/);
    if(!m) return;
    var qn=parseInt(m[1]);
    if(qn>_prevQ){
      var sc=parseInt((sl?sl.textContent:'0').replace(/[^0-9]/g,''))||0;
      _recProblem(sc>_prevSc);
      _prevSc=sc; _prevQ=qn;
    }
  });
  _obsv.observe(ql,{childList:true,characterData:true,subtree:true});
}

function _stopObserving(){
  if(_obsv){_obsv.disconnect();_obsv=null;}
}

function _recVisit(){
  if(_LK&&!localStorage.getItem(_LK)) return;
  var today=new Date().toISOString().split('T')[0];
  var vv=_gv();
  if(!vv.find(function(x){return x.date===today;})){
    vv.push({date:today,sessions:[],totalProblems:0,totalCorrect:0});
    localStorage.setItem(_VK,JSON.stringify(vv));
  }
}

/* ── 탭 전환 ── */
var _ct='home';
var _cy=new Date().getFullYear(),_cm=new Date().getMonth();

window._smTab=function(tab){
  var lv=document.getElementById('login-view')||document.getElementById('loginView');
  var homeV=document.getElementById('start-view')||document.getElementById('startView')||document.getElementById('home-view');
  var loggedIn=_isLI();
  ['home','records','series','my'].forEach(function(t){
    var b=document.getElementById('sm-tb-'+t);
    if(b) b.classList.toggle('sma',t===tab);
  });
  if((tab==='records'||tab==='my')&&!loggedIn){
    window._smPendingTab=tab;
    if(lv){lv.classList.remove('hidden');lv.style.display='flex';}
    if(homeV){homeV.classList.add('hidden');}
    document.getElementById('sm-rec-v').classList.add('smh');
    document.getElementById('sm-ser-v').classList.add('smh');
    document.getElementById('sm-my-v').classList.add('smh');
    return;
  }
  _ct=tab;
  if(tab==='home'){
    document.getElementById('sm-rec-v').classList.add('smh');
    document.getElementById('sm-ser-v').classList.add('smh');
    document.getElementById('sm-my-v').classList.add('smh');
    if(lv){lv.classList.add('hidden');lv.style.display='none';}
    if(homeV) homeV.classList.remove('hidden');
  } else {
    if(lv){lv.classList.add('hidden');lv.style.display='none';}
    if(homeV) homeV.classList.add('hidden');
    document.getElementById('sm-rec-v').classList.toggle('smh',tab!=='records');
    document.getElementById('sm-ser-v').classList.toggle('smh',tab!=='series');
    document.getElementById('sm-my-v').classList.toggle('smh',tab!=='my');
    if(tab==='records') _rCal();
    if(tab==='my') _rMy();
  }
};

/* ── 탭바 표시 제어 ── */
function _isLI(){return !_LK||!!localStorage.getItem(_LK);}
function _showBar(on){
  var b=document.getElementById('sm-tab-bar');
  if(!b) return;
  if(on){b.classList.remove('smh');_app.style.paddingBottom='80px';}
  else{b.classList.add('smh');_app.style.paddingBottom='';}
}

/* ── showView 패치 ── */
var _oSV=typeof showView==='function'?showView:null;
if(_oSV){
  window.showView=function(id){
    _oSV(id);
    if(id==='login-view'){
      _showBar(true);
      _ct='home';
      ['home','records','series','my'].forEach(function(t){
        var b=document.getElementById('sm-tb-'+t);
        if(b) b.classList.toggle('sma',t==='home');
      });
      document.getElementById('sm-rec-v').classList.add('smh');
      document.getElementById('sm-ser-v').classList.add('smh');
      document.getElementById('sm-my-v').classList.add('smh');
    } else if(id==='play-view'){
      _showBar(false);
      try{
        var mod=typeof lastMode!=='undefined'?lastMode:null;
        _startSession(mod);
        setTimeout(_startObserving,150);
      }catch(e){}
    } else if(id==='result-view'){
      _showBar(false);
    } else if(id==='start-view'){
      _stopObserving();
      _showBar(true);
      _ct='home';
      ['home','records','series','my'].forEach(function(t){
        var b=document.getElementById('sm-tb-'+t);
        if(b) b.classList.toggle('sma',t==='home');
      });
      document.getElementById('sm-rec-v').classList.add('smh');
      document.getElementById('sm-ser-v').classList.add('smh');
      document.getElementById('sm-my-v').classList.add('smh');
      if(_isLI()) _recVisit();
      if(window._smPendingTab){
        var pt=window._smPendingTab;window._smPendingTab=null;
        setTimeout(function(){window._smTab(pt);},50);
      }
    }
  };
}

/* ── showResult / showResults 패치 (마지막 문제 기록) ── */
var _oRF=_RFN&&typeof window[_RFN]==='function'?window[_RFN]:null;
if(_oRF){
  window[_RFN]=function(){
    _oRF.apply(this,arguments);
    _showBar(false);
    try{
      var sl=document.getElementById('play-score');
      var sc=parseInt((sl?sl.textContent:'0').replace(/[^0-9]/g,''))||0;
      _recProblem(sc>_prevSc);
    }catch(e){}
    _stopObserving();
  };
}

/* ── socialLogin 패치 (로그인 후 pending 탭 이동) ── */
var _oSL=typeof socialLogin==='function'?socialLogin:null;
if(_oSL){
  window.socialLogin=function(){
    _oSL.apply(this,arguments);
    _showBar(true);
    _recVisit();
    if(window._smPendingTab){
      var pt=window._smPendingTab;window._smPendingTab=null;
      setTimeout(function(){window._smTab(pt);},50);
    }
  };
}

/* ── 로그아웃 ── */
window._smLogout=function(){
  if(typeof logout==='function') logout();
  else if(typeof doLogout==='function') doLogout();
  else if(_LK) localStorage.removeItem(_LK);
  var lb=document.querySelector('.logout-btn');
  if(lb) lb.style.display='none';
  setTimeout(function(){window._smTab('home');},10);
};

/* ── 달력 ── */
window._smCN=function(d){
  _cm+=d;
  if(_cm<0){_cm=11;_cy--;}
  if(_cm>11){_cm=0;_cy++;}
  _rCal();
};
var _MN=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

function _rCal(){
  var lbl=document.getElementById('sm-clbl');
  if(lbl) lbl.textContent=_cy+'년 '+_MN[_cm];
  var vv=_gv();var vm={};vv.forEach(function(v){vm[v.date]=v;});
  var today=new Date().toISOString().split('T')[0];
  var first=new Date(_cy,_cm,1).getDay();
  var days=new Date(_cy,_cm+1,0).getDate();
  var mT=0,mC=0,mD=0;
  for(var d=1;d<=days;d++){
    var ds=_cy+'-'+String(_cm+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    if(vm[ds]){mD++;mT+=vm[ds].totalProblems||0;mC+=vm[ds].totalCorrect||0;}
  }
  var su=document.getElementById('sm-msum');
  if(su) su.innerHTML=[
    '<div class="sm-mc"><div class="sm-mn">'+mD+'</div><div class="sm-ml">방문 일수</div></div>',
    '<div class="sm-mc"><div class="sm-mn">'+mT+'</div><div class="sm-ml">푼 문제 수</div></div>',
    '<div class="sm-mc"><div class="sm-mn">'+(mT>0?Math.round(mC/mT*100):0)+'%</div><div class="sm-ml">정답률</div></div>',
  ].join('');
  var body=document.getElementById('sm-cbody');
  if(!body) return;
  var html='<tr>';
  for(var i=0;i<first;i++) html+='<td><div class="sm-cd"></div></td>';
  for(var d=1;d<=days;d++){
    var ds=_cy+'-'+String(_cm+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    var cls='sm-cd';
    if(vm[ds]) cls+=' smd';
    if(ds===today) cls+=' smt';
    var cl=vm[ds]?'onclick="window._smDD(\''+ds+'\')"':'';
    html+='<td><div class="'+cls+'" '+cl+'>'+d+'</div></td>';
    if((first+d-1)%7===6&&d<days) html+='</tr><tr>';
  }
  body.innerHTML=html+'</tr>';
  document.getElementById('sm-ddet').classList.add('smh');
}

window._smDD=function(ds){
  var vv=_gv();var v=vv.find(function(x){return x.date===ds;});
  var el=document.getElementById('sm-ddet');
  if(!el) return;
  if(!v){el.classList.add('smh');return;}
  var d=new Date(ds+'T00:00:00');
  var dl=(d.getMonth()+1)+'월 '+d.getDate()+'일';
  el.classList.remove('smh');
  el.innerHTML='<div class="sm-dt">📅 '+dl+' 기록</div>'
    +'<div class="sm-dr"><span class="sm-dl">총 푼 문제</span><span class="sm-dv">'+v.totalProblems+'문제</span></div>'
    +'<div class="sm-dr"><span class="sm-dl">정답</span><span class="sm-dv">'+v.totalCorrect+'개 <span class="sm-db">'+(v.totalProblems>0?Math.round(v.totalCorrect/v.totalProblems*100):0)+'%</span></span></div>';
};

/* ── 마이 ── */
function _rMy(){
  var ld=null;try{ld=_LK?JSON.parse(localStorage.getItem(_LK)):null;}catch(e){}
  var em=document.getElementById('sm-my-em');
  var pv=document.getElementById('sm-my-pv');
  if(em) em.textContent=(ld&&ld.email)||'sprit6487@gmail.com';
  if(pv){
    var pn=(ld&&ld.provider)||'kakao';
    var pm={kakao:'카카오',google:'구글',naver:'네이버',facebook:'페이스북'};
    pv.textContent=pm[pn]||pn;
  }
}

/* ── 초기화 ── */
setTimeout(function(){
  _showBar(true);
  if(_isLI()) _recVisit();
},200);

})();
</script>
