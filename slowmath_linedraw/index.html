<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>느린아이 선 긋기</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;900&display=swap');
        *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            margin: 0; padding: 0;
            background: #F5F1EB;
            min-height: 100dvh;
            display: flex; justify-content: center; align-items: flex-start;
            user-select: none;
        }
        .app {
            width: 100%; max-width: 480px;
            min-height: 100dvh;
            background: white;
            padding: 24px 20px;
            padding-top: max(24px, env(safe-area-inset-top));
            padding-bottom: max(24px, env(safe-area-inset-bottom));
            display: flex; flex-direction: column;
        }
        @media (min-width: 768px) {
            body { align-items: center; padding: 32px; }
            .app {
                max-width: 560px; min-height: auto;
                border-radius: 32px;
                box-shadow: 0 8px 48px rgba(0,0,0,0.07), 0 1px 4px rgba(0,0,0,0.04);
                padding: 44px 40px;
            }
        }
        .hidden { display: none !important; }

        /* ── Login View ── */
        .login-view {
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          flex: 1;
          min-height: 100dvh;
          padding: 40px 20px;
        }

        .login-logo-area {
          text-align: center;
          margin-bottom: 48px;
        }

        .login-logo-area svg {
          display: block;
          margin: 0 auto;
        }

        .login-logo-area h1 {
          font-size: clamp(1.8rem, 6vw, 2.25rem);
          font-weight: 900;
          letter-spacing: -0.025em;
          margin-top: 8px;
          white-space: nowrap;
        }

        .login-subtitle {
          color: #B8AD9E;
          font-size: 0.9375rem;
          margin-top: 2px;
        }

          @keyframes floatBubble {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
}
.login-trial {
    position: relative;
    background: #FFF8F0;
    border: 1.5px solid #EDD080;
    border-radius: 14px;
    padding: 9px 16px;
    font-size: 0.78rem;
    color: #7B6545;
    font-weight: 600;
    text-align: center;
    margin-bottom: 24px;
    line-height: 1.4;
    box-shadow: 0 4px 14px rgba(220,160,50,.18);
    align-self: center;
}
.login-trial::before {
    content: '';
    position: absolute;
    bottom: -9px; left: 50%;
    transform: translateX(-50%);
    border: 5px solid transparent;
    border-top: 8px solid #EDD080;
    border-bottom: 0;
}
.login-trial::after {
    content: '';
    position: absolute;
    bottom: -7px; left: 50%;
    transform: translateX(-50%);
    border: 4px solid transparent;
    border-top: 7px solid #FFF8F0;
    border-bottom: 0;
    z-index: 1;
}
.share-bubble{position:absolute;right:0;background:#FFF8F0;border:1.5px solid #EDD080;border-radius:12px;padding:8px 12px;font-size:0.55rem;color:#7B6545;font-weight:600;box-shadow:0 4px 12px rgba(220,160,50,.18);z-index:20;line-height:1.5;text-align:right;max-width:200px;}
.share-bubble::before{content:'';position:absolute;top:-8px;right:10px;border:4px solid transparent;border-bottom:7px solid #EDD080;border-top:0;}
.share-bubble::after{content:'';position:absolute;top:-6px;right:11px;border:3px solid transparent;border-bottom:6px solid #FFF8F0;border-top:0;z-index:1;}
@media (max-width:768px){.share-bubble{font-size:0.60rem;max-width:170px;padding:7px 10px;}}
@media (max-width:480px){.share-bubble{font-size:0.62rem;max-width:165px;padding:7px 9px;}}
  .login-buttons {
          width: 100%;
          max-width: 300px;
          display: flex;
          flex-direction: column;
          gap: 12px;
        }

        .login-btn {
          display: flex;
          align-items: center;
          justify-content: center;
          gap: 10px;
          width: 100%;
          padding: 16px 20px;
          border-radius: 14px;
          font-size: 1rem;
          font-weight: 700;
          font-family: inherit;
          line-height: 1.2;
          border: none;
          cursor: pointer;
          transition: transform 0.1s;
        }
        .login-btn:active { transform: scale(0.97); }
        .login-btn svg { flex-shrink: 0; }
        .login-btn.kakao { background: #FEE500; color: #191919; }
        .login-btn.google { background: #FFFFFF; color: #444444; border: 1.5px solid #DADCE0; }

        /* Header */
        .app-header { display: flex; flex-direction: column; align-items: center; text-align: center; margin-bottom: 20px; position: relative; width: 100%; }
        .app-header h1 { font-size: 1.6rem; font-weight: 900; letter-spacing: -0.025em; margin: 8px 0 0; line-height: 1.2; }
        .brand-sub{font-size:.8rem;color:#B8AD9E;margin-top:6px;margin-bottom:0;font-weight:500;}

        /* Section label */
        .sec-label { font-size: .875rem; font-weight: 700; color: #B8AD9E; margin: 0 0 10px; }

        /* Type grid */
        .type-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 18px; }
        .type-card {
            border: 2.5px solid #E8E2DA; border-radius: 20px;
            padding: 12px 6px 10px; background: white;
            cursor: pointer; text-align: center; transition: all .15s;
        }
        .type-card:active { transform: scale(.95); }
        .type-card.sel { border-color: #F0A050; background: #FFF8F0; }
        .type-card .t-icon { height: 42px; display: flex; align-items: center; justify-content: center; margin-bottom: 6px; }
        .type-card .t-name { font-size: .82rem; font-weight: 700; color: #4A4035; }

        /* Segment buttons */
        .row-btns { display: flex; gap: 8px; margin-bottom: 14px; }
        .seg-btn {
            flex: 1; padding: 11px 0;
            border: 2.5px solid #E8E2DA; border-radius: 12px;
            background: white; font-family: 'Noto Sans KR', sans-serif;
            font-size: .875rem; font-weight: 700; color: #8C8070;
            cursor: pointer; transition: all .15s;
        }
        .seg-btn:active { transform: scale(.97); }
        .seg-btn.sel-blue  { border-color: #6BADE8; background: #EEF6FD; color: #6BADE8; }
        .seg-btn.sel-green { border-color: #5BC886; background: #EDFAF2; color: #1A7A3A; }

        /* Start button */
        .start-btn {
            width: 100%; padding: 16px 0; border-radius: 16px; border: none;
            margin-top: 18px;
            background: #4A4035;
            color: white; font-family: 'Noto Sans KR', sans-serif;
            font-size: 1.1rem; font-weight: 700; cursor: pointer;
            box-shadow: 0 2px 8px rgba(74,64,53,0.15);
            transition: transform .1s, box-shadow .1s;
        }
        .start-btn:active { transform: scale(.97); box-shadow: none; }

        /* Settings */
        .setting-divider { border-top: 1.5px solid #F0ECE6; padding-top: 18px; margin-top: 18px; }
        .setting-header { display: flex; align-items: center; justify-content: space-between; }
        .setting-title { font-size: 0.875rem; font-weight: 600; color: #4A4035; }
        .setting-title .badge { font-size: 0.7rem; font-weight: 400; color: #B8AD9E; margin-left: 6px; }
        .toggle-track {
            width: 48px; height: 28px; border-radius: 99px; position: relative;
            background: #E0DAD0; border: none; cursor: pointer; flex-shrink: 0; transition: background 0.2s;
        }
        .toggle-track.on { background: #5BC886; }
        .toggle-knob {
            width: 22px; height: 22px; border-radius: 50%; background: #fff;
            position: absolute; top: 3px; left: 3px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.12); transition: transform 0.2s;
        }
        .toggle-track.on .toggle-knob { transform: translateX(20px); }

        /* Logout button */
        .logout-btn {
            background: none;
            border: 1.5px solid #E8E2DA;
            border-radius: 8px;
            padding: 6px 14px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #B8AD9E;
            cursor: pointer;
            font-family: 'Noto Sans KR', sans-serif;
            transition: background 0.15s;
        }
        .logout-btn:hover { background: #F5F1EB; }

        /* Game nav */
        .game-nav { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
        .btn-home {
            width: 36px; height: 36px; border-radius: 10px;
            border: 2px solid #E8E2DA; background: white;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 1.1rem; color: #8C8070; flex-shrink: 0;
        }
        .btn-home:active { background: #F5F1EB; }
        .nav-title { flex: 1; font-size: 1rem; font-weight: 700; color: #4A4035; }
        .badge { font-size: .75rem; font-weight: 600; color: #8C8070; background: #F5F1EB; border-radius: 8px; padding: 4px 10px; }

        /* Canvas wrap */
        .canvas-wrap {
            border: 2.5px solid #E8E2DA; border-radius: 20px;
            overflow: hidden; margin-bottom: 14px; background: #FAFAF8;
        }
        .canvas-wrap.portrait { width: 190px; margin-left: auto; margin-right: auto; }
        canvas { display: block; touch-action: none; }

        /* Instructions / result */
        .instr { text-align: center; font-size: .875rem; font-weight: 600; color: #B8AD9E; margin-bottom: 12px; min-height: 22px; }
        .result-wrap { min-height: 64px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; }

        /* ── 가로 모드 레이아웃 ── */
        .landscape-game {
            display: flex; flex-direction: column;
            height: 100%; padding: 8px 12px;
        }
        .landscape-game .game-nav { margin-bottom: 4px; flex-shrink: 0; }
        .landscape-game .progress-bar { margin-bottom: 4px; flex-shrink: 0; }
        .landscape-game .canvas-wrap {
            flex: 1; margin-bottom: 6px; border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
        }
        .landscape-game .instr { font-size: .75rem; margin-bottom: 4px; min-height: 18px; flex-shrink: 0; }
        .landscape-game .result-wrap { min-height: 40px; flex-shrink: 0; }
        .landscape-game .result-overlay .result-card { padding: 24px 20px 20px; }
        .landscape-game .result-actions { margin-top: 4px; }

        /* CSS 폴백: 세로 기기에서 강제 가로 회전 */
        .force-landscape {
            position: fixed !important;
            top: 0; left: 0;
            width: 100vh !important;
            width: 100dvh !important;
            height: 100vw !important;
            height: 100dvw !important;
            transform: rotate(90deg);
            transform-origin: top left;
            margin-left: 100vw;
            margin-left: 100dvw;
            overflow: hidden;
            z-index: 50;
            background: white;
        }
        .res-msg { font-size: 1.25rem; font-weight: 700; text-align: center; }
        .res-msg.info { color: #B8AD9E; font-size: .9rem; font-weight: 600; }

        /* Result overlay (popup) */
        .result-overlay {
            display: flex; position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,.35); z-index: 200;
            justify-content: center; align-items: center;
            visibility: hidden; opacity: 0; pointer-events: none;
            transition: opacity .2s ease-out, visibility .2s ease-out;
        }
        .result-overlay.active { visibility: visible; opacity: 1; pointer-events: auto; }
        .result-card {
            background: #fff; border-radius: 24px;
            padding: 36px 28px 28px; text-align: center;
            max-width: 380px; width: 90%;
            animation: popIn .35s ease-out;
        }
        .result-emoji { font-size: 56px; margin-bottom: 8px; }
        .result-text { font-size: 1.25rem; font-weight: 900; color: #4A4035; margin-bottom: 4px; }
        .result-sub { font-size: .85rem; color: #B8AD9E; margin-bottom: 24px; }
        .result-actions { display: flex; gap: 10px; width: 100%; }
        .next-btn { flex: 1; padding: 14px 0; border: none; border-radius: 12px; background: #6BADE8; color: #fff; font-size: 1rem; font-weight: 700; cursor: pointer; font-family: inherit; transition: transform 0.12s; }
        .next-btn:active { transform: scale(0.96); }
        .btn-retry {
            flex: 1; padding: 13px 0; border-radius: 12px;
            border: 2.5px solid #E8E2DA; background: #EDE8E0;
            font-family: 'Noto Sans KR', sans-serif; font-size: .9rem;
            font-weight: 700; color: #8C8070; cursor: pointer; transition: transform .1s;
        }
        .btn-retry:active { transform: scale(.97); }
        .btn-next {
            flex: 1; padding: 13px 0; border-radius: 12px; border: none;
            background: #6BADE8;
            font-family: 'Noto Sans KR', sans-serif; font-size: .9rem;
            font-weight: 700; color: white; cursor: pointer; transition: transform .1s;
        }
        .btn-next:active { transform: scale(.97); }

        /* Animations */
        @keyframes popIn { 0%{transform:scale(.7);opacity:0} 60%{transform:scale(1.12);opacity:1} 100%{transform:scale(1);opacity:1} }
        @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
        .pop-in  { animation: popIn  .35s ease-out; }
        .fade-up { animation: fadeUp .3s  ease-out; }

        /* ── Progress Bar ── */
        .progress-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-shrink: 0; }
        .progress-dots { display: flex; gap: 4px; flex: 1; }
        .progress-dot { flex: 1; height: 6px; border-radius: 3px; background: #E8E2DA; transition: background .2s; }
        .progress-dot.done { background: #5BC886; }
        .progress-dot.current { background: #F0A050; }
        .progress-label { font-size: .75rem; font-weight: 700; color: #8C8070; white-space: nowrap; }

        /* ── Result View ── */
        .result-view { display: flex; flex-direction: column; }
        .result-view-header { text-align: center; margin-bottom: 16px; }
        .result-view-header .complete-emoji { font-size: 52px; display: block; margin-bottom: 6px; }
        .result-view-header h2 { font-size: 1.25rem; font-weight: 900; color: #4A4035; margin: 0 0 4px; }
        .result-view-header p { font-size: .85rem; color: #B8AD9E; margin: 0; }
        .result-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 16px; }
        .result-cell { border: 2px solid #E8E2DA; border-radius: 12px; overflow: hidden; background: #FAFAF8; position: relative; }
        .result-cell img { width: 100%; display: block; }
        .result-cell .result-label { position: absolute; top: 3px; left: 5px; font-size: .6rem; font-weight: 700; color: #B8AD9E; }
        .encourage-msg { background: #FFF8F0; border: 2px solid #F5DFA0; border-radius: 16px; padding: 12px 16px; margin-bottom: 10px; text-align: center; font-size: 0.9rem; font-weight: 700; color: #7B6545; line-height: 1.8; animation: fadeUp .4s ease-out; }
        .writing-feedback { background: #F0F6FF; border: 2px solid #BDD5F5; border-radius: 16px; padding: 12px 16px; margin-bottom: 16px; text-align: left; font-size: 0.85rem; font-weight: 600; color: #3A5A8C; line-height: 1.7; animation: fadeUp .5s ease-out; }
        .writing-feedback .feedback-label { font-size: 0.72rem; font-weight: 700; color: #6A8FBF; letter-spacing: 0.04em; margin-bottom: 4px; text-align: center; }
        .result-view-actions { display: flex; gap: 10px; width: 100%; margin: 0 auto; }
        .result-view-actions button { flex: 1; padding: 16px 0; border-radius: 14px; font-family: 'Noto Sans KR', sans-serif; font-size: 1rem; font-weight: 700; cursor: pointer; transition: transform .1s; white-space: nowrap; }
        .result-view-actions button:active { transform: scale(.97); }
        .btn-again { border: none; background: #6BADE8; color: white; box-shadow: 0 2px 8px rgba(107,173,232,.3); }
        .btn-home-result { border: 2.5px solid #E8E2DA; background: #EDE8E0; color: #8C8070; }

    /* ── Splash Screen ── */
    .splash-overlay {
        position: fixed; top: 0; left: 0; right: 0; bottom: 0;
        background: #FFFFFF;
        display: flex; flex-direction: column;
        justify-content: center; align-items: center;
        z-index: 9999;
        transition: opacity 0.5s ease-out;
    }
    .splash-overlay.fade-out { opacity: 0; pointer-events: none; }
    .splash-logo { animation: splashFloat 2.4s ease-in-out infinite; margin-bottom: 24px; }
    .splash-title { font-size: 2rem; font-weight: 900; letter-spacing: -0.025em; margin-bottom: 8px; }
    .splash-subtitle { color: #B8B0A8; font-size: 0.9375rem; font-weight: 500; }
    @keyframes splashFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    @media (max-width:380px) { .splash-title{font-size:1.5rem} }
    @media (min-width:768px) { .splash-logo svg{width:160px;height:134px} .splash-title{font-size:2.5rem} .splash-subtitle{font-size:1.0625rem} }

/* Hide share button/bubble when not logged in */
body:not(.sm-loggedin) [title="공유하기"],
body:not(.sm-loggedin) #share-bubble { display: none !important; }
</style>

<script>
// ── TTS ──
const TTS_KEY = 'slowmath_linedraw_tts';
let ttsEnabled = (() => { try { return JSON.parse(localStorage.getItem(TTS_KEY)) ?? true; } catch { return true; } })();
function toggleTTS() {
    ttsEnabled = !ttsEnabled;

function speak(text) {
    if (!ttsEnabled || !window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'ko-KR'; u.rate = 0.9;
    setTimeout(() => window.speechSynthesis.speak(u), 50);
}
// 자주 쓰는 문구 프리워밍 — 첫 재생부터 즉시 응답
if (window.SM_TTS && window.SM_TTS.prewarm) {
    window.SM_TTS.prewarm([
        '출발에서 시작하여 골인까지 선을 그으세요',

}
document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('tts-toggle').classList.toggle('on', ttsEnabled);
});

// ── State ──
const TOTAL_TURNS = 10;
const G = {
    type: 'straight', dir: 'left', diff: 'normal',
    drawing: false, over: false,
    pts: [], path: [], failed: false,
    variant: {},
    turn: 0, history: [],
};

const TYPES = [
    { id: 'straight',   name: '직선',     vert: false },
    { id: 'diagonal',   name: '사선',     vert: false },
    { id: 'curve',      name: '곡선',     vert: false },
    { id: 'zigzag',     name: '지그재그', vert: false },
    { id: 'spring',     name: '스프링',   vert: false },
    { id: 'squarewave', name: '직각',     vert: false },
    { id: 'scallop',    name: '파도',     vert: false },
    { id: 'loop',       name: '상어',     vert: false },
];

const TOL      = { easy: 44, normal: 26, hard: 14 };
const DIFF_LBL = { easy: '쉬움', normal: '보통', hard: '어려움' };
const DIR_LBL  = { left: '왼쪽에서 오른쪽', right: '오른쪽에서 왼쪽', top: '위에서 아래', bottom: '아래에서 위' };
const TYPE_LBL = { straight:'직선', diagonal:'사선', curve:'곡선', zigzag:'지그재그', spring:'스프링', squarewave:'직각', scallop:'파도', loop:'상어' };

// ── Icon renderers ──
function drawIcon(id, c, w, h) {
    c.strokeStyle = '#C8C0B4'; c.lineWidth = 3;
    c.lineCap = 'round'; c.lineJoin = 'round';
    c.beginPath();
    if (id === 'straight') {
        c.moveTo(5, h/2); c.lineTo(w-5, h/2);
    } else if (id === 'diagonal') {
        c.moveTo(5, h-6); c.lineTo(w-5, 6);
    } else if (id === 'vertical') {
        c.moveTo(w/2, 5); c.lineTo(w/2, h-5);
    } else if (id === 'curve') {
        for (let i=0;i<=60;i++) {
            const t=i/60;
            i===0 ? c.moveTo(5+(w-10)*t, h/2+Math.sin(t*Math.PI*2)*(h/2-5))
                  : c.lineTo(5+(w-10)*t, h/2+Math.sin(t*Math.PI*2)*(h/2-5));
        }
    } else if (id === 'zigzag') {
        [[5,h/2],[w*.25,5],[w*.5,h-5],[w*.75,5],[w-5,h/2]].forEach((p,i) =>
            i===0 ? c.moveTo(p[0],p[1]) : c.lineTo(p[0],p[1]));
    } else if (id === 'spring') {
        // 코일 스프링: N코일 + 1/4코일 추가 → 끝이 위를 향함
        const sN=2, sm=10, scy=h/2, srx=(w-2*sm)/(2*sN+3), sry=srx*1.1;
        const sTotalAngle = sN*2*Math.PI + Math.PI/2;
        for (let i=0;i<=120;i++) {
            const t=i/120, theta=Math.PI+t*sTotalAngle;
            const ccx = sm + srx + t*(w - 2*sm - srx);
            i===0 ? c.moveTo(ccx+srx*Math.cos(theta), scy+sry*Math.sin(theta))
                  : c.lineTo(ccx+srx*Math.cos(theta), scy+sry*Math.sin(theta));
        }
    } else if (id === 'squarewave') {
        const peaks = 3;
        const segW = (w - 10) / (2*peaks + 1);
        const midY = h * 0.70, topY = h * 0.30;
        c.moveTo(5, midY);
        for (let p = 0; p < peaks; p++) {
            c.lineTo(5 + segW*(2*p+1), midY);
            c.lineTo(5 + segW*(2*p+1), topY);
            c.lineTo(5 + segW*(2*p+2), topY);
            c.lineTo(5 + segW*(2*p+2), midY);
        }
        c.lineTo(w-5, midY);
    } else if (id === 'scallop') {
        const arches = 4;
        const rx = (w - 10) / (2*arches);
        const ry = rx * 0.80, iy = h/2 + ry/2;
        for (let a = 0; a < arches; a++) {
            const cx_a = 5 + rx + a*2*rx;
            for (let i = 0; i <= 20; i++) {
                const theta = Math.PI + (i/20)*Math.PI;
                const x = cx_a + rx*Math.cos(theta);
                const y = iy + ry*Math.sin(theta);
                (a === 0 && i === 0) ? c.moveTo(x, y) : c.lineTo(x, y);
            }
        }
    } else if (id === 'loop') {
        // Shark fin: steep rise (20% of width), gradual curved fall (80%)
        const nF = 3, rr = 0.20;
        const fw = (w - 10) / nF;
        const amp = h * 0.55, iy = h/2 + amp/2;
        for (let i = 0; i <= 60; i++) {
            const t = i / 60, pos = t * nF;
            const fIdx = Math.min(Math.floor(pos), nF - 1), ft = pos - fIdx;
            const x = 5 + fIdx * fw + fw * ft;
            const af = ft <= rr
                ? 1 - Math.cos((ft / rr) * Math.PI / 2)
                : Math.cos(((ft - rr) / (1 - rr)) * Math.PI / 2);
            i === 0 ? c.moveTo(x, iy - amp * af) : c.lineTo(x, iy - amp * af);
        }
    }
    c.stroke();
}

// ── Orientation ──
let orientationLocked = false;
let useCssFallback = false;

function lockLandscape() {
    gameView.classList.add('landscape-game');
    const so = screen.orientation;
    if (so && so.lock) {
        so.lock('landscape').then(() => {
            orientationLocked = true;
            setTimeout(() => initCanvasAndStart(), 100);
        }).catch(() => {
            useCssFallback = true;
            if (window.innerHeight > window.innerWidth) {
                gameView.classList.add('force-landscape');
            }
            setTimeout(() => initCanvasAndStart(), 100);
        });
    } else {
        useCssFallback = true;
        if (window.innerHeight > window.innerWidth) {
            gameView.classList.add('force-landscape');
        }
        setTimeout(() => initCanvasAndStart(), 100);
    }
}

function unlockLandscape() {
    gameView.classList.remove('landscape-game', 'force-landscape');
    if (orientationLocked) {
        const so = screen.orientation;
        if (so && so.unlock) so.unlock();
        orientationLocked = false;
    }
    useCssFallback = false;
}

function lockOrientation(mode) {
    // 하위 호환: portrait 잠금 시 가로 모드 해제
    if (mode.startsWith('portrait')) {
        unlockLandscape();
    }
    if (screen.orientation && screen.orientation.lock) {
        screen.orientation.lock(mode).catch(() => {});
    }
}

window.addEventListener('resize', () => {
    if (useCssFallback) {
        if (window.innerHeight > window.innerWidth) {
            gameView.classList.add('force-landscape');
        } else {
            gameView.classList.remove('force-landscape');
        }
    }
    if (!gameView.classList.contains('hidden') && G.path.length) {
        initCanvas(); render();
    }
});

    document.getElementById('login-view').classList.add('hidden');
    document.getElementById('home-view').classList.remove('hidden');
    lockOrientation('portrait-primary');

}

// Build type grid
(function() {
    const grid = document.getElementById('type-grid');
    TYPES.forEach(t => {
        const card = document.createElement('div');
        card.className = 'type-card' + (t.id === G.type ? ' sel' : '');
        card.dataset.type = t.id;

        const ic = document.createElement('canvas');
        ic.width = 60; ic.height = ['spring','squarewave','scallop','loop'].includes(t.id) ? 40 : 32;
        ic.style.display = 'block'; ic.style.margin = '0 auto';
        drawIcon(t.id, ic.getContext('2d'), 60, ic.height);

        const wrap = document.createElement('div');
        wrap.className = 't-icon'; wrap.appendChild(ic);

        const nm = document.createElement('div');
        nm.className = 't-name'; nm.textContent = t.name;

        card.appendChild(wrap); card.appendChild(nm);
        grid.appendChild(card);
    });
})();

// 게임 중 모든 터치 이벤트 차단 → URL바 완전 방지
const preventTouchHandler = function(e) {
    e.preventDefault();
};
// 버튼 클릭은 touchend에서 수동 트리거 (touchstart가 차단되므로 click 자동 발생 안 함)
document.addEventListener('touchend', function(e) {
    if (gameView.classList.contains('hidden')) return;
    var btn = e.target.closest('button');
    if (btn && gameView.contains(btn)) {
        e.preventDefault();
        btn.click();
    }
});

}

    if (!localStorage.getItem('slowmath_linedraw_login')) {

        document.getElementById('login-view').classList.remove('hidden');

    document.getElementById('nav-title').textContent = TYPE_LBL[G.type] + '  ' + DIR_LBL[G.dir];
    document.getElementById('diff-badge').textContent = DIFF_LBL[G.diff];

    document.getElementById('result-overlay').classList.remove('active');
    document.getElementById('instr').textContent = '출발에서 시작하여 골인까지 선을 그으세요';
    speak('출발에서 시작하여 골인까지 선을 그으세요');
    G.turn = 0;
    G.history = [];
    buildProgressDots();

    const isVert = (G.dir === 'top' || G.dir === 'bottom');
    if (isVert) {

// ── Canvas ──
let LW = 0, LH = 0;

function initCanvas() {
    const isV = (G.dir === 'top' || G.dir === 'bottom');
    const isLandscape = gameView.classList.contains('landscape-game');
    const dpr  = window.devicePixelRatio || 1;

    // 캔버스 크기 리셋 (부모 측정에 영향 방지)
    gc.style.width = '';
    gc.style.height = '';

    if (isV) {
        canvasWrap.classList.add('portrait');
        LW = canvasWrap.clientWidth - 4;
        LH = Math.min(Math.floor(window.innerHeight * 0.54), 420);
    } else if (isLandscape) {
        canvasWrap.classList.remove('portrait');
        // 가로 모드: 사용 가능한 전체 공간 활용
        const viewH = gameView.classList.contains('force-landscape')
            ? window.innerWidth : window.innerHeight;
        const navH = document.querySelector('.game-nav').offsetHeight || 36;
        const bottomH = 70; // instr + result area
        const padding = 30;
        LW = gameView.classList.contains('force-landscape')
            ? (window.innerHeight - 24) : (window.innerWidth - 24);
        LH = Math.max(150, viewH - navH - bottomH - padding);
    } else {
        canvasWrap.classList.remove('portrait');
        LW = canvasWrap.clientWidth - 4;
        LH = 210;
    }

    gc.width  = Math.round(LW * dpr);
    gc.height = Math.round(LH * dpr);
    gc.style.width  = LW + 'px';
    gc.style.height = LH + 'px';
    ctx.setTransform(1,0,0,1,0,0);
    ctx.scale(dpr, dpr);
}

// ── Path generation ──
const STEPS = 300;

// Randomise shape parameters for curve / zigzag / spring
function pickVariant() {
    const T = G.type;
    if (T === 'curve') {
        G.variant = {
            cycles: [1, 1.5, 2][Math.floor(Math.random()*3)],
            amp:    0.23 + Math.random() * 0.13,   // 23–36% of height
            flip:   Math.random() < 0.5 ? 1 : -1,  // start up or down
        };
    } else if (T === 'zigzag') {
        G.variant = {
            peaks: [2, 3, 3][Math.floor(Math.random()*3)],
            amp:   0.23 + Math.random() * 0.13,
            flip:  Math.random() < 0.5 ? 1 : -1,
        };
    } else if (T === 'spring') {
        G.variant = {
            cycles: 2,
            amp:    0.18 + Math.random() * 0.04,     // 수직 폭 축소 (0.18–0.22)
            flip:   Math.random() < 0.5 ? 1 : -1,
        };
    } else if (T === 'squarewave') {
        G.variant = {
            peaks: [2, 3, 3][Math.floor(Math.random()*3)],
            amp:   0.28 + Math.random() * 0.08,
            flip:  Math.random() < 0.5 ? 1 : -1,
        };
    } else if (T === 'scallop') {
        G.variant = {
            arches: [3, 4, 4][Math.floor(Math.random()*3)],
            amp:    0.22 + Math.random() * 0.08,
            flip:   Math.random() < 0.5 ? 1 : -1,
        };
    } else if (T === 'loop') {
        G.variant = {
            loops: [2, 3, 3][Math.floor(Math.random()*3)],
            amp:   0.35 + Math.random() * 0.10,
        };
    } else {
        G.variant = {};
    }
}

function genPath() {
    const isVert = (G.dir === 'top' || G.dir === 'bottom');
    // For top/bottom directions, generate path as if horizontal (left/right),
    // then rotate 90°: swap x↔y and map to the portrait canvas dimensions.
    const w = isVert ? LH : LW;
    const h = isVert ? LW : LH;
    const cx=w/2, cy=h/2, m=26;
    const pts=[], T=G.type;
    // Normalise direction to left/right for path generation
    const D = isVert ? (G.dir === 'top' ? 'left' : 'right') : G.dir;

    switch(T) {
        case 'straight': {
            const sx=D==='left'?m:w-m, ex=D==='left'?w-m:m;
            for(let i=0;i<=STEPS;i++){const t=i/STEPS; pts.push({x:sx+(ex-sx)*t,y:cy});}
            break;
        }
        case 'diagonal': {
            const sx=D==='left'?m:w-m, ex=D==='left'?w-m:m;
            const sy=h*.16, ey=h*.84;
            for(let i=0;i<=STEPS;i++){const t=i/STEPS; pts.push({x:sx+(ex-sx)*t,y:sy+(ey-sy)*t});}
            break;
        }
        case 'curve': {
            const sx=D==='left'?m:w-m, ex=D==='left'?w-m:m;
            const cAmp    = (G.variant.amp    || 0.30) * h;
            const cCycles = G.variant.cycles  || 1;
            const cFlip   = G.variant.flip    || 1;
            for(let i=0;i<=STEPS;i++){
                const t=i/STEPS, rt=D==='left'?t:1-t;
                pts.push({x:sx+(ex-sx)*t, y:cy+Math.sin(rt*Math.PI*2*cCycles)*cAmp*cFlip});
            }
            break;
        }
        case 'zigzag': {
            const sx=D==='left'?m:w-m, ex=D==='left'?w-m:m;
            const zAmp   = (G.variant.amp   || 0.30) * h;
            const zPeaks = G.variant.peaks  || 4;
            const zFlip  = G.variant.flip   || 1;
            for(let i=0;i<=STEPS;i++){
                const t=i/STEPS, rt=D==='left'?t:1-t;
                const ph=(rt*zPeaks)%1;
                pts.push({x:sx+(ex-sx)*t, y:cy+(ph<.5?(4*ph-1):(3-4*ph))*zAmp*zFlip});
            }
            break;
        }
        case 'spring': {
            // 2코일, flip=1: 위 시작→위 끝 / flip=-1: 아래 시작→아래 끝
            const sCycles = G.variant.cycles || 2;
            const sFlip   = G.variant.flip   || 1;
            // R_x: 분모 +3 → 루프 간 ~20px 여백 확보 (기존 /4=56px → /7=32px)
            const R_x = (w - 2*m) / (2 * sCycles + 3);
            // R_y: amp 기반이되 R_x의 1.15배로 상한 제한 (수직 폭 억제)
            const R_y = Math.min((G.variant.amp || 0.20) * h, R_x * 1.15);
            const totalAngle = sCycles * 2 * Math.PI + Math.PI / 2;
            for(let i=0;i<=STEPS;i++){
                const t=i/STEPS;
                const theta  = Math.PI + t * totalAngle;
                const coilCX = m + R_x + t * (w - 2*m - R_x);
                pts.push({ x: coilCX + R_x*Math.cos(theta), y: cy + R_y*Math.sin(theta)*sFlip });
            }
            if(D==='right') pts.reverse();
            break;
        }
        case 'squarewave': {
            const sqFlip  = G.variant.flip  || 1;
            const sqPeaks = G.variant.peaks || 3;
            const sqAmp   = (G.variant.amp  || 0.32) * h;
            const hSeg = (w - 2*m) / (2 * sqPeaks + 1);
            // Build waypoints (right-angle corners)
            const baseline = cy + sqAmp * sqFlip / 2;
            const peak     = cy - sqAmp * sqFlip / 2;
            const wp = [{x: m, y: baseline}];
            for (let p = 0; p < sqPeaks; p++) {
                const x1 = m + hSeg * (2*p + 1);
                const x2 = m + hSeg * (2*p + 2);
                wp.push({x: x1, y: baseline});
                wp.push({x: x1, y: peak});
                wp.push({x: x2, y: peak});
                wp.push({x: x2, y: baseline});
            }
            wp.push({x: w - m, y: baseline});
            // Interpolate STEPS+1 points by arc-length
            let totalLen = 0;
            const segLens = [];
            for (let s = 1; s < wp.length; s++) {
                const len = Math.hypot(wp[s].x - wp[s-1].x, wp[s].y - wp[s-1].y);
                segLens.push(len); totalLen += len;
            }
            for (let i = 0; i <= STEPS; i++) {
                const target = (i / STEPS) * totalLen;
                let cum = 0;
                for (let s = 0; s < segLens.length; s++) {
                    if (cum + segLens[s] >= target || s === segLens.length - 1) {
                        const t2 = segLens[s] > 0 ? Math.min(1, (target - cum) / segLens[s]) : 0;
                        pts.push({
                            x: wp[s].x + (wp[s+1].x - wp[s].x) * t2,
                            y: wp[s].y + (wp[s+1].y - wp[s].y) * t2
                        });
                        break;
                    }
                    cum += segLens[s];
                }
            }
            if (D === 'right') pts.reverse();
            break;
        }
        case 'scallop': {
            const scFlip   = G.variant.flip   || 1;
            const scArches = G.variant.arches || 4;
            const rx = (w - 2*m) / (2 * scArches);
            const ry = Math.min(rx * 0.85, (G.variant.amp || 0.26) * h);
            for (let i = 0; i <= STEPS; i++) {
                const t = i / STEPS;
                const pos  = t * scArches;
                const aIdx = Math.min(Math.floor(pos), scArches - 1);
                const aT   = pos - aIdx;
                const cx_a = m + rx + aIdx * 2 * rx;
                const theta = Math.PI + aT * Math.PI;
                pts.push({
                    x: cx_a + rx * Math.cos(theta),
                    y: cy + ry * scFlip / 2 + ry * Math.sin(theta) * scFlip
                });
            }
            if (D === 'right') pts.reverse();
            break;
        }
        case 'loop': {
            // Shark fin: always steep rise → gradual fall (direction fixed, never flipped)
            // D='right' → reverse fin order so steep side is still the "entry" side
            const nFins = G.variant.loops || 3;
            const rr    = 0.20;  // 20% steep rise, 80% gradual fall
            const fw    = (w - 2*m) / nFins;
            const amp   = Math.min((G.variant.amp || 0.38) * h, (h - 30) / 2);
            // finAf: concave rise (1-cos), convex fall (cos)
            const finAf = ft => ft <= rr
                ? 1 - Math.cos((ft / rr) * Math.PI / 2)
                : Math.cos(((ft - rr) / (1 - rr)) * Math.PI / 2);
            for (let i = 0; i <= STEPS; i++) {
                const t    = i / STEPS;
                const pos  = t * nFins;
                const fIdx = Math.min(Math.floor(pos), nFins - 1);
                const ft   = pos - fIdx;
                pts.push({ x: m + fIdx * fw + fw * ft, y: cy + amp/2 - amp * finAf(ft) });
            }
            if (D === 'right') {
                pts.length = 0;
                for (let i = 0; i <= STEPS; i++) {
                    const t    = i / STEPS;
                    const pos  = t * nFins;
                    const fIdx = Math.min(Math.floor(pos), nFins - 1);
                    const ft   = pos - fIdx;
                    const ftM  = 1 - ft;
                    pts.push({ x: w - m - fIdx * fw - fw * ft, y: cy + amp/2 - amp * finAf(ftM) });
                }
            }
            break;
        }
    }
    // If direction is top/bottom, rotate path 90°: (x,y) → (y, x)
    if (isVert) {
        G.path = pts.map(p => ({ x: p.y, y: p.x }));
    } else {
        G.path = pts;
    }
}

function resetDraw() { G.drawing=false; G.over=false; G.pts=[]; G.failed=false; }

// ── Geometry ──
function offsetPath(path, d) {
    return path.map((p,i) => {
        let tx,ty;
        if(i===0){tx=path[1].x-p.x;ty=path[1].y-p.y;}
        else if(i===path.length-1){tx=p.x-path[i-1].x;ty=p.y-path[i-1].y;}
        else{tx=path[i+1].x-path[i-1].x;ty=path[i+1].y-path[i-1].y;}
        const l=Math.hypot(tx,ty)||1;
        return {x:p.x+(-ty/l)*d, y:p.y+(tx/l)*d};
    });
}

function distToPath(px,py) {
    let min=Infinity;
    for(let i=0;i<G.path.length-1;i++){
        const a=G.path[i],b=G.path[i+1];
        const dx=b.x-a.x,dy=b.y-a.y,l2=dx*dx+dy*dy;
        const t=l2===0?0:Math.max(0,Math.min(1,((px-a.x)*dx+(py-a.y)*dy)/l2));
        min=Math.min(min,Math.hypot(px-(a.x+t*dx),py-(a.y+t*dy)));
    }
    return min;
}

function near(px,py,pt,r){ return Math.hypot(px-pt.x,py-pt.y)<r; }

// ── Render ──
function render() {
    const w=LW,h=LH,tol=TOL[G.diff],path=G.path;
    ctx.clearRect(0,0,w,h);
    ctx.fillStyle='#FAFAF8'; ctx.fillRect(0,0,w,h);
    if(!path.length) return;

    const up=offsetPath(path,-tol), lo=offsetPath(path,tol);

    // Band fill
    ctx.beginPath();
    ctx.moveTo(up[0].x,up[0].y);
    up.forEach(p=>ctx.lineTo(p.x,p.y));
    lo.slice().reverse().forEach(p=>ctx.lineTo(p.x,p.y));
    ctx.closePath();
    ctx.fillStyle='rgba(91,200,134,.06)'; ctx.fill();

    // Band borders
    [up,lo].forEach(pts=>{
        ctx.beginPath();
        ctx.moveTo(pts[0].x,pts[0].y);
        pts.forEach(p=>ctx.lineTo(p.x,p.y));
        ctx.strokeStyle='rgba(91,200,134,.25)';
        ctx.lineWidth=1; ctx.setLineDash([6,6]); ctx.stroke(); ctx.setLineDash([]);
    });

    // Center guide
    ctx.beginPath();
    ctx.moveTo(path[0].x,path[0].y);
    path.forEach(p=>ctx.lineTo(p.x,p.y));
    ctx.strokeStyle='rgba(110,90,70,.70)';
    ctx.lineWidth=2.5; ctx.setLineDash([6,6]); ctx.stroke(); ctx.setLineDash([]);

    // User path
    if(G.pts.length>1){
        ctx.beginPath();
        ctx.moveTo(G.pts[0].x,G.pts[0].y);
        G.pts.forEach(p=>ctx.lineTo(p.x,p.y));
        ctx.strokeStyle=G.failed?'#F07070':'#5BC886';
        ctx.lineWidth=4; ctx.lineCap='round'; ctx.lineJoin='round'; ctx.stroke();
    }

    // 출발 / 골인 markers
    mkr(path[0].x,path[0].y,'#5BC886','출발');
    mkr(path[path.length-1].x,path[path.length-1].y,'#F07070','골인');
}

function mkr(x,y,color,label){
    const r=14;
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle=color; ctx.fill();
    ctx.strokeStyle='white'; ctx.lineWidth=1.5; ctx.stroke();
    ctx.fillStyle='white'; ctx.font='bold 8px \'Noto Sans KR\', sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(label,x,y);
}

// ── Input ──
function getPos(e){
    const r=gc.getBoundingClientRect();
    const s=e.touches?e.touches[0]:e;
    // CSS rotate(90deg) 폴백 시 좌표 보정
    if (gameView.classList.contains('force-landscape')) {
        const rx = (s.clientX - r.left) / r.width;
        const ry = (s.clientY - r.top) / r.height;
        return { x: ry * LW, y: (1 - rx) * LH };
    }
    return {x:(s.clientX-r.left)*(LW/r.width), y:(s.clientY-r.top)*(LH/r.height)};
}

gc.addEventListener('touchstart', onStart, {passive:false});
gc.addEventListener('touchmove',  onMove,  {passive:false});
gc.addEventListener('touchend',   onEnd,   {passive:false});
gc.addEventListener('mousedown',  onStart);
gc.addEventListener('mousemove',  onMove);
gc.addEventListener('mouseup',    onEnd);

function onStart(e){
    e.preventDefault(); if(G.over) return;
    const p=getPos(e);
    if(!near(p.x,p.y,G.path[0],24)){ hint('출발 지점에서 시작하세요'); return; }
    G.drawing=true; G.pts=[p]; G.failed=false;
    document.getElementById('result-wrap').innerHTML='';
    document.getElementById('instr').textContent='';
    render();
}

const MIN_DRAW_DIST = 10;
function onMove(e){
    e.preventDefault(); if(!G.drawing||G.over) return;
    const p=getPos(e);
    const last=G.pts[G.pts.length-1];
    if(last){const dx=p.x-last.x,dy=p.y-last.y; if(dx*dx+dy*dy<MIN_DRAW_DIST*MIN_DRAW_DIST) return;}
    G.pts.push(p);
    if(distToPath(p.x,p.y)>TOL[G.diff]) G.failed=true;
    if(near(p.x,p.y,G.path[G.path.length-1],24)){ G.drawing=false; G.over=true; showResult(); }
    render();
}

function onEnd(e){
    e.preventDefault();
    if(G.drawing){ G.drawing=false; if(!G.over) hint('골인 지점까지 끝까지 그으세요'); }
}

// ── Result ──
function accuracy(){
    if(!G.pts.length) return 0;
    const tol=TOL[G.diff];
    return Math.round(G.pts.filter(p=>distToPath(p.x,p.y)<=tol).length/G.pts.length*100);
}

function hint(msg){
    document.getElementById('result-wrap').innerHTML='<div class="res-msg info">'+msg+'</div>';
}

function showResult(){
    const acc=accuracy(), ok=!G.failed;
    document.getElementById('instr').textContent='';
    document.getElementById('result-emoji').textContent = ok ? '🎉' : '😅';
    document.getElementById('result-text').textContent = ok ? '성공!' : '선을 벗어났어요';
    document.getElementById('result-sub').textContent = '정확도 '+acc+'%  (' + (G.turn + 1) + '/' + TOTAL_TURNS + ')';
    document.getElementById('btn-next-turn').textContent = G.turn >= TOTAL_TURNS - 1 ? '결과 확인' : '완료';
    document.getElementById('result-overlay').classList.add('active');
    speak(ok ? '잘했어요!' : '선을 벗어났어요. 다시 해봐요.');
}

function retry(){
    document.getElementById('result-overlay').classList.remove('active');
    initCanvas();
    if (['curve','zigzag','spring','squarewave','scallop','loop'].includes(G.type)) { pickVariant(); }
    genPath(); resetDraw();
    document.getElementById('instr').textContent='출발에서 시작하여 골인까지 선을 그으세요';
    render();
}

function buildProgressDots() {
    const container = document.getElementById('progress-dots');
    container.innerHTML = '';
    for (let i = 0; i < TOTAL_TURNS; i++) {
        const dot = document.createElement('div');
        dot.className = 'progress-dot';
        container.appendChild(dot);
    }
}

function updateProgress() {
    const dots = document.querySelectorAll('.progress-dot');
    dots.forEach((dot, i) => {
        dot.className = 'progress-dot';
        if (i < G.turn) dot.classList.add('done');
        else if (i === G.turn) dot.classList.add('current');
    });
    document.getElementById('progress-label').textContent = (G.turn + 1) + '/' + TOTAL_TURNS;
}

function saveCurrentDrawing() {
    const tmpCanvas = document.createElement('canvas');
    const dpr = window.devicePixelRatio || 1;
    tmpCanvas.width = gc.width;
    tmpCanvas.height = gc.height;
    const tmpCtx = tmpCanvas.getContext('2d');
    tmpCtx.scale(dpr, dpr);
    const w = LW, h = LH, tol = TOL[G.diff], path = G.path;
    tmpCtx.fillStyle = '#FAFAF8';
    tmpCtx.fillRect(0, 0, w, h);
    // Faint guide band
    if (path.length) {
        const up = offsetPath(path, -tol), lo = offsetPath(path, tol);
        tmpCtx.beginPath();
        tmpCtx.moveTo(up[0].x, up[0].y);
        up.forEach(p => tmpCtx.lineTo(p.x, p.y));
        lo.slice().reverse().forEach(p => tmpCtx.lineTo(p.x, p.y));
        tmpCtx.closePath();
        tmpCtx.fillStyle = 'rgba(91,200,134,.08)';
        tmpCtx.fill();
        // Center guide
        tmpCtx.beginPath();
        tmpCtx.moveTo(path[0].x, path[0].y);
        path.forEach(p => tmpCtx.lineTo(p.x, p.y));
        tmpCtx.strokeStyle = 'rgba(110,90,70,.25)';
        tmpCtx.lineWidth = 1.5;
        tmpCtx.setLineDash([4, 4]);
        tmpCtx.stroke();
        tmpCtx.setLineDash([]);
    }
    // User path
    if (G.pts.length > 1) {
        tmpCtx.beginPath();
        tmpCtx.moveTo(G.pts[0].x, G.pts[0].y);
        G.pts.forEach(p => tmpCtx.lineTo(p.x, p.y));
        tmpCtx.strokeStyle = G.failed ? '#F07070' : '#5BC886';
        tmpCtx.lineWidth = 4;
        tmpCtx.lineCap = 'round';
        tmpCtx.lineJoin = 'round';
        tmpCtx.stroke();
    }
    return tmpCanvas.toDataURL('image/png');
}

// ── Line Drawing Analysis ──
function analyzeLineDrawing(history, canvasW, canvasH) {
    if (!history || history.length === 0) return null;

    let totalShakiness = 0, shakyCount = 0;
    let totalDeviation = 0, deviationCount = 0;
    let failCount = 0;
    let slowStrokeTurns = 0;

    history.forEach(item => {
        const pts = item.pts || [];
        const path = item.path || [];
        if (!item.ok) failCount++;

        // 떨림: 각 점이 전후 점의 중간에서 얼마나 벗어나는지
        if (pts.length >= 3) {
            let dev = 0;
            for (let i = 1; i < pts.length - 1; i++) {
                const ex = (pts[i-1].x + pts[i+1].x) / 2;
                const ey = (pts[i-1].y + pts[i+1].y) / 2;
                dev += Math.hypot(pts[i].x - ex, pts[i].y - ey);
            }
            totalShakiness += dev / pts.length;
            shakyCount++;
        }

        // 가이드 경로와의 평균 편차 (정확도)
        if (pts.length > 0 && path.length > 1) {
            let totalDev = 0;
            pts.forEach(p => {
                // 가이드 경로의 각 세그먼트까지 최소 거리
                let minDist = Infinity;
                for (let i = 0; i < path.length - 1; i++) {
                    const ax = path[i].x, ay = path[i].y;
                    const bx = path[i+1].x, by = path[i+1].y;
                    const dx = bx - ax, dy = by - ay;
                    const len2 = dx*dx + dy*dy;
                    if (len2 === 0) { minDist = Math.min(minDist, Math.hypot(p.x-ax, p.y-ay)); continue; }
                    const t = Math.max(0, Math.min(1, ((p.x-ax)*dx + (p.y-ay)*dy) / len2));
                    minDist = Math.min(minDist, Math.hypot(p.x - (ax+t*dx), p.y - (ay+t*dy)));
                }
                totalDev += minDist;
            });
            totalDeviation += totalDev / pts.length;
            deviationCount++;
        }

        // 획 길이가 너무 짧으면 조심스럽게 쓰는 것
        const totalLen = pts.reduce((acc, _, i, arr) => {
            if (i === 0) return 0;
            return acc + Math.hypot(arr[i].x - arr[i-1].x, arr[i].y - arr[i-1].y);
        }, 0);
        const pathLen = path.reduce((acc, _, i, arr) => {
            if (i === 0) return 0;
            return acc + Math.hypot(arr[i].x - arr[i-1].x, arr[i].y - arr[i-1].y);
        }, 0);
        if (pathLen > 0 && totalLen < pathLen * 0.5) slowStrokeTurns++;
    });

    const avgShakiness = shakyCount > 0 ? totalShakiness / shakyCount : 0;
    const avgDeviation = deviationCount > 0 ? totalDeviation / deviationCount : 0;
    const failRate = failCount / history.length;
    const slowRate = slowStrokeTurns / history.length;

    const lines = [];

    // 떨림 피드백
    if (avgShakiness > 4) {
        lines.push('선이 많이 떨려요.');
        lines.push('손에 힘을 빼고 팔 전체로 부드럽게 그어보세요.');
    } else if (avgShakiness > 2) {
        lines.push('선이 조금 흔들려요. 팔꿈치를 책상에 고정하고 천천히 그어보세요.');
    } else if (avgShakiness < 0.8) {
        lines.push('선이 안정적으로 잘 그어졌어요! 힘 조절이 좋아요.');
    }

    // 정확도 피드백
    if (avgDeviation > canvasH * 0.12) {
        lines.push('경로에서 많이 벗어났어요.');
        lines.push('출발점과 도착점을 먼저 눈으로 확인하고 그어보세요.');
    } else if (avgDeviation > canvasH * 0.06) {
        lines.push('경로를 조금 더 따라가 보세요. 시선을 도착점에 고정하면 더 정확해져요.');
    } else if (avgDeviation <= canvasH * 0.04 && deviationCount > 0) {
        lines.push('경로를 아주 정확하게 따라갔어요!');
    }

    // 실패율 피드백
    if (failRate > 0.5 && lines.length < 2) {
        lines.push('선이 자주 벗어났어요.');
        lines.push('너무 빠르게 긋지 말고 천천히 조준하면서 그어보세요.');
    }

    // 소극적 쓰기
    if (slowRate > 0.5 && lines.length < 2) {
        lines.push('선을 끝까지 이어서 그어보세요.');
        lines.push('도착점까지 자신 있게 쭉 그어봐요.');
    }

    if (lines.length === 0) return '선 긋기 실력이 좋아요! 자세와 힘 조절 모두 안정적이에요.';
    return lines.slice(0, 2).join('<br>');
}

/* ── localStorage / 문제별 실시간 기록 ── */
var _VK='sm_visits_'+_AK;
var _obsv=null,_prevQ=0,_prevSc=0;

function _gv(){try{return JSON.parse(localStorage.getItem(_VK))||[];}catch(e){return [];}}

function _startSession(mod){
  var today=new Date().toISOString().split('T')[0];
  var vv=_gv();
  var en=vv.find(function(x){return x.date===today;});
  if(!en){en={date:today,sessions:[],totalProblems:0,totalCorrect:0};vv.push(en);}
  en.sessions.push({total:0,correct:0,mode:mod,t:Date.now()});
  localStorage.setItem(_VK,JSON.stringify(vv));
}

function _recProblem(isCorrect){
  var today=new Date().toISOString().split('T')[0];
  var vv=_gv();
  var en=vv.find(function(x){return x.date===today;});
  if(!en) return;
  var sess=en.sessions[en.sessions.length-1];
  if(!sess) return;
  sess.total++;
  if(isCorrect) sess.correct++;
  en.totalProblems=(en.totalProblems||0)+1;
  if(isCorrect) en.totalCorrect=(en.totalCorrect||0)+1;
  localStorage.setItem(_VK,JSON.stringify(vv));
}

function _startObserving(){
  _stopObserving();
  var ql=document.getElementById('q-label')||document.getElementById('question-number')||document.getElementById('progress-label')||document.getElementById('dq-label')||document.getElementById('cv-question');
  var sl=document.getElementById('play-score')||document.getElementById('dscore')||document.getElementById('correctCount');
  _prevQ=1; _prevSc=0;
  if(ql){
    _obsv=new MutationObserver(function(){
      var m=(ql.textContent||'').match(/(\d+)/);
      if(!m) return;
      var qn=parseInt(m[1]);
      if(qn>_prevQ){
        var sc=parseInt((sl?sl.textContent:'0').replace(/[^0-9]/g,''))||0;
        _recProblem(sc>_prevSc);
        _prevSc=sc; _prevQ=qn;
      }
    });
    _obsv.observe(ql,{childList:true,characterData:true,subtree:true});
  } else if(sl){
    _prevSc=parseInt((sl.textContent||'').replace(/[^0-9]/g,''))||0;
    _obsv=new MutationObserver(function(){
      var sc=parseInt((sl.textContent||'').replace(/[^0-9]/g,''))||0;
      if(sc>_prevSc){ _recProblem(true); _prevSc=sc; }
    });
    _obsv.observe(sl,{childList:true,characterData:true,subtree:true});
  }
}

function _stopObserving(){
  if(_obsv){_obsv.disconnect();_obsv=null;}
}

function _recVisit(){
  if(_LK&&!localStorage.getItem(_LK)) return;
  var today=new Date().toISOString().split('T')[0];
  var vv=_gv();
  if(!vv.find(function(x){return x.date===today;})){
    vv.push({date:today,sessions:[],totalProblems:0,totalCorrect:0});
    localStorage.setItem(_VK,JSON.stringify(vv));
  }
}

window._smRec=function(isCorrect){ try{ _recProblem(!!isCorrect); }catch(e){} };
window._smStart=function(mode){ try{ _startSession(mode==null?null:mode); }catch(e){} };

var _MN=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

function _rCal(){
  var lbl=document.getElementById('sm-clbl');
  if(lbl) lbl.textContent=_cy+'년 '+_MN[_cm];
  var vv=_gv();var vm={};vv.forEach(function(v){vm[v.date]=v;});
  var today=new Date().toISOString().split('T')[0];
  var first=new Date(_cy,_cm,1).getDay();
  var days=new Date(_cy,_cm+1,0).getDate();
  var mT=0,mC=0,mD=0;
  for(var d=1;d<=days;d++){
    var ds=_cy+'-'+String(_cm+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    if(vm[ds]){mD++;mT+=vm[ds].totalProblems||0;mC+=vm[ds].totalCorrect||0;}
  }
  var su=document.getElementById('sm-msum');
  if(su) su.innerHTML=[
    '<div class="sm-mc"><div class="sm-mn">'+mD+'</div><div class="sm-ml">방문 일수</div></div>',
    '<div class="sm-mc"><div class="sm-mn">'+mT+'</div><div class="sm-ml">푼 문제 수</div></div>',
    '<div class="sm-mc"><div class="sm-mn">'+(mT>0?Math.round(mC/mT*100):0)+'%</div><div class="sm-ml">정답률</div></div>',
  ].join('');
  var body=document.getElementById('sm-cbody');
  if(!body) return;
  var html='<tr>';
  for(var i=0;i<first;i++) html+='<td><div class="sm-cd"></div></td>';
  for(var d=1;d<=days;d++){
    var ds=_cy+'-'+String(_cm+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    var cls='sm-cd';
    if(vm[ds]) cls+=' smd';
    if(ds===today) cls+=' smt';
    var cl=vm[ds]?'onclick="window._smDD(\''+ds+'\')"':'';
    html+='<td><div class="'+cls+'" '+cl+'>'+d+'</div></td>';
    if((first+d-1)%7===6&&d<days) html+='</tr><tr>';
  }
  body.innerHTML=html+'</tr>';
  var _recent=null;
  for(var _rd=days;_rd>=1;_rd--){
    var _rs=_cy+'-'+String(_cm+1).padStart(2,'0')+'-'+String(_rd).padStart(2,'0');
    if(vm[_rs]&&(vm[_rs].totalProblems||0)>0){_recent=_rs;break;}
  }
  if(_recent) window._smDD(_recent);
  else document.getElementById('sm-ddet').classList.add('smh');
  _rTrend();
}

function _rTrend(){
  var el=document.getElementById('sm-trend');
  if(!el) return;
  var vv=_gv();
  var monthData=vv.filter(function(v){
    var p=(v.date||'').split('-');
    return p.length===3 && parseInt(p[0])===_cy && parseInt(p[1])===_cm+1 && (v.totalProblems||0)>0;
  }).sort(function(a,b){return a.date<b.date?-1:1;});
  if(monthData.length===0){
    el.innerHTML='<div class="sm-tg-title">이달의 학습 추이</div><div class="sm-tg-empty">이번 달 기록이 없어요</div>';
    return;
  }
  var W=320,H=120,pad=14,bot=24,top=12;
  var maxP=0,totalP=0,totalC=0;
  monthData.forEach(function(v){
    if((v.totalProblems||0)>maxP) maxP=v.totalProblems;
    totalP+=v.totalProblems||0; totalC+=v.totalCorrect||0;
  });
  if(maxP<1) maxP=1;
  var innerW=W-pad*2;
  var n=monthData.length;
  var step=innerW/n;
  var barW=Math.max(2,Math.min(28,step*0.62));
  var chartH=H-top-bot;
  var midY=top+chartH*0.5;
  var refLine='<line x1="'+pad+'" y1="'+midY.toFixed(1)+'" x2="'+(W-pad)+'" y2="'+midY.toFixed(1)+'" stroke="#E0DAD2" stroke-width="0.7" stroke-dasharray="2,3"/>';
  var bars='',labels='';
  monthData.forEach(function(v,i){
    var cx=pad+step*(i+0.5);
    var probH=((v.totalProblems||0)/maxP)*chartH;
    var by=top+(chartH-probH);
    bars+='<rect x="'+(cx-barW/2).toFixed(1)+'" y="'+by.toFixed(1)+'" width="'+barW.toFixed(1)+'" height="'+probH.toFixed(1)+'" rx="2.5" fill="#6BADE8" opacity="0.85" style="cursor:pointer" onclick="window._smDD(\''+v.date+'\')"/>';
    var day=parseInt((v.date||'').split('-')[2])||0;
    var showLbl=(n<=10)||(i%Math.ceil(n/10)===0)||(i===n-1);
    if(showLbl){
      labels+='<text x="'+cx.toFixed(1)+'" y="'+(H-8).toFixed(1)+'" text-anchor="middle" font-size="9" fill="#8C8070" font-weight="600">'+day+'일</text>';
    }
  });
  var axisY=top+chartH+0.5;
  var axis='<line x1="'+pad+'" y1="'+axisY+'" x2="'+(W-pad)+'" y2="'+axisY+'" stroke="#E0DAD2" stroke-width="1"/>';
  var maxLbl='<text x="'+pad+'" y="'+(top-2)+'" font-size="8" fill="#B8AD9E" font-weight="600">최대 '+maxP+'문제</text>';
  var midPVal=maxP/2;
  var midPStr=(midPVal===Math.floor(midPVal))?String(midPVal):midPVal.toFixed(1);
  var midLbl='<text x="'+pad+'" y="'+(midY-2).toFixed(1)+'" font-size="7" fill="#B8AD9E" font-weight="600">'+midPStr+'문제</text>';
  var svg='<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="월별 시간 내 추이">'+refLine+axis+maxLbl+midLbl+bars+labels+'</svg>';
  var avgP=Math.round(totalP/monthData.length);
  var acc=totalP>0?Math.round(totalC/totalP*100):0;
  var summary='<div class="sm-tg-sum">일평균 <b>'+avgP+'</b>문제 · 정답률 <b>'+acc+'</b>%</div>';
  el.innerHTML='<div class="sm-tg-title">이달의 학습 추이</div><div class="sm-tg-chart">'+svg+'</div>'+summary;
}

window._smDD=function(ds){
  var vv=_gv();var v=vv.find(function(x){return x.date===ds;});
  var el=document.getElementById('sm-ddet');
  if(!el) return;
  if(!v){el.classList.add('smh');return;}
  var d=new Date(ds+'T00:00:00');
  var dl=(d.getMonth()+1)+'월 '+d.getDate()+'일';
  el.classList.remove('smh');
  el.innerHTML='<div class="sm-dt">📅 '+dl+' 기록</div>'
    +'<div class="sm-dr"><span class="sm-dl">총 푼 문제</span><span class="sm-dv">'+v.totalProblems+'문제</span></div>'
    +'<div class="sm-dr"><span class="sm-dl">정답</span><span class="sm-dv">'+v.totalCorrect+'개 <span class="sm-db">'+(v.totalProblems>0?Math.round(v.totalCorrect/v.totalProblems*100):0)+'%</span></span></div>';
};

/* ── 마이 ── */
function _rMy(){

  var em=document.getElementById('sm-my-em');

/* ── 초기화 ── */
var _gameViewIds=['play-view','game-view','playView','gameView','result-view','resultView','quiz-view','drag-view','fill-view','wn-view','wrong-notes-view','wrongNotesView'];
function _anyGameVisible(){
  for(var i=0;i<_gameViewIds.length;i++){
    var el=document.getElementById(_gameViewIds[i]);
    if(!el) continue;
    if(el.classList.contains('hidden')||el.classList.contains('smh')) continue;
    var cs=window.getComputedStyle(el);
    if(cs.display!=='none') return true;
  }
  return false;
}
var _smSessionActive=false;
function _syncBarToGame(){
  var _vis=_anyGameVisible();
  if(_vis){
    _showBar(false);
    if(!_smSessionActive){
      try{ _startSession(null); }catch(e){}
      _smSessionActive=true;
      setTimeout(function(){ try{ _startObserving(); }catch(e){} },150);
    }
  } else {
    _showBar(true);
    if(_smSessionActive){
      try{ _stopObserving(); }catch(e){}
      _smSessionActive=false;
    }
  }
}
setTimeout(function(){
  _showBar(true);
  if(_isLI()) _recVisit();
  _gameViewIds.forEach(function(id){
    var el=document.getElementById(id);
    if(!el) return;
    try{ new MutationObserver(_syncBarToGame).observe(el,{attributes:true,attributeFilter:['class','style']}); }catch(e){}
  });
  _syncBarToGame();
  var lbs=document.querySelectorAll('.logout-btn');
  for(var i=0;i<lbs.length;i++){
    var lb=lbs[i];
    lb.removeAttribute('onclick');
    lb.onclick=null;
    lb.addEventListener('click',function(e){
      e.preventDefault();
      e.stopImmediatePropagation();
      window._smLogout();
    },true);
  }
},250);

})();
</script>

<style>
#sm-welcome-overlay {
  position: fixed; inset: 0; z-index: 99999;
  background: rgba(0,0,0,0.45);
  display: flex; align-items: center; justify-content: center;
  padding: 24px;

}
@keyframes smWelcomeFade { from { opacity: 0; } to { opacity: 1; } }
@keyframes smWelcomePop  { from { transform: scale(.92); opacity: 0; } to { transform: scale(1); opacity: 1; } }
#sm-welcome-overlay .sm-welcome-card {
  background: #FFFDF8;
  border: 1.5px solid #EDE0CC;
  border-radius: 22px;
  box-shadow: 0 12px 40px rgba(0,0,0,0.22);
  padding: 32px 28px 24px;
  width: 100%; max-width: 300px;
  text-align: center;
  animation: smWelcomePop .22s cubic-bezier(.2,.8,.2,1.05);
}
#sm-welcome-overlay .sm-welcome-emoji {
  font-size: 2.75rem; margin-bottom: 10px; line-height: 1;
}
#sm-welcome-overlay .sm-welcome-title {
  font-size: 1.2rem; font-weight: 900; color: #4A4035;
  margin-bottom: 10px; letter-spacing: -0.01em;
}
#sm-welcome-overlay .sm-welcome-desc {
  font-size: 0.88rem; color: #7B6545; line-height: 1.65; margin-bottom: 22px;
}
#sm-welcome-overlay .sm-welcome-btn {
  display: block; width: 100%;
  background: #6BADE8; color: #fff;
  border: none; border-radius: 14px;
  padding: 15px 0;
  font-size: 1rem; font-weight: 700; font-family: inherit;
  cursor: pointer;
  box-shadow: 0 4px 12px rgba(107,173,232,.3);
}
#sm-welcome-overlay .sm-welcome-btn:active { transform: scale(0.98); }
</style>
<script>
(function(){
  if (window.__smWelcomeInstalled) return;
  window.__smWelcomeInstalled = true;

  function showWelcome(){
    if (document.getElementById('sm-welcome-overlay')) return;
    var ov = document.createElement('div');
    ov.id = 'sm-welcome-overlay';
    ov.innerHTML =
      '<div class="sm-welcome-card" role="dialog" aria-modal="true">' +
        '<div class="sm-welcome-emoji">🎉</div>' +
        '<div class="sm-welcome-title">가입을 환영합니다!</div>' +
        '<div class="sm-welcome-desc">지금부터 하루 동안 모든 기능을<br>무료로 이용하실 수 있어요</div>' +
        '<button type="button" class="sm-welcome-btn">시작하기</button>' +
      '</div>';
    document.body.appendChild(ov);
    function close(e){
      if (e) { try { e.preventDefault(); e.stopPropagation(); } catch(_){} }
      if (ov && ov.parentNode) ov.parentNode.removeChild(ov);
    }
    var _btn = ov.querySelector('.sm-welcome-btn');
    // click + touchend 양쪽 바인딩: dot2dot 등 landscape 앱은 document 레벨에서
    // touchstart preventDefault 를 걸어 synthetic click 이 나오지 않으므로
    // touchend 를 명시적으로 받아 팝업을 닫는다.
    ['click','touchend'].forEach(function(ev){ _btn.addEventListener(ev, close); });
    ['click','touchend'].forEach(function(ev){
      ov.addEventListener(ev, function(e){ if (e.target === ov) close(e); });
    });
  }
  window._smShowWelcome = showWelcome;

  function wrap(name){
    var fn = window[name];
    if (typeof fn !== 'function' || fn.__smWelcomeWrapped) return false;
    var wrapped = function(){
      var r = fn.apply(this, arguments);
      try { setTimeout(showWelcome, 80); } catch(e) {}
      return r;
    };
    wrapped.__smWelcomeWrapped = true;
    window[name] = wrapped;
    return true;
  }

  function wrapAll(){
    wrap('socialLogin');
    wrap('doLogin');
  }

  // Re-wrap periodically; inline patches may redefine these after us.
  wrapAll();
  var tries = 0;
  var iv = setInterval(function(){
    wrapAll();
    if (++tries > 20) clearInterval(iv);
  }, 300);
})();
</script>
