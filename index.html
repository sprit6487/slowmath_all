<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slowmath</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      padding: 40px 20px;
    }
    h1 {
      text-align: center;
      font-size: 2rem;
      margin-bottom: 32px;
      color: #333;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 16px;
      max-width: 960px;
      margin: 0 auto;
    }
    .grid a {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px 16px;
      background: #fff;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      text-decoration: none;
      color: #333;
      font-size: 1rem;
      font-weight: 600;
      transition: background 0.15s, border-color 0.15s, transform 0.15s;
    }
    .grid a:hover {
      background: #4a90d9;
      border-color: #4a90d9;
      color: #fff;
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <h1>Slowmath</h1>
  <div class="grid">

    <a href="./slowmath_clock/">Clock</a>

    <a href="./slowmath_comparing/">Comparing</a>
    <a href="./slowmath_comparing2/">Comparing 2</a>

    <a href="./slowmath_complement/">Complement</a>
    <a href="./slowmath_dice/">Dice</a>
    <a href="./slowmath_dot2dot/">Dot to Dot</a>
    <a href="./slowmath_easy/">Easy</a>
    <a href="./slowmath_linedraw/">Line Draw</a>
    <a href="./slowmath_matching/">Matching</a>
    <a href="./slowmath_number/">Number</a>
    <a href="./slowmath_numberdraw/">Number Draw</a>
    <a href="./slowmath_pattern/">Pattern</a>
    <a href="./slowmath_plusone/">Plus One</a>
    <a href="./slowmath_plusthree/">Plus Three</a>
    <a href="./slowmath_plustwo/">Plus Two</a>
    <a href="./slowmath_splitting/">Splitting</a>
    <a href="./slowmath_timestables/">Times Tables</a>
  </div>
</body>
</html>
