<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>느린아이 시리즈</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      padding: 40px 20px;
    }
    h1 {
      text-align: center;
      font-size: 2rem;
      margin-bottom: 32px;
    }
    h1 .blue { color: #4a90d9; }
    h1 .orange { color: #F0A050; }
    h1 .black { color: #333; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 16px;
      max-width: 960px;
      margin: 0 auto;
    }
    .grid a {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 20px 16px;
      min-height: 140px;
      background: #fff;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      text-decoration: none;
      color: #333;
      font-size: 0.95rem;
      font-weight: 600;
      transition: background 0.15s, border-color 0.15s, transform 0.15s;
      text-align: center;
    }
    @media (hover: hover) {
      .grid a:hover {
        background: #4a90d9;
        border-color: #4a90d9;
        color: #fff;
        transform: translateY(-2px);
      }
      .grid a:hover svg * {
        fill: #fff;
        stroke: #fff;
      }
    }
    .grid a:active {
      background: #4a90d9;
      border-color: #4a90d9;
      color: #fff;
    }
    .grid a:active svg * {
      fill: #fff;
      stroke: #fff;
    }
    .icon { font-size: 2rem; line-height: 1; height: 56px; display: flex; align-items: center; justify-content: center; }
    .icon svg { display: block; }
  </style>
</head>
