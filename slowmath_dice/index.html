<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>느린아이 세기</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Noto Sans KR', sans-serif;
  background: #F5F1EB;
  color: #4A4035;
  min-height: 100dvh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
}

.app {
  width: 100%;
  max-width: 480px;
  min-height: 100dvh;
  background: white;
  padding: 24px 20px;
  padding-top: max(24px, env(safe-area-inset-top));
  padding-bottom: max(24px, env(safe-area-inset-bottom));
  display: flex;
  flex-direction: column;
}

@media (min-width: 768px) {
  body { align-items: center; padding: 32px; }
  .app {
    max-width: 560px;
    min-height: auto;
    border-radius: 32px;
    box-shadow: 0 8px 48px rgba(0,0,0,0.07), 0 1px 4px rgba(0,0,0,0.04);
    padding: 44px 40px;
  }
}

.hidden { display: none !important; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.fade-in { animation: fadeIn 0.3s ease-out; }

/* =========================================
   START VIEW
   ========================================= */

.logo-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-bottom: 20px;
  position: relative;
  width: 100%;
}

.turtle-logo {
  display: inline-block;
  margin-bottom: 0;
}

#startView h1 {
  font-size: 1.6rem;
  font-weight: 900;
  letter-spacing: -0.025em;
  margin-top: 8px; margin-bottom: 0;
  text-align: center;
}

.app-desc {
  color: #B8AD9E;
  font-size: 0.8rem;
  margin-bottom: 0;
  text-align: center;
}

.settings-section {
  margin-bottom: 20px;
}

.section-label {
  font-size: 0.75rem;
  font-weight: 700;
  color: #B8AD9E;
  letter-spacing: 0.05em;
  margin-bottom: 0.5rem;
  display: block;
  text-align: left;
}

/* 설정 (plusone 스타일) */
.setting-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.setting-label { font-size: 0.875rem; font-weight: 600; color: #4A4035; }
.setting-desc { font-size: 0.75rem; color: #B8AD9E; margin-top: 2px; }

.select-group {
  display: flex;
  gap: 8px;
}

.select-item {
  flex: 1;
  padding: 14px 16px;
  border-radius: 14px;
  border: 2px solid #E8E2DA;
  background: white;
  color: #B8AD9E;
  font-family: inherit;
  font-weight: 600;
  font-size: 0.875rem;
  cursor: pointer;
  transition: all 0.15s;
  text-align: center;
}

.select-item.active {
  background: #FAF5EE;
  border-color: #C4AA82;
  color: #7B6545;
}

.select-item:not(.active):hover {
  border-color: #D0C8BC;
  color: #8C8070;
}

/* Toggle */
.toggle-track {
  width: 48px;
  height: 28px;
  border-radius: 99px;
  position: relative;
  background: #E0DAD0;
  transition: background 0.2s;
  cursor: pointer;
  flex-shrink: 0;
  border: none;
  outline: none;
}

.toggle-track.on { background: #5BC886; }

.toggle-knob {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: white;
  position: absolute;
  top: 3px;
  left: 3px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.12);
  transition: transform 0.2s;
}

.toggle-track.on .toggle-knob { transform: translateX(20px); }

/* Impulse Mode Options */
.impulse-mode-options {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 7px;
  margin-bottom: 9px;
}

.impulse-mode-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 9px 7px;
  border-radius: 13px;
  border: 2px solid #E8E2DA;
  background: white;
  cursor: pointer;
  transition: all 0.15s;
  font-family: inherit;
}

.impulse-mode-btn.selected {
  border-color: #C4AA82;
  background: #FAF5EE;
}

.impulse-mode-icon { font-size: 1.08rem; margin-bottom: 2px; }
.impulse-mode-label { font-size: 0.72rem; font-weight: 700; color: #4A4035; }
.impulse-mode-desc { font-size: 0.59rem; color: #B8AD9E; margin-top: 1px; }

/* Delay Buttons */
.imp-sec-row { display: flex; flex-wrap: wrap; gap: 4px; justify-content: center; }
.imp-sec { flex: 0 0 calc((100% - 16px) / 5); padding: 8px 0; font-size: 0.7rem; font-weight: 600; border-radius: 10px; border: 2px solid #E8E2DA; background: white; color: #8C8070; cursor: pointer; transition: all 0.15s; text-align: center; font-family: inherit; }
.imp-sec.active { border-color: #C4AA82; background: #FAF5EE; color: #7B6545; }

/* Start Button */
.btn-start {
  width: 100%;
  padding: 14px 0;
  border-radius: 16px;
  border: none;
  background: #4A4035;
  color: white;
  font-family: inherit;
  font-size: 1.125rem;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.15s, transform 0.1s;
  box-shadow: 0 2px 8px rgba(74,64,53,0.15);
  margin-top: 24px;
}

.btn-start:active {
  transform: scale(0.98);
  background: #2E261D;
}

/* =========================================
   PLAY VIEW
   ========================================= */

#playView {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.play-header {
  display: flex;
  align-items: center;
  margin-bottom: 16px;
  gap: 12px;
}

.play-title {
  font-size: 1.1rem;
  font-weight: 700;
  flex: 1;
}

.score-board {
  display: flex;
  gap: 10px;
  font-size: 0.8rem;
  color: #B8AD9E;
}

.score-correct b { color: #5BC886; }
.score-wrong b { color: #F07070; }

.btn-home {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  border: 2px solid #E8E2DA;
  background: white;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: background 0.15s;
  font-size: 1rem;
  color: #8C8070;
}

.btn-home:active { background: #F5F1EB; }

/* Play Body */
.play-body {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
}

/* Display Area */
.display-area {
  display: flex;
  gap: 20px;
  justify-content: center;
  align-items: center;
  margin: 16px 0 20px;
  min-height: 150px;
  width: 100%;
}

/* ---- Dice ---- */
.dice-wrapper { position: relative; }

.dice {
  width: 115px;
  height: 115px;
  background: #fff;
  border-radius: 18px;
  display: grid;
  padding: 17px;
  border: 2.5px solid #E8E2DA;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  transition: border-color 0.3s, box-shadow 0.3s;
}

.dice.rolling { animation: roll 0.5s ease-out; }

@keyframes roll {
  0%   { transform: rotateX(0) rotateY(0) scale(0.8); }
  25%  { transform: rotateX(180deg) rotateY(90deg) scale(1.1); }
  50%  { transform: rotateX(360deg) rotateY(180deg) scale(0.95); }
  75%  { transform: rotateX(540deg) rotateY(270deg) scale(1.05); }
  100% { transform: rotateX(720deg) rotateY(360deg) scale(1); }
}

.dice.correct { border-color: #5BC886; box-shadow: 0 0 0 3px rgba(91,200,134,0.25); }
.dice.wrong   { border-color: #F07070; box-shadow: 0 0 0 3px rgba(240,112,112,0.25); }

.dot {
  width: 18px;
  height: 18px;
  background: #111;
  border-radius: 50%;
}

.dice[data-val="1"] { grid-template: 1fr / 1fr; place-items: center; }
.dice[data-val="2"] { grid-template: 1fr 1fr / 1fr; }
.dice[data-val="2"] .dot:nth-child(1) { justify-self: end; align-self: start; }
.dice[data-val="2"] .dot:nth-child(2) { justify-self: start; align-self: end; }
.dice[data-val="3"] { grid-template: 1fr 1fr 1fr / 1fr; }
.dice[data-val="3"] .dot:nth-child(1) { justify-self: end; align-self: start; }
.dice[data-val="3"] .dot:nth-child(2) { justify-self: center; align-self: center; }
.dice[data-val="3"] .dot:nth-child(3) { justify-self: start; align-self: end; }
.dice[data-val="4"] { grid-template: 1fr 1fr / 1fr 1fr; place-items: center; }
.dice[data-val="5"] { grid-template: 1fr 1fr 1fr / 1fr 1fr 1fr; }
.dice[data-val="5"] .dot:nth-child(1) { grid-area: 1/1; justify-self: start; align-self: start; }
.dice[data-val="5"] .dot:nth-child(2) { grid-area: 1/3; justify-self: end; align-self: start; }
.dice[data-val="5"] .dot:nth-child(3) { grid-area: 2/2; justify-self: center; align-self: center; }
.dice[data-val="5"] .dot:nth-child(4) { grid-area: 3/1; justify-self: start; align-self: end; }
.dice[data-val="5"] .dot:nth-child(5) { grid-area: 3/3; justify-self: end; align-self: end; }
.dice[data-val="6"] { grid-template: 1fr 1fr 1fr / 1fr 1fr; place-items: center; }

/* ---- Card ---- */
.card-wrapper { position: relative; }

.card {
  width: 125px;
  height: 174px;
  background: #fff;
  border-radius: 14px;
  border: 2.5px solid #E8E2DA;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 10px 8px;
  position: relative;
  transition: border-color 0.3s, box-shadow 0.3s;
}

.card.correct { border-color: #5BC886; box-shadow: 0 0 0 3px rgba(91,200,134,0.25); }
.card.wrong   { border-color: #F07070; box-shadow: 0 0 0 3px rgba(240,112,112,0.25); }

.card-corner {
  position: absolute;
  font-size: 0.7rem;
  font-weight: 700;
  line-height: 1;
  text-align: center;
}
.card-corner-tl { top: 6px; left: 8px; }
.card-corner-br { bottom: 6px; right: 8px; transform: rotate(180deg); }

.card-symbols {
  position: relative;
  width: 80px;
  height: 112px;
}

.card-sym {
  position: absolute;
  line-height: 1;
  transform: translate(-50%, -50%);
  font-size: 1.3rem;
}
.card-symbols.s1 .card-sym { font-size: 2.6rem; }
.card-symbols.s2 .card-sym,
.card-symbols.s3 .card-sym { font-size: 1.5rem; }
.card-symbols.s4 .card-sym,
.card-symbols.s5 .card-sym,
.card-symbols.s6 .card-sym { font-size: 1.3rem; }
.card-symbols.s7 .card-sym,
.card-symbols.s8 .card-sym { font-size: 1.2rem; }
.card-symbols.s9 .card-sym,
.card-symbols.s10 .card-sym { font-size: 1.05rem; }

.suit-red { color: #d32f2f; }
.suit-black { color: #222; }

.plus-sign {
  font-size: 2rem;
  font-weight: 600;
  color: #C8C0B4;
}

/* ---- Match Mode ---- */
.match-area {
  display: none;
  width: 100%;
  margin-bottom: 12px;
}
.match-row {
  display: flex;
  gap: 20px;
  justify-content: center;
  align-items: center;
  margin-bottom: 8px;
}
.match-drop {
  width: 56px; height: 56px;
  border: 2.5px dashed #D8D2C8;
  border-radius: 14px;
  background: #FDFCFA;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.5rem; font-weight: 900; color: #D8D2C8;
  transition: all 0.18s;
  position: relative;
}
.match-drop.drag-over {
  border-color: #5BC886; border-style: solid;
  background: #D4F5E0;
}
.match-drop.matched {
  border-color: #5BC886; border-style: solid;
  background: #D4F5E0; color: #1A7A3A;
}
.match-drop.wrong-match {
  border-color: #F07070; border-style: solid;
  background: #FDE8E8; color: #B91C1C;
}
.match-chips {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
}
.match-chip {
  width: 52px; height: 52px;
  border-radius: 14px;
  border: 2.5px solid #E8E2DA;
  background: white;
  font-size: 1.4rem; font-weight: 900; color: #4A4035;
  display: flex; align-items: center; justify-content: center;
  cursor: grab; touch-action: none; user-select: none;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
  transition: transform 0.1s, opacity 0.15s;
}
.match-chip:active { cursor: grabbing; transform: scale(1.08); }
.match-chip.used { opacity: 0.3; pointer-events: none; }
.match-chip.floating {
  position: fixed; z-index: 9999; pointer-events: none;
  transform: translate(-50%, -50%) scale(1.1);
  box-shadow: 0 6px 20px rgba(0,0,0,0.2);
}
.match-plus {
  font-size: 1.5rem; font-weight: 600; color: #C8C0B4;
}
.match-eq {
  font-size: 1.2rem; font-weight: 700; color: #C8C0B4;
  text-align: center; margin-top: 4px;
}

/* Question */
.question {
  font-size: 1.05rem;
  color: #B8AD9E;
  margin-bottom: 12px;
  text-align: center;
}

.question .hl {
  color: #7B6545;
  font-weight: 700;
}

/* Feedback */
.feedback {
  min-height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.9375rem;
  font-weight: 700;
  margin-bottom: 12px;
  text-align: center;
}

.feedback.success { color: #5BC886; }
.feedback.fail { color: #F07070; }

/* Delay Countdown */
.delay-countdown {
  text-align: center;
  font-size: 1.5rem;
  font-weight: 900;
  color: #C4AA82;
  padding: 16px 0;
  animation: pulse-count 1s ease infinite;
}
@keyframes pulse-count {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.15); opacity: 0.7; }
}

/* Choice Grid */
.choice-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  width: 100%;
  max-width: 320px;
  margin: 0 auto 16px;
}

.choice-btn {
  padding: 11px 0;
  border: 2px solid #E8E2DA;
  border-radius: 12px;
  background: white;
  color: #4A4035;
  font-family: inherit;
  font-size: 1.1rem;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.1s, border-color 0.15s, background 0.15s;
}

.choice-btn:active:not(:disabled) { transform: scale(0.95); }
.choice-btn:hover:not(:disabled) { border-color: #D0C8BC; }

.choice-btn.correct-choice {
  background: #D4F5E0;
  border-color: #5BC886;
  color: #1A7A3A;
}

.choice-btn.wrong-choice {
  background: #FDE8E8;
  border-color: #F07070;
  color: #B91C1C;
}

/* ---- Finger ---- */
.finger-wrapper { position: relative; }
.finger-display {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 200px;
}
.hand-image {
  display: block;
  max-height: 200px;
  max-width: 260px;
  object-fit: contain;
}

@media (max-width: 360px) {
  .hand-image { max-height: 160px; max-width: 200px; }
  .finger-display { min-height: 170px; }
}
@media (min-width: 600px) {
  .hand-image { max-height: 260px; max-width: 340px; }
  .finger-display { min-height: 270px; }
}
@media (min-width: 768px) {
  .hand-image { max-height: 280px; max-width: 360px; }
  .finger-display { min-height: 300px; }
}

/* Impulse prevention states */
.chips-hidden { visibility: hidden; }
.chips-locked { pointer-events: none; opacity: 0.45; }

.reveal-btn{display:block;width:100%;max-width:320px;margin:0 auto 12px;padding:14px 0;border-radius:14px;border:2px solid #C4AA82;background:#FAF5EE;color:#7B6545;font-family:inherit;font-size:1rem;font-weight:700;cursor:pointer;transition:all .15s;text-align:center;}
.reveal-btn:active{background:#F0E6D6;transform:scale(.98);}

/* Keypad */
.keypad-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  width: 100%;
  max-width: 360px;
  margin: 0 auto 16px;
}

.keypad-display {
  width: 100%;
  font-size: 2.25rem;
  font-weight: 700;
  border: 2.5px solid #E8E2DA;
  border-radius: 16px;
  padding: 16px 0;
  text-align: center;
  color: #D0C8BC;
  background: white;
  transition: all 0.2s;
}

.keypad-display.has-input {
  border-color: #B8AD9E;
  color: #4A4035;
}

.keypad-display.correct-input {
  border-color: #5BC886;
  background: #D4F5E0;
  color: #1A7A3A;
}

.keypad-display.wrong-input {
  border-color: #F07070;
  background: #FDE8E8;
  color: #B91C1C;
}

.keypad-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  width: 100%;
}

.key-btn {
  padding: 14px 0;
  border: 2.5px solid #E8E2DA;
  border-radius: 14px;
  background: white;
  color: #4A4035;
  font-family: inherit;
  font-size: 1.25rem;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.1s, background 0.1s;
}

.key-btn:active:not(:disabled) {
  transform: scale(0.95);
  background: #F5F1EB;
}

.key-btn.key-submit {
  background: #4A4035;
  border-color: #4A4035;
  color: white;
}

.key-btn.key-submit:active:not(:disabled) {
  background: #2E261D;
}

.key-btn.key-del {
  color: #B8AD9E;
}

/* Progress */
.progress-info {
  font-size: 0.8rem;
  font-weight: 700;
  color: #C4AA82;
  white-space: nowrap;
}

/* Result View */
.result-area {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  background: white;
  z-index: 10;
  animation: fadeIn 0.3s ease-out;
}

.result-emoji { font-size: 56px; margin-bottom: 12px; }

.result-title {
  font-size: 1.25rem;
  font-weight: 900;
  margin-bottom: 20px;
  color: #4A4035;
}

.next-btn { margin-top: 8px; padding: 14px 36px; border: none; border-radius: 12px; background: #6BADE8; color: #fff; font-size: 1rem; font-weight: 700; cursor: pointer; font-family: inherit; transition: transform 0.12s; }
.next-btn:active { transform: scale(0.96); }

.result-stats {
  display: flex;
  gap: 24px;
  margin-bottom: 32px;
}

.result-stat {
  text-align: center;
}

.result-stat-value {
  font-size: 2rem;
  font-weight: 900;
}

.result-stat-value.green { color: #5BC886; }
.result-stat-value.red { color: #F07070; }

.result-stat-label {
  font-size: 0.8rem;
  color: #B8AD9E;
  font-weight: 600;
}

.btn-retry {
  width: 100%;
  max-width: 320px;
  padding: 14px 0;
  border-radius: 16px;
  border: none;
  background: #4A4035;
  color: white;
  font-family: inherit;
  font-size: 1.05rem;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.15s, transform 0.1s;
  box-shadow: 0 2px 8px rgba(74,64,53,0.15);
  margin-bottom: 10px;
}

.btn-retry:active {
  transform: scale(0.98);
  background: #2E261D;
}

.btn-back-home {
  width: 100%;
  max-width: 320px;
  padding: 12px 0;
  border-radius: 16px;
  border: 2px solid #E8E2DA;
  background: white;
  color: #8C8070;
  font-family: inherit;
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s;
}

.btn-back-home:active { background: #F5F1EB; }

/* Next Button */
.btn-next {
  display: block;
  width: 100%;
  max-width: 360px;
  margin: 0 auto;
  padding: 14px 0;
  border-radius: 16px;
  border: none;
  background: #4A4035;
  color: white;
  font-family: inherit;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.15s, transform 0.1s;
  box-shadow: 0 2px 8px rgba(74,64,53,0.15);
}

.btn-next:active {
  transform: scale(0.98);
  background: #2E261D;
}

/* =========================================
   Responsive
   ========================================= */

@media (max-width: 400px) {
  .dice { width: 92px; height: 92px; padding: 12px; border-radius: 14px; }
  .dot { width: 14px; height: 14px; }
  .card { width: 100px; height: 138px; }
  .card-symbols { width: 64px; height: 90px; }
  .choice-btn { padding: 10px 0; font-size: 1rem; }
  .key-btn { padding: 12px 0; font-size: 1.1rem; }
}

@media (min-width: 600px) {

<script>
(function() {

  // ---- State ----
  let gameType = 'finger';
  let countMode = 'single';
  let inputMode = 'choice';
  let answer = 0;
  let correctCount = 0;
  let wrongCount = 0;
  let streak = 0;
  let currentRound = 0;
  var TOTAL_ROUNDS = 10;
  var MAX_REPEAT = 2;
  let answerHistory = [];
  let answered = false;
  let ttsEnabled = true;
  let impulsePrevention = true;
  let impulseMode = 'hide';
  let impulseDelay = 5;
  let impulseTimer = null;

  function saveSettings() {
    localStorage.setItem('slowmath_dice_settings', JSON.stringify({
      gameType, countMode, inputMode, ttsEnabled, impulsePrevention, impulseMode, impulseDelay
    }));
  }
  function loadSettings() {
    try {
      var s = JSON.parse(localStorage.getItem('slowmath_dice_settings'));
      if (!s) return;
      if (['finger','dice','card'].indexOf(s.gameType) !== -1) gameType = s.gameType;
      if (['single','double','double-match'].indexOf(s.countMode) !== -1) countMode = s.countMode;
      if (s.inputMode === 'choice' || s.inputMode === 'keypad') inputMode = s.inputMode;
      if (typeof s.ttsEnabled === 'boolean') ttsEnabled = s.ttsEnabled;
      if (typeof s.impulsePrevention === 'boolean') impulsePrevention = s.impulsePrevention;
      if (s.impulseMode === 'hide' || s.impulseMode === 'lock') impulseMode = s.impulseMode;
      if (typeof s.impulseDelay === 'number' && s.impulseDelay >= 1 && s.impulseDelay <= 10) impulseDelay = s.impulseDelay;
    } catch(e) {}
  }
  function applySettingsUI() {
    document.querySelectorAll('#gameGroup .select-item').forEach(function(b) {
      b.classList.toggle('active', b.dataset.game === gameType);
    });
    document.querySelectorAll('#countGroup .select-item').forEach(function(b) {
      b.classList.toggle('active', b.dataset.count === countMode);
    });
    updateCountLabels();
    document.querySelectorAll('#inputGroup .select-item').forEach(function(b) {
      b.classList.toggle('active', b.dataset.imode === inputMode);
    });
    document.getElementById('tts-toggle').classList.toggle('on', ttsEnabled);
    document.getElementById('impulse-toggle').classList.toggle('on', impulsePrevention);
    document.getElementById('impulse-details').style.display = impulsePrevention ? '' : 'none';
    document.querySelectorAll('.impulse-mode-btn').forEach(function(b) {
      b.classList.toggle('selected', b.dataset.mode === impulseMode);
    });
    document.getElementById('impulse-delay-row').style.display = impulseMode === 'lock' ? '' : 'none';
    document.querySelectorAll('.imp-sec').forEach(function(b, i) {
      b.classList.toggle('active', i + 1 === impulseDelay);
    });
  }

  const SUITS = [
    { symbol: '\u2663', colorClass: 'suit-black' },
    { symbol: '\u2665', colorClass: 'suit-red'   },
    { symbol: '\u2660', colorClass: 'suit-black' },
    { symbol: '\u2666', colorClass: 'suit-red'   },
  ];

  // ---- DOM refs ----
  const startView = document.getElementById('startView');
  const playView = document.getElementById('playView');
  const gameTitle = document.getElementById('gameTitle');
  const dice1El = document.getElementById('dice1');
  const dice2El = document.getElementById('dice2');
  const dice1Wrapper = document.getElementById('dice1Wrapper');
  const dice2Wrapper = document.getElementById('dice2Wrapper');
  const card1El = document.getElementById('card1');
  const card2El = document.getElementById('card2');
  const card1Wrapper = document.getElementById('card1Wrapper');
  const card2Wrapper = document.getElementById('card2Wrapper');
  const plusSign = document.getElementById('plusSign');
  const plusSignCard = document.getElementById('plusSignCard');
  const questionEl = document.getElementById('question');
  const choiceGrid = document.getElementById('choiceGrid');
  const keypadArea = document.getElementById('keypadArea');
  const keypadDisplay = document.getElementById('keypadDisplay');
  const keypadGrid = document.getElementById('keypadGrid');
  const feedbackEl = document.getElementById('feedback');
  const nextBtn = document.getElementById('nextBtn');
  const progressInfo = document.getElementById('progressInfo');
  const resultArea = document.getElementById('resultArea');

  function rand(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
  }

  // ---- TTS ----
  function speak(text) {
    if (!ttsEnabled || !window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    if (!text || text.trim() === '') return;
    var u = new SpeechSynthesisUtterance(text);
    u.lang = 'ko-KR';
    u.rate = 0.9;
    setTimeout(function() { window.speechSynthesis.speak(u); }, 50);
  }

  // ---- Start View Setup ----

  // Game type selection
  document.querySelectorAll('#gameGroup .select-item').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('#gameGroup .select-item').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      gameType = btn.dataset.game;
      updateCountLabels();
      saveSettings();
    });
  });

  function updateCountLabels() {
    var countBtn1 = document.getElementById('countBtn1');
    var countBtn2 = document.getElementById('countBtn2');
    var countBtn3 = document.getElementById('countBtn3');
    if (gameType === 'finger') {
      countBtn1.textContent = '1~5 한 손';
      countBtn2.textContent = '1~10 두 손';
      countBtn3.style.display = 'none';
      if (countMode === 'double-match') { countMode = 'double'; saveSettings(); }
    } else if (gameType === 'dice') {
      countBtn1.textContent = '1개';
      countBtn2.textContent = '2개';
      countBtn3.textContent = '2개 (매칭)';
      countBtn3.style.display = '';
    } else {
      countBtn1.textContent = '1장';
      countBtn2.textContent = '2장';
      countBtn3.style.display = 'none';
      if (countMode === 'double-match') { countMode = 'double'; saveSettings(); }
    }
    // Update active states
    document.querySelectorAll('#countGroup .select-item').forEach(function(b) {
      b.classList.toggle('active', b.dataset.count === countMode);
    });
  }

  // Count selection
  document.querySelectorAll('#countGroup .select-item').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('#countGroup .select-item').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      countMode = btn.dataset.count;
      saveSettings();
    });
  });

  // Input mode selection
  document.querySelectorAll('#inputGroup .select-item').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('#inputGroup .select-item').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      inputMode = btn.dataset.imode;
      saveSettings();
    });
  });

  // TTS toggle (called from inline onclick)
  window.toggleTTS = function() {
    ttsEnabled = !ttsEnabled;
    document.getElementById('tts-toggle').classList.toggle('on', ttsEnabled);
    if (!ttsEnabled && window.speechSynthesis) window.speechSynthesis.cancel();
    saveSettings();
  };

  // Impulse prevention toggle (called from inline onclick)
  window.toggleImpulse = function() {
    impulsePrevention = !impulsePrevention;
    document.getElementById('impulse-toggle').classList.toggle('on', impulsePrevention);
    document.getElementById('impulse-details').style.display = impulsePrevention ? '' : 'none';
    saveSettings();
  };

  // Impulse mode selection (called from inline onclick)
  window.setImpulseMode = function(mode) {
    impulseMode = mode;
    document.querySelectorAll('.impulse-mode-btn').forEach(function(b) { b.classList.toggle('selected', b.dataset.mode === mode); });
    document.getElementById('impulse-delay-row').style.display = mode === 'lock' ? '' : 'none';
    saveSettings();
  };

  // Impulse delay selection (called from inline onclick)
  window.setImpulseDelay = function(sec) {
    impulseDelay = sec;
    document.querySelectorAll('.imp-sec').forEach(function(b, i) { b.classList.toggle('active', i + 1 === sec); });
    saveSettings();
  };

  // Load saved settings after UI is ready
  loadSettings();
  applySettingsUI();

  // Start button
  document.getElementById('startBtn').addEventListener('click', function() {
    // Unlock TTS on iOS
    if (window.speechSynthesis) {
      var unlock = new SpeechSynthesisUtterance('');
      window.speechSynthesis.speak(unlock);
    }
    startGame();
  });

  // ---- Navigation ----
  function startGame() {
        if (!localStorage.getItem('slowmath_dice_login')) {
            sessionStorage.setItem('_sp',JSON.stringify([]));
            document.getElementById('startView').classList.add('hidden');
            document.getElementById('loginView').classList.remove('hidden');
            return;
        }
            // 게임 유형에 따라 문제 수 결정
    if (gameType === 'finger' && countMode === 'single') {
      TOTAL_ROUNDS = 5;
    } else if (gameType === 'dice' && countMode === 'single') {
      TOTAL_ROUNDS = 6;
    } else {
      TOTAL_ROUNDS = 10;
    }
    resetMatchArea();
    MAX_REPEAT = 1;
    correctCount = 0; wrongCount = 0; streak = 0; currentRound = 0; answerHistory = [];
    document.getElementById('correctCount').textContent = 0;
    document.getElementById('wrongCount').textContent = 0;
    resultArea.classList.add('hidden');
    updateGameLabels();

    startView.classList.add('hidden');
    playView.classList.remove('hidden');
    newRound();
  }

  function showMenu() {
    clearImpulseTimer();
    resetMatchArea();
    if (window.speechSynthesis) window.speechSynthesis.cancel();
    playView.classList.add('hidden');
    startView.classList.remove('hidden');
    document.querySelector('.logout-btn').style.display=localStorage.getItem('slowmath_dice_login')?'':'none';
  
if(_smGameCompleted){_smGameCompleted=false;setTimeout(_showRecoPopup,350);}
}

  function shareApp() {
    var SHARE_KEY = 'slowmath_share_days';
    var MAX_DAYS = 5;
    var bubble = document.getElementById('share-bubble');
    function onShared() {
        var days = parseInt(localStorage.getItem(SHARE_KEY) || '0');
        if (days < MAX_DAYS) { days = days + 1; localStorage.setItem(SHARE_KEY, days); }
                if (bubble && days >= MAX_DAYS) { bubble.style.display = 'none'; }
        var shareToast = document.getElementById('share-toast');
        if (shareToast) {
          shareToast.textContent = '하루 무료 이용권이 지급되었습니다!';
          shareToast.style.opacity = '1';
          clearTimeout(shareToast._t);
          shareToast._t = setTimeout(function() { shareToast.style.opacity = '0'; }, 3000);
        }
    }
    var title = document.title;
    var url = location.href;
    if (navigator.share) {
        navigator.share({ title: title, url: url }).then(onShared).catch(function() {});
    } else {
        if (navigator.clipboard) { navigator.clipboard.writeText(url); }
        alert('링크가 복사되었어요!');
        onShared();
    }
}

  /* ══ 공유 버블 초기화 ══ */
  document.addEventListener('DOMContentLoaded', function() {
    var days = parseInt(localStorage.getItem('slowmath_share_days') || '0');
    if (days >= 5) { var b = document.getElementById('share-bubble'); if (b) b.style.display = 'none'; }
  });

  function updateGameLabels() {
    if (gameType === 'finger') {
      gameTitle.textContent = '✌️ 손가락 맞추기';
    } else if (gameType === 'dice') {
      gameTitle.textContent = isMatchMode() ? '🎲 주사위 매칭' : '🎲 주사위 맞추기';
    } else {
      gameTitle.textContent = '♣ 카드 맞추기';
    }
  }

  // ---- Dice ----
  function renderDice(el, val) {
    el.setAttribute('data-val', val);
    el.innerHTML = '';
    for (var i = 0; i < val; i++) {
      var d = document.createElement('div');
      d.className = 'dot';
      el.appendChild(d);
    }
  }

  function rollDice(el, finalVal, cb) {
    el.classList.add('rolling');
    var c = 0;
    var iv = setInterval(function() {
      renderDice(el, rand(1, 6));
      if (++c >= 8) {
        clearInterval(iv);
        renderDice(el, finalVal);
        el.classList.remove('rolling');
        if (cb) cb();
      }
    }, 60);
  }

  // ---- Card ----
  var PIP_POS = {
    1:  [[50,50]],
    2:  [[50,10],[50,90]],
    3:  [[50,10],[50,50],[50,90]],
    4:  [[28,10],[72,10],[28,90],[72,90]],
    5:  [[28,10],[72,10],[50,50],[28,90],[72,90]],
    6:  [[28,10],[72,10],[28,50],[72,50],[28,90],[72,90]],
    7:  [[28,10],[72,10],[50,30],[28,50],[72,50],[28,90],[72,90]],
    8:  [[28,10],[72,10],[50,30],[28,50],[72,50],[50,70],[28,90],[72,90]],
    9:  [[28,10],[72,10],[28,36],[72,36],[50,50],[28,64],[72,64],[28,90],[72,90]],
    10: [[28,10],[72,10],[50,23],[28,36],[72,36],[28,64],[72,64],[50,77],[28,90],[72,90]]
  };

  function renderCard(el, val, suit) {
    var s = SUITS[suit];
    el.innerHTML = '';
    el.className = 'card';
    var sc = document.createElement('div');
    sc.className = 'card-symbols s' + val;
    var positions = PIP_POS[val] || PIP_POS[10];
    positions.forEach(function(pos) {
      var sp = document.createElement('span');
      sp.className = 'card-sym ' + s.colorClass;
      sp.textContent = s.symbol;
      sp.style.left = pos[0] + '%';
      sp.style.top = pos[1] + '%';
      sc.appendChild(sp);
    });
    el.appendChild(sc);
  }

  function flipCard(el, finalVal, finalSuit, cb) {
    renderCard(el, finalVal, finalSuit);
    if (cb) cb();
  }

  // ---- Game Logic ----
  function getRange() {
    if (gameType === 'finger') return countMode === 'single' ? { min: 1, max: 5 } : { min: 1, max: 10 };
    if (gameType === 'dice') return countMode === 'single' ? { min: 1, max: 6 } : { min: 2, max: 12 };
    return countMode === 'single' ? { min: 1, max: 10 } : { min: 2, max: 20 };
  }

  // ---- Match Mode State ----
  var matchVal1 = 0, matchVal2 = 0;
  var matchDrops = [null, null]; // values placed
  var matchDragging = null;
  var matchFloating = null;

  function isMatchMode() {
    return gameType === 'dice' && countMode === 'double-match';
  }

  function resetMatchArea() {
    var area = document.getElementById('matchArea');
    area.style.display = 'none';
    document.getElementById('matchDrop1').textContent = '?';
    document.getElementById('matchDrop1').className = 'match-drop';
    document.getElementById('matchDrop2').textContent = '?';
    document.getElementById('matchDrop2').className = 'match-drop';
    document.getElementById('matchChips').innerHTML = '';
    document.getElementById('matchChips').style.display = '';
    document.getElementById('matchEq').textContent = '';
    matchDrops = [null, null];
  }

  function startMatchPhase(v1, v2) {
    matchVal1 = v1; matchVal2 = v2;
    matchDrops = [null, null];
    var area = document.getElementById('matchArea');
    area.style.display = 'block';
    document.getElementById('matchDrop1').textContent = '?';
    document.getElementById('matchDrop1').className = 'match-drop';
    document.getElementById('matchDrop2').textContent = '?';
    document.getElementById('matchDrop2').className = 'match-drop';
    document.getElementById('matchEq').textContent = '';
    questionEl.innerHTML = '각 주사위의 <span class="hl">숫자</span>를 맞춰보세요';

    // Generate chips: always include both correct values + 2 unique distractors
    var arr = [v1, v2];
    var existing = new Set(arr);
    var candidates = [1,2,3,4,5,6].filter(function(n) { return !existing.has(n); });
    // Shuffle candidates
    for (var ci = candidates.length - 1; ci > 0; ci--) {
      var cj = Math.floor(Math.random() * (ci + 1));
      var tmp = candidates[ci]; candidates[ci] = candidates[cj]; candidates[cj] = tmp;
    }
    while (arr.length < 4 && candidates.length > 0) arr.push(candidates.shift());
    // Fallback if not enough unique values
    while (arr.length < 4) arr.push(rand(1, 6));
    arr.sort(function() { return Math.random() - 0.5; });

    var container = document.getElementById('matchChips');
    container.innerHTML = '';
    container.style.display = '';
    arr.forEach(function(val) {
      var chip = document.createElement('div');
      chip.className = 'match-chip';
      chip.textContent = val;
      chip.dataset.val = val;
      addMatchDrag(chip);
      container.appendChild(chip);
    });
  }

  function addMatchDrag(chip) {
    function onStart(e) {
      if (chip.classList.contains('used')) return;
      e.preventDefault();
      var t = e.touches ? e.touches[0] : e;
      matchDragging = chip;

      matchFloating = document.createElement('div');
      matchFloating.className = 'match-chip floating';
      matchFloating.textContent = chip.textContent;
      matchFloating.style.left = t.clientX + 'px';
      matchFloating.style.top = t.clientY + 'px';
      document.body.appendChild(matchFloating);
      chip.style.opacity = '0.3';

      document.addEventListener('mousemove', onMove);
      document.addEventListener('touchmove', onMove, { passive: false });
      document.addEventListener('mouseup', onEnd);
      document.addEventListener('touchend', onEnd);
    }

    function onMove(e) {
      if (!matchDragging || !matchFloating) return;
      e.preventDefault();
      var t = e.touches ? e.touches[0] : e;
      matchFloating.style.left = t.clientX + 'px';
      matchFloating.style.top = t.clientY + 'px';

      ['matchDrop1','matchDrop2'].forEach(function(id) {
        var drop = document.getElementById(id);
        var r = drop.getBoundingClientRect();
        var over = t.clientX >= r.left && t.clientX <= r.right && t.clientY >= r.top && t.clientY <= r.bottom;
        drop.classList.toggle('drag-over', over && !drop.classList.contains('matched'));
      });
    }

    function onEnd(e) {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('touchmove', onMove);
      document.removeEventListener('mouseup', onEnd);
      document.removeEventListener('touchend', onEnd);

      if (!matchDragging) return;
      var t = e.changedTouches ? e.changedTouches[0] : e;

      if (matchFloating) { matchFloating.remove(); matchFloating = null; }

      ['matchDrop1','matchDrop2'].forEach(function(id, idx) {
        var drop = document.getElementById(id);
        drop.classList.remove('drag-over');
        if (drop.classList.contains('matched')) return;
        var r = drop.getBoundingClientRect();
        var over = t.clientX >= r.left && t.clientX <= r.right && t.clientY >= r.top && t.clientY <= r.bottom;
        if (over) {
          var expected = idx === 0 ? matchVal1 : matchVal2;
          var val = Number(chip.dataset.val);
          if (val === expected) {
            drop.textContent = val;
            drop.classList.add('matched');
            chip.classList.add('used');
            matchDrops[idx] = val;
            speak(val + '');
            checkMatchComplete();
          } else {
            drop.classList.add('wrong-match');
            drop.textContent = val;
            setTimeout(function() {
              drop.classList.remove('wrong-match');
              drop.textContent = '?';
            }, 500);
            speak('다시 해봐요');
          }
        }
      });

      chip.style.opacity = chip.classList.contains('used') ? '0.3' : '';
      matchDragging = null;
    }

    chip.addEventListener('mousedown', onStart);
    chip.addEventListener('touchstart', onStart, { passive: false });
  }

    if (matchDrops[0] !== null && matchDrops[1] !== null) {

      questionEl.innerHTML = '두 주사위의 <span class="hl">합</span>은?';

  }

  function generateChoices(ans) {
    var range = getRange();
    var n = Math.min(6, range.max - range.min + 1);
    var set = new Set([ans]);
    while (set.size < n) set.add(rand(range.min, range.max));
    return Array.from(set).sort(function(a, b) { return a - b; });
  }

  function renderKeypad() {
    keypadGrid.innerHTML = '';
    var range = getRange();
    var keys = [1,2,3,4,5,6,7,8,9];
    if (range.max > 9) keys.push(0);
    keys.forEach(function(k) {
      var btn = document.createElement('button');
      btn.className = 'key-btn';
      btn.textContent = k;
      btn.addEventListener('click', function() {
        if (answered) return;
        var cur = keypadDisplay.textContent.trim();
        var next = (cur === '' || cur === '?') ? String(k) : cur + String(k);
        if (Number(next) <= range.max) {
          keypadDisplay.textContent = next;
          keypadDisplay.classList.add('has-input');
        }
      });
      keypadGrid.appendChild(btn);
    });
    // Delete
    var del = document.createElement('button');
    del.className = 'key-btn key-del';
    del.textContent = '\u2190';
    del.addEventListener('click', function() {
      if (answered) return;
      var cur = keypadDisplay.textContent.trim();
      if (cur.length > 1) {
        keypadDisplay.textContent = cur.slice(0, -1);
      } else {
        keypadDisplay.textContent = '?';
        keypadDisplay.classList.remove('has-input');
      }

    // Submit

  function clearImpulseTimer() {
    if (impulseTimer) { clearInterval(impulseTimer); impulseTimer = null; }
    var cd = document.getElementById('impulse-countdown');
    if (cd) cd.remove();
    var oldReveal = document.getElementById('revealBtn');
    if (oldReveal) oldReveal.remove();
    document.querySelectorAll('.chips-hidden, .chips-locked').forEach(function(el) {
      el.classList.remove('chips-hidden', 'chips-locked');
    });
  }

  function applyImpulsePrevention() {
    if (!impulsePrevention) return;

    var target = inputMode === 'choice' ? choiceGrid : keypadArea;
    var countdownParent = target.parentNode;

    if (impulseMode === 'hide') {
      target.classList.add('chips-hidden');
      var revealBtn = document.createElement('button');
      revealBtn.className = 'reveal-btn';
      revealBtn.id = 'revealBtn';
      revealBtn.textContent = '보기 확인';
      revealBtn.addEventListener('click', function() {
        target.classList.remove('chips-hidden');
        revealBtn.remove();
      });
      countdownParent.insertBefore(revealBtn, target);
    } else {
      target.classList.add('chips-locked');
      var cdEl = document.createElement('div');
      cdEl.className = 'delay-countdown';
      cdEl.id = 'impulse-countdown';
      countdownParent.insertBefore(cdEl, target);

      var remaining = impulseDelay;
      cdEl.textContent = remaining + '초 동안 생각해 보세요';

      impulseTimer = setInterval(function() {
        remaining--;
        if (remaining <= 0) {
          clearInterval(impulseTimer);
          impulseTimer = null;
          cdEl.remove();
          target.classList.remove('chips-locked');
        } else {
          cdEl.textContent = remaining + '초 동안 생각해 보세요';
        }
      }, 1000);
    }
  }

  function showResult() {
_smGameCompleted=true;

    nextBtn.classList.add('hidden');

    document.getElementById('resultEmoji').textContent = emoji;
    document.getElementById('resultTitle').textContent = TOTAL_ROUNDS + '문제 완료!';

  function newRound() {
    currentRound++;
    progressInfo.textContent = currentRound + '/' + TOTAL_ROUNDS;
    nextBtn.textContent = '다음 문제 →';

    answered = false;
    feedbackEl.textContent = '';
    feedbackEl.className = 'feedback';
    nextBtn.classList.add('hidden');
    clearImpulseTimer();
    resetMatchArea();

    // Clear previous round visuals
    choiceGrid.style.display = 'none';
    choiceGrid.innerHTML = '';
    keypadArea.classList.add('hidden');
    keypadDisplay.classList.remove('has-input', 'correct-input', 'wrong-input');

    [dice1El, dice2El, card1El, card2El].forEach(function(e) { e.classList.remove('correct', 'wrong'); });
    hideAllVisuals();

    var ready = 0;
    var total = (countMode === 'double' || countMode === 'double-match') ? 2 : 1;
    var matchVal1Cur = 0, matchVal2Cur = 0;
    var onReady = function() {
      if (++ready >= total) {
        if (isMatchMode()) {
          startMatchPhase(matchVal1Cur, matchVal2Cur);
        } else {
          showInput();
        }
      }
    };

    function answerCount(val) {
      return answerHistory.filter(function(v) { return v === val; }).length;
    }

    if (gameType === 'finger') {
      fingerWrapper.style.display = 'block';
      var maxFinger = countMode === 'single' ? 5 : 10;
      var fv = rand(1, maxFinger);
      while (answerCount(fv) >= MAX_REPEAT) { fv = rand(1, maxFinger); }
      answer = fv;
      fingerImage.src = 'images/' + fv + '.png';
      fingerImage.alt = '손가락 ' + fv + '개';
      questionEl.innerHTML = '손가락이 <span class="hl">몇 개</span>일까요?';
      showInput();
    } else if (gameType === 'dice') {
      dice1Wrapper.style.display = 'block';
      if (countMode === 'double' || countMode === 'double-match') {
        var v1, v2;
        do { v1 = rand(1, 6); v2 = rand(1, 6); } while (answerCount(v1 + v2) >= MAX_REPEAT);
        answer = v1 + v2;
        matchVal1Cur = v1; matchVal2Cur = v2;
        plusSign.style.display = 'inline';
        dice2Wrapper.style.display = 'block';
        if (!isMatchMode()) questionEl.innerHTML = '두 주사위의 <span class="hl">합</span>은?';
        rollDice(dice1El, v1, onReady);
        rollDice(dice2El, v2, onReady);
      } else {
        var v1 = rand(1, 6);
        while (answerCount(v1) >= MAX_REPEAT) { v1 = rand(1, 6); }
        answer = v1;
        questionEl.innerHTML = '주사위의 <span class="hl">숫자</span>는?';
        rollDice(dice1El, v1, onReady);
      }
    } else {
      card1Wrapper.style.display = 'block';
      if (countMode === 'double') {
        var cv1, cv2, s1, s2;
        do { cv1 = rand(1, 10); cv2 = rand(1, 10); } while (answerCount(cv1 + cv2) >= MAX_REPEAT);
        s1 = rand(0, 3); s2 = rand(0, 3);
        answer = cv1 + cv2;
        plusSignCard.style.display = 'inline';
        card2Wrapper.style.display = 'block';
        questionEl.innerHTML = '두 카드 모양의 <span class="hl">합</span>은?';
        flipCard(card1El, cv1, s1, onReady);
        flipCard(card2El, cv2, s2, onReady);
      } else {
        var cv1 = rand(1, 10), s1 = rand(0, 3);
        while (answerCount(cv1) >= 1) { cv1 = rand(1, 10); }
        s1 = rand(0, 3);
        answer = cv1;
        questionEl.innerHTML = '카드의 <span class="hl">모양 수</span>는?';
        flipCard(card1El, cv1, s1, onReady);
      }
    }

    answerHistory.push(answer);
  }

  // ---- Wrong Notes (오답노트) ----
  var WN_KEY = 'slowmath_dice_wrong_notes';
  var wrongNotePracticeMode = false;
  var wrongNotePracticeList = [];

  function getWrongNotes() {
    try { return JSON.parse(localStorage.getItem(WN_KEY)) || []; }
    catch(e) { return []; }
  }

  function saveWrongNotes(notes) {
    localStorage.setItem(WN_KEY, JSON.stringify(notes));
  }

  function addWrongNote(ans, gt, cm) {
    var notes = getWrongNotes();
    // Avoid duplicates for same answer+gameType+countMode
    var exists = notes.some(function(n) {
      return n.answer === ans && n.gameType === gt && n.countMode === cm;
    });
    if (!exists) {
      notes.push({ answer: ans, gameType: gt, countMode: cm });
      saveWrongNotes(notes);
    }
    updateWrongNotesBtn();
  }

  function removeWrongNote(ans, gt, cm) {
    var notes = getWrongNotes();
    notes = notes.filter(function(n) {
      return !(n.answer === ans && n.gameType === gt && n.countMode === cm);
    });
    saveWrongNotes(notes);
    updateWrongNotesBtn();
  }

  function updateWrongNotesBtn() {
    var notes = getWrongNotes();
    var btn = document.getElementById('wrongNotesBtn');
    var badge = document.getElementById('wrongNotesBadge');
    if (notes.length > 0) {
      btn.classList.remove('hidden');
      badge.textContent = notes.length;
    } else {
      btn.classList.add('hidden');
    }
  }

  // Patch handleAnswer to record wrong notes
  var _originalHandleAnswer = handleAnswer;
  handleAnswer = function(val, btnEl) {
    if (answered) return;
    var ok = val === answer;
    if (!ok) {
      addWrongNote(answer, gameType, countMode);
    }
    if (ok && wrongNotePracticeMode) {
      removeWrongNote(answer, gameType, countMode);
      // Update practice list
      wrongNotePracticeList = wrongNotePracticeList.filter(function(n) {
        return !(n.answer === answer && n.gameType === gameType && n.countMode === countMode);
      });
    }
    _originalHandleAnswer(val, btnEl);
  };

    var wnMatchV1 = 0, wnMatchV2 = 0;

        } else {
          showInput();

      }
    };

    if (gameType === 'finger') {

      questionEl.innerHTML = '손가락이 <span class="hl">몇 개</span>일까요?';
      showInput();
    } else if (gameType === 'dice') {
      dice1Wrapper.style.display = 'block';
      if (countMode === 'double' || countMode === 'double-match') {
        // Generate two dice that sum to targetAnswer
        var minV = Math.max(1, targetAnswer - 6);
        var maxV = Math.min(6, targetAnswer - 1);
        var v1 = rand(minV, maxV);
        var v2 = targetAnswer - v1;
        wnMatchV1 = v1; wnMatchV2 = v2;
        plusSign.style.display = 'inline';
        dice2Wrapper.style.display = 'block';
        if (!isMatchMode()) questionEl.innerHTML = '두 주사위의 <span class="hl">합</span>은?';
        rollDice(dice1El, v1, onReady);
        rollDice(dice2El, v2, onReady);
      } else {
        questionEl.innerHTML = '주사위의 <span class="hl">숫자</span>는?';
        rollDice(dice1El, targetAnswer, onReady);
      }
    } else {
      card1Wrapper.style.display = 'block';
      if (countMode === 'double') {
        var minC = Math.max(1, targetAnswer - 10);
        var maxC = Math.min(10, targetAnswer - 1);
        var cv1 = rand(minC, maxC);
        var cv2 = targetAnswer - cv1;

        flipCard(card1El, targetAnswer, s1, onReady);
      }
    }

    answerHistory.push(answer);
  }

/* ── localStorage / 문제별 실시간 기록 ── */
var _VK='sm_visits_'+_AK;
var _obsv=null,_prevQ=0,_prevSc=0;

function _gv(){try{return JSON.parse(localStorage.getItem(_VK))||[];}catch(e){return [];}}

function _startSession(mod){
  var today=new Date().toISOString().split('T')[0];
  var vv=_gv();
  var en=vv.find(function(x){return x.date===today;});
  if(!en){en={date:today,sessions:[],totalProblems:0,totalCorrect:0};vv.push(en);}
  en.sessions.push({total:0,correct:0,mode:mod,t:Date.now()});
  localStorage.setItem(_VK,JSON.stringify(vv));
}

function _recProblem(isCorrect){
  var today=new Date().toISOString().split('T')[0];
  var vv=_gv();
  var en=vv.find(function(x){return x.date===today;});
  if(!en) return;
  var sess=en.sessions[en.sessions.length-1];
  if(!sess) return;
  sess.total++;
  if(isCorrect) sess.correct++;
  en.totalProblems=(en.totalProblems||0)+1;
  if(isCorrect) en.totalCorrect=(en.totalCorrect||0)+1;
  localStorage.setItem(_VK,JSON.stringify(vv));
}

function _startObserving(){
  _stopObserving();
  var ql=document.getElementById('q-label')||document.getElementById('question-number')||document.getElementById('progress-label')||document.getElementById('dq-label')||document.getElementById('cv-question');
  var sl=document.getElementById('play-score')||document.getElementById('dscore')||document.getElementById('correctCount');
  _prevQ=1; _prevSc=0;
  if(ql){
    _obsv=new MutationObserver(function(){
      var m=(ql.textContent||'').match(/(\d+)/);
      if(!m) return;
      var qn=parseInt(m[1]);
      if(qn>_prevQ){
        var sc=parseInt((sl?sl.textContent:'0').replace(/[^0-9]/g,''))||0;
        _recProblem(sc>_prevSc);
        _prevSc=sc; _prevQ=qn;
      }
    });
    _obsv.observe(ql,{childList:true,characterData:true,subtree:true});
  } else if(sl){
    _prevSc=parseInt((sl.textContent||'').replace(/[^0-9]/g,''))||0;
    _obsv=new MutationObserver(function(){
      var sc=parseInt((sl.textContent||'').replace(/[^0-9]/g,''))||0;
      if(sc>_prevSc){ _recProblem(true); _prevSc=sc; }
    });
    _obsv.observe(sl,{childList:true,characterData:true,subtree:true});
  }
}

function _stopObserving(){
  if(_obsv){_obsv.disconnect();_obsv=null;}
}

function _recVisit(){
  if(_LK&&!localStorage.getItem(_LK)) return;
  var today=new Date().toISOString().split('T')[0];
  var vv=_gv();
  if(!vv.find(function(x){return x.date===today;})){
    vv.push({date:today,sessions:[],totalProblems:0,totalCorrect:0});
    localStorage.setItem(_VK,JSON.stringify(vv));
  }
}

window._smRec=function(isCorrect){ try{ _recProblem(!!isCorrect); }catch(e){} };
window._smStart=function(mode){ try{ _startSession(mode==null?null:mode); }catch(e){} };
window._smStop=function(){ try{ _stopObserving(); }catch(e){} };

/* ── 달력 ── */
window._smCN=function(d){
  _cm+=d;
  if(_cm<0){_cm=11;_cy--;}
  if(_cm>11){_cm=0;_cy++;}
  _rCal();
};
var _MN=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

function _rCal(){
  var lbl=document.getElementById('sm-clbl');
  if(lbl) lbl.textContent=_cy+'년 '+_MN[_cm];
  var vv=_gv();var vm={};vv.forEach(function(v){vm[v.date]=v;});
  var today=new Date().toISOString().split('T')[0];
  var first=new Date(_cy,_cm,1).getDay();
  var days=new Date(_cy,_cm+1,0).getDate();
  var mT=0,mC=0,mD=0;
  for(var d=1;d<=days;d++){
    var ds=_cy+'-'+String(_cm+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    if(vm[ds]){mD++;mT+=vm[ds].totalProblems||0;mC+=vm[ds].totalCorrect||0;}
  }
  var su=document.getElementById('sm-msum');
  if(su) su.innerHTML=[
    '<div class="sm-mc"><div class="sm-mn">'+mD+'</div><div class="sm-ml">방문 일수</div></div>',
    '<div class="sm-mc"><div class="sm-mn">'+mT+'</div><div class="sm-ml">푼 문제 수</div></div>',
    '<div class="sm-mc"><div class="sm-mn">'+(mT>0?Math.round(mC/mT*100):0)+'%</div><div class="sm-ml">정답률</div></div>',
  ].join('');
  var body=document.getElementById('sm-cbody');
  if(!body) return;
  var html='<tr>';
  for(var i=0;i<first;i++) html+='<td><div class="sm-cd"></div></td>';
  for(var d=1;d<=days;d++){
    var ds=_cy+'-'+String(_cm+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    var cls='sm-cd';
    if(vm[ds]) cls+=' smd';
    if(ds===today) cls+=' smt';
    var cl=vm[ds]?'onclick="window._smDD(\''+ds+'\')"':'';
    html+='<td><div class="'+cls+'" '+cl+'>'+d+'</div></td>';
    if((first+d-1)%7===6&&d<days) html+='</tr><tr>';
  }
  body.innerHTML=html+'</tr>';
  var _recent=null;
  for(var _rd=days;_rd>=1;_rd--){
    var _rs=_cy+'-'+String(_cm+1).padStart(2,'0')+'-'+String(_rd).padStart(2,'0');
    if(vm[_rs]&&(vm[_rs].totalProblems||0)>0){_recent=_rs;break;}
  }
  if(_recent) window._smDD(_recent);
  else document.getElementById('sm-ddet').classList.add('smh');
  _rTrend();
}

function _rTrend(){
  var el=document.getElementById('sm-trend');
  if(!el) return;
  var vv=_gv();
  var monthData=vv.filter(function(v){
    var p=(v.date||'').split('-');
    return p.length===3 && parseInt(p[0])===_cy && parseInt(p[1])===_cm+1 && (v.totalProblems||0)>0;
  }).sort(function(a,b){return a.date<b.date?-1:1;});
  if(monthData.length===0){
    el.innerHTML='<div class="sm-tg-title">이달의 학습 추이</div><div class="sm-tg-empty">이번 달 기록이 없어요</div>';
    return;
  }
  var W=320,H=120,pad=14,bot=24,top=12;
  var maxP=0;
  monthData.forEach(function(v){ if((v.totalProblems||0)>maxP) maxP=v.totalProblems; });
  if(maxP<1) maxP=1;
  var innerW=W-pad*2;
  var n=monthData.length;
  var step=innerW/n;
  var barW=Math.max(2,Math.min(28,step*0.62));
  var chartH=H-top-bot;
  var bars='',labels='',line='',dots='';
  var prevX=null,prevY=null;
  monthData.forEach(function(v,i){
    var cx=pad+step*(i+0.5);
    var probH=((v.totalProblems||0)/maxP)*chartH;
    var by=top+(chartH-probH);
    bars+='<rect x="'+(cx-barW/2).toFixed(1)+'" y="'+by.toFixed(1)+'" width="'+barW.toFixed(1)+'" height="'+probH.toFixed(1)+'" rx="2.5" fill="#6BADE8" opacity="0.85"/>';
    var rate=(v.totalProblems||0)>0?(v.totalCorrect||0)/v.totalProblems:0;
    var ry=top+(1-rate)*chartH;
    if(prevX!==null) line+='<line x1="'+prevX.toFixed(1)+'" y1="'+prevY.toFixed(1)+'" x2="'+cx.toFixed(1)+'" y2="'+ry.toFixed(1)+'" stroke="#5BC886" stroke-width="1.8" stroke-linecap="round"/>';
    dots+='<circle cx="'+cx.toFixed(1)+'" cy="'+ry.toFixed(1)+'" r="3" fill="#5BC886" stroke="white" stroke-width="1.5"/>';
    prevX=cx;prevY=ry;
    var day=parseInt((v.date||'').split('-')[2])||0;
    var showLbl=(n<=10)||(i%Math.ceil(n/10)===0)||(i===n-1);
    if(showLbl){
      labels+='<text x="'+cx.toFixed(1)+'" y="'+(H-8).toFixed(1)+'" text-anchor="middle" font-size="9" fill="#8C8070" font-weight="600">'+day+'일</text>';
    }
  });
  var axisY=top+chartH+0.5;
  var axis='<line x1="'+pad+'" y1="'+axisY+'" x2="'+(W-pad)+'" y2="'+axisY+'" stroke="#E0DAD2" stroke-width="1"/>';
  var maxLbl='<text x="'+pad+'" y="'+(top-2)+'" font-size="8" fill="#B8AD9E" font-weight="600">최대 '+maxP+'문제</text>';
  var svg='<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="월별 시간 내 추이">'+axis+maxLbl+bars+line+dots+labels+'</svg>';
  el.innerHTML='<div class="sm-tg-title">이달의 학습 추이</div><div class="sm-tg-chart">'+svg+'</div><div class="sm-tg-legend"><span class="sm-tg-lg sm-tg-lg-b">문제 수</span><span class="sm-tg-lg sm-tg-lg-l">정답률</span></div>';
}

window._smDD=function(ds){
  var vv=_gv();var v=vv.find(function(x){return x.date===ds;});
  var el=document.getElementById('sm-ddet');
  if(!el) return;
  if(!v){el.classList.add('smh');return;}
  var d=new Date(ds+'T00:00:00');
  var dl=(d.getMonth()+1)+'월 '+d.getDate()+'일';
  el.classList.remove('smh');
  el.innerHTML='<div class="sm-dt">📅 '+dl+' 기록</div>'
    +'<div class="sm-dr"><span class="sm-dl">총 푼 문제</span><span class="sm-dv">'+v.totalProblems+'문제</span></div>'
    +'<div class="sm-dr"><span class="sm-dl">정답</span><span class="sm-dv">'+v.totalCorrect+'개 <span class="sm-db">'+(v.totalProblems>0?Math.round(v.totalCorrect/v.totalProblems*100):0)+'%</span></span></div>';
};

/* ── 마이 ── */
function _rMy(){
  var ld=null;try{ld=_LK?JSON.parse(localStorage.getItem(_LK)):null;}catch(e){}

var _gameViewIds=['play-view','game-view','playView','gameView','result-view','resultView','quiz-view','drag-view','fill-view','wn-view','wrong-notes-view','wrongNotesView'];
function _anyGameVisible(){
  for(var i=0;i<_gameViewIds.length;i++){
    var el=document.getElementById(_gameViewIds[i]);
    if(!el) continue;
    if(el.classList.contains('hidden')||el.classList.contains('smh')) continue;
    var cs=window.getComputedStyle(el);
    if(cs.display!=='none') return true;
  }
  return false;
}
var _smSessionActive=false;
function _syncBarToGame(){
  var _vis=_anyGameVisible();
  if(_vis){
    _showBar(false);
    if(!_smSessionActive){
      try{ _startSession(null); }catch(e){}
      _smSessionActive=true;
      setTimeout(function(){ try{ _startObserving(); }catch(e){} },150);
    }
  } else {
    _showBar(true);
    if(_smSessionActive){
      try{ _stopObserving(); }catch(e){}
      _smSessionActive=false;
    }
  }
}
setTimeout(function(){
  _showBar(true);
  if(_isLI()) _recVisit();
  _gameViewIds.forEach(function(id){
    var el=document.getElementById(id);
    if(!el) return;
    try{ new MutationObserver(_syncBarToGame).observe(el,{attributes:true,attributeFilter:['class','style']}); }catch(e){}
  });
  _syncBarToGame();
  var lbs=document.querySelectorAll('.logout-btn');
  for(var i=0;i<lbs.length;i++){
    var lb=lbs[i];
    lb.removeAttribute('onclick');
    lb.onclick=null;
    lb.addEventListener('click',function(e){
      e.preventDefault();
      e.stopImmediatePropagation();
      window._smLogout();
    },true);
  }
},250);

})();

    ov.id = 'sm-welcome-overlay';
    ov.innerHTML =
      '<div class="sm-welcome-card" role="dialog" aria-modal="true">' +
        '<div class="sm-welcome-emoji">🎉</div>' +
        '<div class="sm-welcome-title">가입을 환영합니다!</div>' +
        '<div class="sm-welcome-desc">지금부터 하루 동안 모든 기능을<br>무료로 이용하실 수 있어요</div>' +
        '<button type="button" class="sm-welcome-btn">시작하기</button>' +
      '</div>';
    document.body.appendChild(ov);
    function close(){ if (ov && ov.parentNode) ov.parentNode.removeChild(ov); }
    ov.querySelector('.sm-welcome-btn').addEventListener('click', close);
    ov.addEventListener('click', function(e){ if (e.target === ov) close(); });
  }
  window._smShowWelcome = showWelcome;

  function wrap(name){
    var fn = window[name];
    if (typeof fn !== 'function' || fn.__smWelcomeWrapped) return false;
    var wrapped = function(){
      var r = fn.apply(this, arguments);
      try { setTimeout(showWelcome, 80); } catch(e) {}
      return r;
    };
    wrapped.__smWelcomeWrapped = true;
    window[name] = wrapped;
    return true;
  }

  function wrapAll(){
    wrap('socialLogin');
    wrap('doLogin');
  }

  // Re-wrap periodically; inline patches may redefine these after us.
  wrapAll();
  var tries = 0;
  var iv = setInterval(function(){
    wrapAll();
    if (++tries > 20) clearInterval(iv);
  }, 300);
})();
</script>
