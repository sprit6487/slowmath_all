    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;900&display=swap');

        *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Noto Sans KR', sans-serif; margin: 0; padding: 0; background: #F5F1EB; min-height: 100dvh; display: flex; justify-content: center; align-items: flex-start; user-select: none; }
        .app { width: 100%; max-width: 480px; min-height: 100dvh; background: white; padding: 24px 20px; padding-top: max(24px, env(safe-area-inset-top)); padding-bottom: max(24px, env(safe-area-inset-bottom)); display: flex; flex-direction: column; }
        @media (min-width: 768px) { body { align-items: center; padding: 32px; } .app { max-width: 560px; min-height: auto; border-radius: 32px; box-shadow: 0 8px 48px rgba(0,0,0,0.07), 0 1px 4px rgba(0,0,0,0.04); padding: 44px 40px; } }
        .hidden { display: none !important; }

        /* ── Login View ── */
        .login-view {
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          flex: 1;
          min-height: 100dvh;
          padding: 40px 20px;
        }

        .login-logo-area {
          text-align: center;
          margin-bottom: 48px;
        }

        .login-logo-area svg {
          display: block;
          margin: 0 auto;
        }

        .login-logo-area h1 {
          font-size: clamp(1.8rem, 6vw, 2.25rem);
          font-weight: 900;
          letter-spacing: -0.025em;
          margin-top: 8px;
          white-space: nowrap;
        }

        .login-subtitle {
          color: #B8AD9E;
          font-size: 0.9375rem;
          margin-top: 2px;
        }

          @keyframes floatBubble {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
}
.login-trial {
    position: relative;
    background: #FFF8F0;
    border: 1.5px solid #EDD080;
    border-radius: 14px;
    padding: 9px 16px;
    font-size: 0.78rem;
    color: #7B6545;
    font-weight: 600;
    text-align: center;
    margin-bottom: 24px;
    line-height: 1.4;
    box-shadow: 0 4px 14px rgba(220,160,50,.18);
    align-self: center;
}
.login-trial::before {
    content: '';
    position: absolute;
    bottom: -9px; left: 50%;
    transform: translateX(-50%);
    border: 5px solid transparent;
    border-top: 8px solid #EDD080;
    border-bottom: 0;
}
.login-trial::after {
    content: '';
    position: absolute;
    bottom: -7px; left: 50%;
    transform: translateX(-50%);
    border: 4px solid transparent;
    border-top: 7px solid #FFF8F0;
    border-bottom: 0;
    z-index: 1;
}
  /* ===== Share Bubble ===== */
  .share-bubble {
    position: absolute;
    right: 0;
    background: #FFF8F0;
    border: 1.5px solid #EDD080;
    border-radius: 12px;
    padding: 8px 12px;
    font-size: 0.55rem;
    color: #7B6545;
    font-weight: 600;
    box-shadow: 0 4px 12px rgba(220,160,50,.18);
    z-index: 20;
    line-height: 1.5;
    text-align: right;
    max-width: 200px;
    white-space: nowrap;
  }
  .share-bubble::before {
    content: '';
    position: absolute;
    top: -8px;
    right: 10px;
    border: 4px solid transparent;
    border-bottom: 7px solid #EDD080;
    border-top: 0;
  }
  .share-bubble::after {
    content: '';
    position: absolute;
    top: -6px;
    right: 11px;
    border: 3px solid transparent;
    border-bottom: 6px solid #FFF8F0;
    border-top: 0;
    z-index: 1;
  }
@media (max-width:768px){.share-bubble{font-size:0.60rem;max-width:170px;padding:7px 10px;}}
@media (max-width:480px){.share-bubble{font-size:0.62rem;max-width:165px;padding:7px 9px;}}

  .login-buttons {
          width: 100%;
          max-width: 300px;
          display: flex;
          flex-direction: column;
          gap: 12px;
        }

        .login-btn {
          display: flex;
          align-items: center;
          justify-content: center;
          gap: 10px;
          width: 100%;
          padding: 16px 20px;
          border-radius: 14px;
          font-size: 1rem;
          font-weight: 700;
          font-family: inherit;
          line-height: 1.2;
          border: none;
          cursor: pointer;
          transition: transform 0.1s;
        }
        .login-btn:active { transform: scale(0.97); }
        .login-btn svg { flex-shrink: 0; }
        .login-btn.kakao { background: #FEE500; color: #191919; }
        .login-btn.google { background: #FFFFFF; color: #444444; border: 1.5px solid #DADCE0; }

        /* ── Home View ── */
        .app-header { display: flex; flex-direction: column; align-items: center; text-align: center; margin-bottom: 20px; position: relative; width: 100%; }
        .app-header svg.turtle-logo { width: 90px; height: 75px; }
        .app-header h1 { font-size: 1.6rem; font-weight: 900; letter-spacing: -0.025em; margin: 8px 0 0; line-height: 1.2; }
        .brand-sub{font-size:.8rem;color:#B8AD9E;margin-top:6px;margin-bottom:0;font-weight:500;}
        .title-blue { color: #6BADE8; }
        .title-orange { color: #F0A050; }
        .setting-divider { border-top: 1.5px solid #F0ECE6; padding-top: 18px; margin-top: 18px; }
        .setting-header { display: flex; align-items: center; justify-content: space-between; }
        .setting-title { font-size: 0.875rem; font-weight: 600; color: #4A4035; }
        .setting-title .badge { font-size: 0.7rem; font-weight: 400; color: #B8AD9E; margin-left: 6px; }
        .toggle-track {
            width: 48px; height: 28px; border-radius: 99px; position: relative;
            background: #E0DAD0; border: none; cursor: pointer; flex-shrink: 0; transition: background 0.2s;
        }
        .toggle-track.on { background: #5BC886; }
        .toggle-knob {
            width: 22px; height: 22px; border-radius: 50%; background: #fff;
            position: absolute; top: 3px; left: 3px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.12); transition: transform 0.2s;
        }
        .toggle-track.on .toggle-knob { transform: translateX(20px); }
        .logout-wrap { margin-top: auto; padding-top: 24px; text-align: center; }
        .logout-btn { background: none; border: 1.5px solid #E8E2DA; border-radius: 8px; padding: 8px 24px; font-size: 0.8rem; font-weight: 600; color: #B8AD9E; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; transition: background 0.15s; }
        .logout-btn:hover { background: #F5F1EB; }

        .sec-label { font-size: .875rem; font-weight: 700; color: #B8AD9E; margin: 0 0 10px; }

        /* ── Mode Selection ── */
        .mode-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 18px; }
        .mode-card { border: 2.5px solid #E8E2DA; border-radius: 20px; padding: 16px 8px 14px; background: white; cursor: pointer; text-align: center; transition: all .15s; }
        .mode-card:active { transform: scale(.95); }
        .mode-card.sel { border-color: #F0A050; background: #FFF8F0; }
        .mode-card .m-icon { height: 54px; display: flex; align-items: center; justify-content: center; margin-bottom: 8px; font-size: 1.8rem; }
        .mode-card .m-name { font-size: .85rem; font-weight: 700; color: #4A4035; }

        /* ── Range Options ── */
        .range-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 10px; }
        .range-btn { border: 2.5px solid #E8E2DA; border-radius: 12px; padding: 10px 4px; background: white; cursor: pointer; text-align: center; transition: all .15s; font-size: .85rem; font-weight: 700; color: #4A4035; font-family: 'Noto Sans KR', sans-serif; }
        .range-btn:active { transform: scale(.95); }
        .range-btn.sel { border-color: #6BADE8; background: #EEF6FD; color: #6BADE8; }

        /* ── Number Grid ── */
        .num-grid { display: grid; grid-template-columns: repeat(5,1fr); gap: 8px; margin-bottom: 18px; }
        .num-card { border: 2.5px solid #E8E2DA; border-radius: 14px; padding: 12px 4px; background: white; cursor: pointer; text-align: center; transition: all .15s; font-size: 1.5rem; font-weight: 900; color: #4A4035; }
        .num-card:active { transform: scale(.95); }
        .num-card.sel { border-color: #6BADE8; background: #EEF6FD; color: #6BADE8; }

        /* ── Difficulty ── */

        .start-btn { width: 100%; padding: 16px 0; border-radius: 16px; border: none; margin-top: 18px; background: #4A4035; color: white; font-family: 'Noto Sans KR', sans-serif; font-size: 1.1rem; font-weight: 700; cursor: pointer; box-shadow: 0 2px 8px rgba(74,64,53,0.15); transition: transform .1s, box-shadow .1s; }
        .start-btn:active { transform: scale(.97); box-shadow: none; }

        /* ── Game View ── */
        .game-nav { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
        .btn-home { width: 36px; height: 36px; border-radius: 10px; border: 2px solid #E8E2DA; background: white; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1.1rem; color: #8C8070; flex-shrink: 0; }
        .btn-home:active { background: #F5F1EB; }
        .nav-title { flex: 1; font-size: 1rem; font-weight: 700; color: #4A4035; }

        .canvas-wrap { border: 2.5px solid #E8E2DA; border-radius: 20px; overflow: hidden; margin-bottom: 14px; background: #FAFAF8; position: relative; }
        canvas { display: block; touch-action: none; }

        .instr { text-align: center; font-size: .875rem; font-weight: 600; color: #B8AD9E; margin-bottom: 12px; min-height: 22px; }
        .action-btns { display: flex; gap: 10px; width: 100%; max-width: 320px; margin: 0 auto; }
        .btn-retry { flex: 1; padding: 13px 0; border-radius: 12px; border: 2.5px solid #E8E2DA; background: white; font-family: 'Noto Sans KR', sans-serif; font-size: .9rem; font-weight: 700; color: #8C8070; cursor: pointer; transition: transform .1s; }
        .btn-retry:active { transform: scale(.97); }
        .btn-change { flex: 1.2; padding: 13px 0; border-radius: 12px; border: none; background: #F0A050; font-family: 'Noto Sans KR', sans-serif; font-size: .9rem; font-weight: 700; color: white; cursor: pointer; transition: transform .1s; box-shadow: 0 2px 8px rgba(240,144,30,.3); }
        .btn-change:active { transform: scale(.97); box-shadow: none; }
        .res-btns { display: flex; gap: 10px; width: 100%; margin-top: 8px; max-width: 320px; }

        /* ── Progress ── */
        .progress-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
        .progress-dots { display: flex; gap: 4px; flex: 1; }
        .progress-dot { flex: 1; height: 6px; border-radius: 3px; background: #E8E2DA; transition: background .2s; }
        .progress-dot.done { background: #5BC886; }
        .progress-dot.current { background: #F0A050; }
        .progress-label { font-size: .75rem; font-weight: 700; color: #8C8070; white-space: nowrap; }

        /* ── Result View ── */
        .result-header { text-align: center; margin-bottom: 20px; }
        .result-header .complete-emoji { font-size: 56px; display: block; margin-bottom: 6px; }
        .result-header h2 { font-size: 1.25rem; font-weight: 900; color: #4A4035; margin: 0 0 4px; }
        .result-header p { font-size: .85rem; color: #B8AD9E; margin: 0; }
        .next-btn { margin-top: 8px; padding: 14px 36px; border: none; border-radius: 12px; background: #6BADE8; color: #fff; font-size: 1rem; font-weight: 700; cursor: pointer; font-family: inherit; transition: transform 0.12s; }
        .next-btn:active { transform: scale(0.96); }
        .result-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 16px; }
        .result-cell { border: 2px solid #E8E2DA; border-radius: 12px; overflow: hidden; background: #FAFAF8; position: relative; }
        .result-cell .img-wrap { position: relative; aspect-ratio: 1 / 1; }
        .result-cell img { width: 100%; height: 100%; display: block; object-fit: contain; }
        .result-cell .ghost-overlay { position: absolute; inset: 0; pointer-events: none; }
        .result-cell .result-label { position: absolute; top: 4px; left: 6px; font-size: .65rem; font-weight: 700; color: #B8AD9E; z-index: 2; }
        .result-cell .result-score-mini { position: absolute; top: 4px; right: 6px; font-size: .62rem; font-weight: 800; background: rgba(255,255,255,0.92); border-radius: 6px; padding: 1px 5px; z-index: 2; }
        .result-cell .result-score-mini.s-good { color: #3A9B6A; }
        .result-cell .result-score-mini.s-mid  { color: #C88030; }
        .result-cell .result-score-mini.s-low  { color: #C46060; }

        /* ── Score bars ── */
        .score-bars { background: #FFFDF8; border: 2px solid #EDE0CC; border-radius: 16px; padding: 14px 16px; margin-bottom: 14px; animation: fadeUp .4s ease-out; }
        .score-bars .sb-title { font-size: 0.76rem; font-weight: 700; color: #C4AA82; letter-spacing: .04em; margin-bottom: 10px; text-align: center; }
        .bar-row { display: grid; grid-template-columns: 56px 1fr 32px; align-items: center; gap: 10px; margin-bottom: 8px; }
        .bar-row:last-child { margin-bottom: 0; }
        .bar-label { font-size: 0.78rem; font-weight: 700; color: #7B6545; }
        .bar-track { height: 10px; background: #F0EAD8; border-radius: 5px; overflow: hidden; }
        .bar-fill { height: 100%; border-radius: 5px; background: linear-gradient(90deg, #F0A050, #F5C878); transition: width 0.7s ease-out; }
        .bar-value { font-size: 0.78rem; font-weight: 700; color: #7B6545; text-align: right; font-variant-numeric: tabular-nums; }

        /* ── Summary tips ── */
        .summary-tips { background: #F0F6FF; border: 2px solid #BDD5F5; border-radius: 16px; padding: 14px 18px; margin-bottom: 18px; font-size: 0.86rem; color: #3A5A8C; line-height: 1.7; animation: fadeUp .5s ease-out; }
        .summary-tips .tip-row { margin-bottom: 6px; }
        .summary-tips .tip-row:last-child { margin-bottom: 0; }
        .summary-tips .tip-label { font-weight: 700; color: #6A8FBF; margin-right: 4px; }
        .summary-tips .tip-empty { color: #6A8FBF; text-align: center; font-weight: 700; }
        .result-actions { display: flex; gap: 10px; max-width: 320px; margin: 0 auto; }
        .result-actions button { flex: 1; padding: 13px 0; border-radius: 12px; font-family: 'Noto Sans KR', sans-serif; font-size: .9rem; font-weight: 700; cursor: pointer; transition: transform .1s; }
        .result-actions button:active { transform: scale(.97); }
        .btn-home { border: 2.5px solid #E8E2DA; background: white; color: #8C8070; }
        .btn-again { border: none; background: #F0A050; color: white; box-shadow: 0 2px 8px rgba(240,144,30,.3); }

        @keyframes popIn { 0%{transform:scale(.7);opacity:0} 60%{transform:scale(1.12);opacity:1} 100%{transform:scale(1);opacity:1} }
        @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
        .pop-in { animation: popIn .35s ease-out; }
        .fade-up { animation: fadeUp .3s ease-out; }

        /* ── Encouragement Message ── */
        .encourage-msg {
            background: #FFF8F0;
            border: 2px solid #F5DFA0;
            border-radius: 16px;
            padding: 14px 18px;
            margin-bottom: 10px;
            text-align: center;
            font-size: 0.95rem;
            font-weight: 700;
            color: #7B6545;
            line-height: 1.8;
            animation: fadeUp .4s ease-out;
        }
        /* ── Writing Feedback ── */
        .writing-feedback {
            background: #F0F6FF;
            border: 2px solid #BDD5F5;
            border-radius: 16px;
            padding: 12px 18px;
            margin-bottom: 20px;
            text-align: left;
            font-size: 0.88rem;
            font-weight: 600;
            color: #3A5A8C;
            line-height: 1.7;
            animation: fadeUp .5s ease-out;
        }
        .writing-feedback .feedback-label {
            font-size: 0.75rem;
            font-weight: 700;
            color: #6A8FBF;
            letter-spacing: 0.04em;
            margin-bottom: 4px;
            text-align: center;
        }
    
    /* ── Splash Screen ── */
    .splash-overlay {
        position: fixed; top: 0; left: 0; right: 0; bottom: 0;
        background: #FFFFFF;
        display: flex; flex-direction: column;
        justify-content: center; align-items: center;
        z-index: 9999;
        transition: opacity 0.5s ease-out;
    }
    .splash-overlay.fade-out { opacity: 0; pointer-events: none; }
    .splash-logo { animation: splashFloat 2.4s ease-in-out infinite; margin-bottom: 24px; }
    .splash-title { font-size: 2rem; font-weight: 900; letter-spacing: -0.025em; margin-bottom: 8px; }
    .splash-subtitle { color: #B8B0A8; font-size: 0.9375rem; font-weight: 500; }
    @keyframes splashFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    @media (max-width:380px) { .splash-title{font-size:1.5rem} }
    @media (min-width:768px) { .splash-logo svg{width:160px;height:134px} .splash-title{font-size:2.5rem} .splash-subtitle{font-size:1.0625rem} }

/* Hide share button/bubble when not logged in */
body:not(.sm-loggedin) [title="공유하기"],
body:not(.sm-loggedin) #share-bubble { display: none !important; }
</style>

let ttsEnabled = (() => { try { return JSON.parse(localStorage.getItem(TTS_KEY)) ?? true; } catch { return true; } })();
function toggleTTS() {
    ttsEnabled = !ttsEnabled;
    localStorage.setItem(TTS_KEY, JSON.stringify(ttsEnabled));
    document.getElementById('tts-toggle').classList.toggle('on', ttsEnabled);
}
function speak(text) {
    if (!ttsEnabled || !window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'ko-KR'; u.rate = 0.9;
    setTimeout(() => window.speechSynthesis.speak(u), 50);
}
document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('tts-toggle').classList.toggle('on', ttsEnabled);
});

// ══════════════════════════════════════════════════════════════
// Interpolate strokes for smoother paths
// ══════════════════════════════════════════════════════════════
function isCollinear(a, b, c) {
    // Check if 3 points are nearly collinear (cross product near zero)
    const cross = Math.abs((b.x - a.x) * (c.y - a.y) - (b.y - a.y) * (c.x - a.x));
    const len = Math.hypot(c.x - a.x, c.y - a.y);
    return len < 0.001 || cross / len < 0.008;
}

function interpolateSmooth(points, numPts) {
    if (points.length < 2) return points;
    // For 2 points, just linear
    if (points.length === 2) {
        const result = [];
        for (let i = 0; i <= numPts; i++) {
            const t = i / numPts;
            result.push({ x: points[0].x + (points[1].x - points[0].x) * t, y: points[0].y + (points[1].y - points[0].y) * t });
        }
        return result;
    }

    // Classify each segment as straight or curved
    function segIsStraight(idx) {
        const prev = idx > 0 ? points[idx - 1] : null;
        const cur = points[idx];
        const next = points[idx + 1];
        const next2 = idx + 2 < points.length ? points[idx + 2] : null;
        if (prev && !isCollinear(prev, cur, next)) return false;
        if (next2 && !isCollinear(cur, next, next2)) return false;
        return true;
    }

    // Generate raw interpolated points per segment
    const raw = [];
    const ptsPerSeg = Math.max(6, Math.ceil(numPts / (points.length - 1)));

    // Pad for Catmull-Rom
    const padded = [
        { x: 2 * points[0].x - points[1].x, y: 2 * points[0].y - points[1].y },
        ...points,
        { x: 2 * points[points.length-1].x - points[points.length-2].x, y: 2 * points[points.length-1].y - points[points.length-2].y }
    ];

    for (let s = 0; s < points.length - 1; s++) {
        const straight = segIsStraight(s);
        for (let i = 0; i <= ptsPerSeg; i++) {
            if (s > 0 && i === 0) continue;
            const t = i / ptsPerSeg;
            if (straight) {
                // Linear interpolation for straight segments
                raw.push({
                    x: points[s].x + (points[s+1].x - points[s].x) * t,
                    y: points[s].y + (points[s+1].y - points[s].y) * t
                });
            } else {
                // Catmull-Rom for curved segments
                const p0 = padded[s], p1 = padded[s+1], p2 = padded[s+2], p3 = padded[s+3];
                const t2 = t * t, t3 = t2 * t;
                raw.push({
                    x: 0.5 * ((2*p1.x) + (-p0.x+p2.x)*t + (2*p0.x-5*p1.x+4*p2.x-p3.x)*t2 + (-p0.x+3*p1.x-3*p2.x+p3.x)*t3),
                    y: 0.5 * ((2*p1.y) + (-p0.y+p2.y)*t + (2*p0.y-5*p1.y+4*p2.y-p3.y)*t2 + (-p0.y+3*p1.y-3*p2.y+p3.y)*t3)
                });
            }
        }
    }

    // Resample to uniform spacing
    let totalLen = 0;
    const segLens = [];
    for (let i = 1; i < raw.length; i++) {
        const len = Math.hypot(raw[i].x - raw[i-1].x, raw[i].y - raw[i-1].y);
        segLens.push(len);
        totalLen += len;
    }
    const result = [];
    for (let i = 0; i <= numPts; i++) {
        const target = (i / numPts) * totalLen;
        let cum = 0;
        for (let s = 0; s < segLens.length; s++) {
            if (cum + segLens[s] >= target || s === segLens.length - 1) {
                const t = segLens[s] > 0 ? Math.min(1, (target - cum) / segLens[s]) : 0;
                result.push({ x: raw[s].x + (raw[s+1].x - raw[s].x) * t, y: raw[s].y + (raw[s+1].y - raw[s].y) * t });
                break;
            }
            cum += segLens[s];
        }
    }
    return result;
}

function getScaledStrokes(num, w, h) {
    const raw = NUM_STROKES[num];
    const margin = 20;
    const usableW = w - margin * 2;
    const usableH = h - margin * 2;
    return raw.map(stroke => {
        const interp = interpolateSmooth(stroke, 200);
        return interp.map(p => ({
            x: margin + p.x * usableW,
            y: margin + p.y * usableH
        }));
    });
}

// ══════════════════════════════════════════════════════════════
// Canvas
// ══════════════════════════════════════════════════════════════
let LW = 0, LH = 0;
let scaledStrokes = [];

function initCanvas() {
    const dpr = window.devicePixelRatio || 1;
    canvasWrap.style.width = '';
    LW = canvasWrap.clientWidth - 5;
    LH = Math.max(320, Math.min(Math.floor(window.innerHeight * 0.48), 420));
    gc.width = Math.round(LW * dpr);
    gc.height = Math.round(LH * dpr);
    gc.style.width = LW + 'px';
    gc.style.height = LH + 'px';
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.scale(dpr, dpr);
    scaledStrokes = getScaledStrokes(G.num, LW, LH);
}

function resetGame() {
    G.drawing = false;
    G.pts = [];
    G.strokes = [];
}

// ══════════════════════════════════════════════════════════════
// Offset path for guide corridor
// ══════════════════════════════════════════════════════════════
function offsetPath(path, d) {
    return path.map((p, i) => {
        let tx, ty;
        if (i === 0) { tx = path[1].x - p.x; ty = path[1].y - p.y; }
        else if (i === path.length - 1) { tx = p.x - path[i-1].x; ty = p.y - path[i-1].y; }
        else { tx = path[i+1].x - path[i-1].x; ty = path[i+1].y - path[i-1].y; }
        const l = Math.hypot(tx, ty) || 1;
        return { x: p.x + (-ty / l) * d, y: p.y + (tx / l) * d };
    });
}

// Smooth a path using moving average to remove jitter from offset normals
function smoothPath(path, iterations) {
    let pts = path.map(p => ({x: p.x, y: p.y}));
    for (let iter = 0; iter < (iterations || 3); iter++) {
        const next = [pts[0]];
        for (let i = 1; i < pts.length - 1; i++) {
            next.push({
                x: pts[i-1].x * 0.25 + pts[i].x * 0.5 + pts[i+1].x * 0.25,
                y: pts[i-1].y * 0.25 + pts[i].y * 0.5 + pts[i+1].y * 0.25
            });
        }
        next.push(pts[pts.length - 1]);
        pts = next;
    }
    return pts;
}

// ══════════════════════════════════════════════════════════════
// Render
// ══════════════════════════════════════════════════════════════
function render() {
    const w = LW, h = LH;
    const tol = GUIDE_TOL;
    ctx.clearRect(0, 0, w, h);

    // Background
    ctx.fillStyle = '#FAFAF8';
    ctx.fillRect(0, 0, w, h);

    // Draw light grid lines
    ctx.strokeStyle = 'rgba(200,192,180,0.2)';
    ctx.lineWidth = 1;
    ctx.setLineDash([]);
    ctx.beginPath();
    ctx.moveTo(0, h / 2);
    ctx.lineTo(w, h / 2);
    ctx.stroke();

    if (G.mode === 'free') {
        // Free mode: completely empty canvas
    } else {
        // Draw all stroke guides simultaneously
        scaledStrokes.forEach(stroke => {
            if (G.mode === 'guide') {
                renderGuideMode(stroke, tol);
            } else if (G.mode === 'dotted') {
                renderDottedMode(stroke);
            }
        });
    }

    // Draw user strokes (completed) - smooth
    G.strokes.forEach(stroke => {
        if (stroke.length > 1) {
            ctx.beginPath();
            drawSmoothPath(stroke);
            ctx.strokeStyle = '#5BC886';
            ctx.lineWidth = 7;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.setLineDash([]);
            ctx.stroke();
        }
    });

    // Draw current user drawing - smooth
    if (G.pts.length > 1) {
        ctx.beginPath();
        drawSmoothPath(G.pts);
        ctx.strokeStyle = '#5BC886';
        ctx.lineWidth = 7;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.setLineDash([]);
        ctx.stroke();
    }
}

// Smooth curve through points using quadratic bezier
function drawSmoothPath(points) {
    if (points.length < 2) return;
    ctx.moveTo(points[0].x, points[0].y);
    if (points.length === 2) {
        ctx.lineTo(points[1].x, points[1].y);
        return;
    }
    for (let i = 0; i < points.length - 1; i++) {
        const xm = (points[i].x + points[i+1].x) / 2;
        const ym = (points[i].y + points[i+1].y) / 2;
        if (i === 0) {
            ctx.lineTo(xm, ym);
        } else {
            ctx.quadraticCurveTo(points[i].x, points[i].y, xm, ym);
        }
    }
    const last = points[points.length - 1];
    ctx.lineTo(last.x, last.y);
}

function drawStrokePath(stroke, color, width) {
    if (stroke.length < 2) return;
    ctx.beginPath();
    drawSmoothPath(stroke);
    ctx.strokeStyle = color;
    ctx.lineWidth = width;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.setLineDash([]);
    ctx.stroke();
}

function renderGuideMode(stroke, tol) {
    // Draw smooth corridor using canvas thick stroke (eliminates jaggedness from offset path computation)

    // Outer border ring
    ctx.beginPath();
    drawSmoothPath(stroke);
    ctx.strokeStyle = 'rgba(91,200,134,.30)';
    ctx.lineWidth = tol * 2 + 4;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.setLineDash([]);
    ctx.stroke();

    // Inner fill
    ctx.beginPath();
    drawSmoothPath(stroke);
    ctx.strokeStyle = 'rgba(91,200,134,.10)';
    ctx.lineWidth = tol * 2;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.setLineDash([]);
    ctx.stroke();

    // Center guide (dashed)
    ctx.beginPath();
    drawSmoothPath(stroke);
    ctx.strokeStyle = 'rgba(110,90,70,.15)';
    ctx.lineWidth = 1.5;
    ctx.lineCap = 'round';
    ctx.setLineDash([8, 8]);
    ctx.stroke();
    ctx.setLineDash([]);

    // Direction arrows
    renderDirectionArrows(stroke, 'rgba(91,200,134,.55)');
}

function renderDirectionArrows(stroke, color, offset, count) {
    const off = offset || 0;
    const arrowCount = count || 4;
    const arrowStep = Math.floor(stroke.length / (arrowCount + 1));
    for (let i = 1; i <= arrowCount; i++) {
        const idx = Math.min(i * arrowStep, stroke.length - 2);
        const p = stroke[idx];
        const pn = stroke[Math.min(idx + 8, stroke.length - 1)];
        const angle = Math.atan2(pn.y - p.y, pn.x - p.x);
        // offset perpendicular to stroke direction
        const nx = -Math.sin(angle) * off;
        const ny = Math.cos(angle) * off;
        ctx.save();
        ctx.translate(p.x + nx, p.y + ny);
        ctx.rotate(angle);
        ctx.beginPath();
        ctx.moveTo(6, 0);
        ctx.lineTo(-3, -4);
        ctx.lineTo(-3, 4);
        ctx.closePath();
        ctx.fillStyle = color;
        ctx.fill();
        ctx.restore();
    }
}

function renderDottedMode(stroke) {
    // Draw smooth dotted line
    ctx.beginPath();
    drawSmoothPath(stroke);
    ctx.strokeStyle = 'rgba(74,64,53,.3)';
    ctx.lineWidth = 6;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.setLineDash([2, 9]);
    ctx.stroke();
    ctx.setLineDash([]);

    // Direction arrows (offset to avoid overlapping, minimal count)
    renderDirectionArrows(stroke, 'rgba(240,144,30,.55)', -12, 2);
}

// ══════════════════════════════════════════════════════════════
// Input handling
// ══════════════════════════════════════════════════════════════
function getPos(e) {
    const r = gc.getBoundingClientRect();
    const s = e.touches ? e.touches[0] : e;
    return { x: (s.clientX - r.left) * (LW / r.width), y: (s.clientY - r.top) * (LH / r.height) };
}

gc.addEventListener('touchstart', onStart, { passive: false });
gc.addEventListener('touchmove', onMove, { passive: false });
gc.addEventListener('touchend', onEnd, { passive: false });
gc.addEventListener('mousedown', onStart);
gc.addEventListener('mousemove', onMove);
gc.addEventListener('mouseup', onEnd);

function onStart(e) {
    e.preventDefault();
    const p = getPos(e);
    G.drawing = true;
    G.pts = [p];
    render();
}

function onMove(e) {
    e.preventDefault();
    if (!G.drawing) return;
    const p = getPos(e);
    const last = G.pts[G.pts.length - 1];
    if (last) {
        const dx = p.x - last.x, dy = p.y - last.y;
        if (dx * dx + dy * dy < 36) return; // min distance 6px
    }
    G.pts.push(p);
    render();
}

function onEnd(e) {
    e.preventDefault();
    if (G.drawing) {
        if (G.pts.length > 3) {
            G.strokes.push([...G.pts]);
        }
        G.drawing = false;
        G.pts = [];
        render();
    }
}

// Actions
// ══════════════════════════════════════════════════════════════
function updateInstr() {

        document.getElementById('instr').textContent = '가이드를 참고하여 숫자를 써보세요';
    }
}

function retry() {
    resetGame();
    updateInstr();
    render();
}

function saveCurrentDrawing() {
    // Render user strokes only on a clean canvas for snapshot
    const tmpCanvas = document.createElement('canvas');
    tmpCanvas.width = gc.width;
    tmpCanvas.height = gc.height;
    const tmpCtx = tmpCanvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    tmpCtx.scale(dpr, dpr);
    tmpCtx.fillStyle = '#FAFAF8';
    tmpCtx.fillRect(0, 0, LW, LH);
    // Draw guide faintly
    tmpCtx.globalAlpha = 0.3;
    if (G.mode === 'guide') {
        scaledStrokes.forEach(s => {
            tmpCtx.beginPath();
            drawSmoothPathOn(tmpCtx, s);
            tmpCtx.strokeStyle = 'rgba(91,200,134,.3)';
            tmpCtx.lineWidth = 1;
            tmpCtx.setLineDash([4, 4]);
            tmpCtx.stroke();
            tmpCtx.setLineDash([]);
        });
    } else if (G.mode === 'dotted') {
        scaledStrokes.forEach(s => {
            tmpCtx.beginPath();
            drawSmoothPathOn(tmpCtx, s);
            tmpCtx.strokeStyle = 'rgba(74,64,53,.2)';
            tmpCtx.lineWidth = 3;
            tmpCtx.setLineDash([2, 7]);
            tmpCtx.stroke();
            tmpCtx.setLineDash([]);
        });
    }
    tmpCtx.globalAlpha = 1;
    // Draw user strokes
    G.strokes.forEach(stroke => {
        if (stroke.length > 1) {
            tmpCtx.beginPath();
            drawSmoothPathOn(tmpCtx, stroke);
            tmpCtx.strokeStyle = '#5BC886';
            tmpCtx.lineWidth = 7;
            tmpCtx.lineCap = 'round';
            tmpCtx.lineJoin = 'round';
            tmpCtx.setLineDash([]);
            tmpCtx.stroke();
        }
    });
    return tmpCanvas.toDataURL('image/png');
}

function drawSmoothPathOn(c, points) {
    if (points.length < 2) return;
    c.moveTo(points[0].x, points[0].y);
    if (points.length === 2) { c.lineTo(points[1].x, points[1].y); return; }
    for (let i = 0; i < points.length - 1; i++) {
        const xm = (points[i].x + points[i+1].x) / 2;
        const ym = (points[i].y + points[i+1].y) / 2;
        if (i === 0) c.lineTo(xm, ym);
        else c.quadraticCurveTo(points[i].x, points[i].y, xm, ym);
    }
    c.lineTo(points[points.length-1].x, points[points.length-1].y);
}

function nextTurn() {
    // Save current drawing
    const dataURL = saveCurrentDrawing();
    G.history.push({ num: G.num, dataURL: dataURL, strokes: G.strokes.map(s => s.map(p => ({x: p.x, y: p.y}))) });
    G.turn++;

    if (G.turn >= TOTAL_TURNS) {
        showResults();
        return;
    }

    // Advance to next number
    G.numIdx = (G.numIdx + 1) % G.nums.length;
    G.num = G.nums[G.numIdx];
    document.getElementById('nav-title').textContent = '숫자 ' + G.num + ' - ' + MODE_LBL[G.mode];
    scaledStrokes = getScaledStrokes(G.num, LW, LH);
    updateProgress();
    resetGame();
    updateInstr();
    render();
    speak('숫자 ' + G.num);
}

// ── Writing Analysis ──
/* ════════════════════════════════════════════════════════════
   쓰기 평가 (4축: 모양 / 크기 / 부드러움 / 비례) + 숫자별 특화 검증
   ════════════════════════════════════════════════════════════ */
// 숫자별 (가로/세로) 비율 권장값
const IDEAL_AR = { 0:0.85, 1:0.22, 2:0.65, 3:0.62, 4:0.72, 5:0.65, 6:0.65, 7:0.65, 8:0.6, 9:0.62 };

// 평가 임계값 — 한 곳에 모아 두어 튜닝하기 쉽게
const TH = {
    // 점수 변환
    SHAPE_DIST_MULT: 250,    // 100 - dist * 250 (333 → 250 완화)
    SMOOTH_RATIO_MULT: 600,
    PROP_DIFF_MULT: 110,
    // 워스트 선정
    SIZE_CRIT: 60, SHAPE_CRIT: 60, PROP_CRIT: 60, AVG_LOW: 72,
    // 베스트 선정
    BEST_AVG_MIN: 75, BEST_AXIS_MIN: 60,
    // 디짓 팁
    SIZE_PRIORITY: 60,
    // 폐곡선 — 자기-근접 거리 / bbox 대각선 비율
    CLOSURE_RATIO: 0.20,
    // self-approach 인덱스 gap 비율 (6, 9에서 통일)
    LOOP_IDX_GAP: 0.35,
    // 디짓별 검사 임계값
    DIGIT: {
        // 6 hook 위치 (정규화 x좌표) — 0.5 미만이면 hook 없음
        N6_HOOK_X_LOW: 0.5,
        N6_HOOK_X_HIGH: 0.65,
        // 6 위/아래 균형 (위 1/3 점 비율)
        N6_BAND_LOW: 0.18,
        N6_BAND_HIGH: 0.40,
        N6_BAND_PENALTY_RANGE: 0.30,
        // 9 윗 동그라미 크기 ratio
        N9_LOOP_RATIO_LOW: 0.20,
        N9_LOOP_RATIO_RANGE: 0.30,
        N9_LOOP_FIND_DIST: 0.18,  // diag 대비 — loop 검출 거리 한도
        // 5 상단 가로획
        N5_TOPBAR_LOW: 0.30,
        N5_TOPBAR_HIGH: 0.55,
        // 3 위·아래 폭 임계
        N3_WIDTH_FULL: 0.7,
        // 4 세로 너무 김 (가로/세로 비율 < )
        N4_TOO_TALL: 0.5,
        // 1 직선성 허용 폭 (xspread/h)
        N1_TOLERANT: 0.10,
        N1_BREAK_AT: 0.50,
    },
};

function _bbox(pts) {
    let minX=Infinity, maxX=-Infinity, minY=Infinity, maxY=-Infinity;
    pts.forEach(p => { if(p.x<minX)minX=p.x; if(p.x>maxX)maxX=p.x; if(p.y<minY)minY=p.y; if(p.y>maxY)maxY=p.y; });
    return { minX, maxX, minY, maxY, w: maxX-minX, h: maxY-minY };
}

// 사용자 stroke를 0~1 정규화 (가로세로 비율 보존, 단위 정사각형 중앙 배치)
function _normStrokes(strokes) {
    const all = strokes.flat();
    if (all.length === 0) return strokes;
    const bb = _bbox(all);
    const scale = Math.max(bb.w, bb.h, 1);
    const ox = (1 - bb.w/scale) / 2;
    const oy = (1 - bb.h/scale) / 2;
    return strokes.map(s => s.map(p => ({ x: ox + (p.x - bb.minX)/scale, y: oy + (p.y - bb.minY)/scale })));
}

// 균등 거리 리샘플링 → n개 점
function _resample(pts, n) {
    if (pts.length === 0) return [];
    if (pts.length === 1) return Array(n).fill({ x: pts[0].x, y: pts[0].y });
    const cum = [0];
    for (let i=1; i<pts.length; i++) cum.push(cum[i-1] + Math.hypot(pts[i].x-pts[i-1].x, pts[i].y-pts[i-1].y));
    const total = cum[cum.length-1];
    if (total === 0) return Array(n).fill({ x: pts[0].x, y: pts[0].y });
    const step = total / (n-1);
    const out = [{ x: pts[0].x, y: pts[0].y }];
    let j = 0;
    for (let i=1; i<n-1; i++) {
        const target = i * step;
        while (j < cum.length-2 && cum[j+1] < target) j++;
        const seg = cum[j+1] - cum[j];
        const t = seg > 0 ? (target - cum[j]) / seg : 0;
        out.push({ x: pts[j].x + (pts[j+1].x-pts[j].x)*t, y: pts[j].y + (pts[j+1].y-pts[j].y)*t });
    }
    out.push({ x: pts[pts.length-1].x, y: pts[pts.length-1].y });
    return out;
}

// 폐곡선/loop 검출 — 인덱스로 idxGapRatio 이상 떨어진 점쌍의 최소 공간거리
// opts.yFilterMin: 이 y 이상의 점들만 비교 (영역 한정)
// 반환: { d, i, j } 또는 null (검출 실패)
function _selfApproach(pts, idxGapRatio, opts) {
    opts = opts || {};
    if (!pts || pts.length < 4) return null;
    const minIdxGap = Math.max(2, Math.floor(pts.length * idxGapRatio));
    let bestI = -1, bestJ = -1, bestD = Infinity;
    for (let i = 0; i < pts.length; i++) {
        if (opts.yFilterMin != null && pts[i].y < opts.yFilterMin) continue;
        for (let j = i + minIdxGap; j < pts.length; j++) {
            if (opts.yFilterMin != null && pts[j].y < opts.yFilterMin) continue;
            const d = Math.hypot(pts[i].x - pts[j].x, pts[i].y - pts[j].y);
            if (d < bestD) { bestD = d; bestI = i; bestJ = j; }
        }
    }
    return bestI < 0 ? null : { d: bestD, i: bestI, j: bestJ };
}

// 폐곡선 점수 (0~1) — 거리가 normValue * closureRatio 이내면 닫힘으로 봄
function _closureScore(d, normValue, closureRatio) {
    return Math.max(0, 1 - (d / Math.max(normValue, 1)) / closureRatio);
}

// 두 stroke 평균 점거리 (정/역 방향 중 작은 값 — DTW 단순화 버전)
function _strokeDist(a, b, n) {
    n = n || 28;
    const ra = _resample(a, n), rb = _resample(b, n);
    let df = 0, dr = 0;
    for (let i=0; i<n; i++) {
        df += Math.hypot(ra[i].x - rb[i].x, ra[i].y - rb[i].y);
        dr += Math.hypot(ra[i].x - rb[n-1-i].x, ra[i].y - rb[n-1-i].y);
    }
    return Math.min(df, dr) / n;
}

// 모양 점수 (0~100): 사용자 stroke ↔ NUM_STROKES 평균 거리 → 점수
// (1) 전체 경로 비교 + (2) 획별 매칭, 정/역 stroke 순서 둘 다 시도해 더 좋은 거리 사용
// → 단일획/다획, 다른 stroke 순서로 그린 8/9 등도 부당하게 페널티 받지 않도록
function scoreShape(num, userStrokes) {
    const ref = NUM_STROKES[num];
    if (!ref || !userStrokes || userStrokes.length === 0) return 0;
    const userN = _normStrokes(userStrokes);
    // 정답 stroke 순서를 정/역 둘 다 시도
    const refOrders = ref.length > 1 ? [ref, ref.slice().reverse()] : [ref];
    let bestDist = Infinity;
    for (const r of refOrders) {
        // (1) 전체 경로 비교
        const userFull = userN.flat();
        const refFull = r.flat();
        const fullDist = _strokeDist(userFull, refFull, 60);
        // (2) 획별 그리디 매칭
        const used = new Set();
        let total = 0, matched = 0;
        r.forEach((rs) => {
            let best = -1, bestD = Infinity;
            for (let ui=0; ui<userN.length; ui++) {
                if (used.has(ui)) continue;
                const d = _strokeDist(userN[ui], rs);
                if (d < bestD) { bestD = d; best = ui; }
            }
            if (best >= 0) { used.add(best); total += bestD; matched++; }
        });
        const perStrokeAvg = matched > 0 ? total / matched : Infinity;
        const d = Math.min(fullDist, perStrokeAvg);
        if (d < bestDist) bestDist = d;
    }
    // 획 수 차이 페널티는 약하게만 (±1까지 관대)
    // 단일획/이중획 모두 자연스러운 8·9는 페널티 면제
    const ALT_STROKE_OK = num === 8 || num === 9;
    const cntDiff = ALT_STROKE_OK ? 0 : Math.max(0, Math.abs(ref.length - userStrokes.length) - 1);
    const penalty = cntDiff * 0.04;
    return Math.max(0, Math.min(100, Math.round(100 - (bestDist + penalty) * TH.SHAPE_DIST_MULT)));
}

// 크기 점수 (0~100): 캔버스의 50~85% 사용을 이상적으로
function scoreSize(strokes, canvasW, canvasH) {
    const all = strokes.flat();
    if (all.length === 0) return 0;
    const bb = _bbox(all);
    const m = Math.max(bb.w/canvasW, bb.h/canvasH);
    if (m < 0.18) return 25;
    if (m < 0.30) return 50;
    if (m < 0.42) return 70;
    if (m < 0.55) return 88;
    if (m <= 0.92) return 96;
    return 88;
}

// 부드러움 점수 (0~100): 떨림을 경로 길이 대비로 정규화 (점 밀도 무관)
function scoreSmooth(strokes, canvasW) {
    let totalDev = 0, totalLen = 0, totalPts = 0;
    strokes.forEach(pts => {
        totalPts += pts.length;
        if (pts.length < 3) return;
        for (let i=1; i<pts.length-1; i++) {
            const ex = (pts[i-1].x + pts[i+1].x) / 2;
            const ey = (pts[i-1].y + pts[i+1].y) / 2;
            totalDev += Math.hypot(pts[i].x - ex, pts[i].y - ey);
            totalLen += Math.hypot(pts[i+1].x - pts[i-1].x, pts[i+1].y - pts[i-1].y);
        }
    });
    // 너무 짧은 stroke (< 8 점)은 fallback 50 (관대 70 → 보수)
    if (totalPts < 8 || totalLen === 0) return 50;
    const ratio = totalDev / totalLen;
    return Math.max(15, Math.min(100, Math.round(100 - ratio * TH.SMOOTH_RATIO_MULT)));
}

// 비례 점수 + sub-score (0~100): 가로/세로 비율 + 숫자별 특화 검증
// 반환: { score, sub: { ...digit-specific sub-scores... } }
function scoreProportion(num, strokes) {
    const all = strokes.flat();
    const sub = {};
    if (all.length === 0) return { score: 0, sub: sub };
    const bb = _bbox(all);
    const diag = Math.max(bb.w, bb.h, 1);
    const ar = bb.w / Math.max(bb.h, 1);
    const target = IDEAL_AR[num] || 0.65;
    const diff = Math.abs(ar - target) / target;
    let s = Math.max(0, 100 - diff * TH.PROP_DIFF_MULT);
    const D = TH.DIGIT;

    if (num === 8) {
        // 위·아래 고리 크기 균형 — 단일획이든 다획이든 y 중간으로 분할
        let topBB, botBB;
        if (strokes.length >= 2) {
            topBB = _bbox(strokes[0]); botBB = _bbox(strokes[1]);
        } else if (all.length >= 6) {
            const midY = bb.minY + bb.h / 2;
            const topPts = all.filter(p => p.y < midY);
            const botPts = all.filter(p => p.y >= midY);
            if (topPts.length >= 3 && botPts.length >= 3) {
                topBB = _bbox(topPts); botBB = _bbox(botPts);
            }
        }
        if (topBB && botBB) {
            const tArea = topBB.w * topBB.h, bArea = botBB.w * botBB.h;
            const ratio = Math.min(tArea, bArea) / Math.max(tArea, bArea, 1);
            s = (s + ratio * 100) / 2;
        }
    } else if (num === 1) {
        // 1은 직선성 위주, 약간의 흔들림은 관용 (xspread/h가 N1_TOLERANT 이내면 만점)
        const pts = strokes.flat();
        if (pts.length >= 2) {
            const xs = pts.map(p => p.x);
            const xspread = (Math.max(...xs) - Math.min(...xs));
            const ratio = xspread / Math.max(bb.h, 1);
            let v;
            if (ratio < D.N1_TOLERANT) v = 1;
            else if (ratio < D.N1_BREAK_AT) v = 1 - (ratio - D.N1_TOLERANT) / (D.N1_BREAK_AT - D.N1_TOLERANT);
            else v = 0;
            s = v * 100;
        }
    } else if (num === 0) {
        // 폐곡선 — diag 기준 통일
        const r = _selfApproach(all, TH.LOOP_IDX_GAP);
        if (r) {
            const closure = _closureScore(r.d, diag, TH.CLOSURE_RATIO);
            s = s * 0.5 + closure * 100 * 0.5;
        } else if (strokes[0] && strokes[0].length > 1) {
            const s0 = strokes[0];
            const startEnd = Math.hypot(s0[0].x - s0[s0.length-1].x, s0[0].y - s0[s0.length-1].y);
            const closure = _closureScore(startEnd, diag, TH.CLOSURE_RATIO);
            s = s * 0.5 + closure * 100 * 0.5;
        }
    } else if (num === 9) {
        // 폐곡선 + 윗 동그라미 크기
        const closeR = _selfApproach(all, TH.LOOP_IDX_GAP);
        if (closeR) {
            const closure = _closureScore(closeR.d, diag, TH.CLOSURE_RATIO);
            // loop 검출 (더 짧은 gap으로 최단 자기-근접 쌍)
            let loopSize = 1;
            const loopR = _selfApproach(all, 0.15);
            if (loopR && loopR.d < diag * D.N9_LOOP_FIND_DIST) {
                const loopYs = all.slice(loopR.i, loopR.j + 1).map(p => p.y);
                const loopH = Math.max(...loopYs) - Math.min(...loopYs);
                const ratio = loopH / Math.max(bb.h, 1);
                loopSize = Math.max(0, Math.min(1, (ratio - D.N9_LOOP_RATIO_LOW) / D.N9_LOOP_RATIO_RANGE));
                sub.topLoop9 = Math.round(loopSize * 100);
            } else {
                sub.topLoop9 = 100;
            }
            s = s * 0.5 + closure * 100 * 0.2 + loopSize * 100 * 0.3;
        }
    } else if (num === 4 && strokes.length >= 2) {
        const a = _bbox(strokes[0]), b = _bbox(strokes[1]);
        const overlapX = Math.max(0, Math.min(a.maxX, b.maxX) - Math.max(a.minX, b.minX));
        const overlapY = Math.max(0, Math.min(a.maxY, b.maxY) - Math.max(a.minY, b.minY));
        const cross = (overlapX > 0 && overlapY > 0) ? 100 : 50;
        s = (s + cross) / 2;
    } else if (num === 6) {
        if (all.length > 5) {
            const top = all.reduce((a, p) => p.y < a.y ? p : a);
            const topNorX = (top.x - bb.minX) / Math.max(bb.w, 1);
            const hookScore = Math.max(0, Math.min(1, (topNorX - D.N6_HOOK_X_LOW) / (D.N6_HOOK_X_HIGH - D.N6_HOOK_X_LOW)));
            const upperY = bb.minY + bb.h / 3;
            const upperPts = all.filter(p => p.y < upperY).length;
            const upperRatio = upperPts / all.length;
            let balanceScore;
            if (upperRatio < D.N6_BAND_LOW) balanceScore = upperRatio / D.N6_BAND_LOW;
            else if (upperRatio > D.N6_BAND_HIGH) balanceScore = Math.max(0, 1 - (upperRatio - D.N6_BAND_HIGH) / D.N6_BAND_PENALTY_RANGE);
            else balanceScore = 1;
            // 폐곡선 (헬퍼로 통일)
            let closure6 = 1;
            const cR = _selfApproach(all, TH.LOOP_IDX_GAP);
            if (cR) closure6 = _closureScore(cR.d, diag, TH.CLOSURE_RATIO);
            // 50% base + (hook/balance/closure) 합쳐 50% — 다른 디지트와 가중치 통일
            s = s * 0.5 + (hookScore * 16.67) + (balanceScore * 16.67) + (closure6 * 16.66);
            // sub-scores
            sub.bottomLoop6 = upperRatio > D.N6_BAND_HIGH
                ? Math.max(0, Math.round(100 - (upperRatio - D.N6_BAND_HIGH) * 250))
                : 100;
            sub.bottomClosure6 = Math.round(closure6 * 100);
        }
    } else if (num === 3) {
        if (all.length >= 6) {
            const midY = bb.minY + bb.h / 2;
            const top = all.filter(p => p.y < midY);
            const bot = all.filter(p => p.y >= midY);
            if (top.length >= 3 && bot.length >= 3) {
                const tBB = _bbox(top), bBB = _bbox(bot);
                const tWR = tBB.w / Math.max(bb.w, 1);
                const bWR = bBB.w / Math.max(bb.w, 1);
                const widthScore = Math.min(1, Math.min(tWR, bWR) / D.N3_WIDTH_FULL);
                const symScore = Math.min(tBB.w, bBB.w) / Math.max(tBB.w, bBB.w, 1);
                const score3 = (widthScore + symScore) / 2;
                s = (s + score3 * 100) / 2;
            }
        }
    } else if (num === 5) {
        if (all.length >= 6) {
            const upperY = bb.minY + bb.h * 0.25;
            const upperPts = all.filter(p => p.y <= upperY);
            let topBarScore = 0;
            if (upperPts.length >= 2) {
                const xs = upperPts.map(p => p.x);
                const xspread = (Math.max(...xs) - Math.min(...xs));
                const ratio = xspread / Math.max(bb.w, 1);
                topBarScore = Math.max(0, Math.min(1, (ratio - D.N5_TOPBAR_LOW) / (D.N5_TOPBAR_HIGH - D.N5_TOPBAR_LOW)));
            }
            // 하단 60% 영역 폐곡선
            const lowerStartY = bb.minY + bb.h * 0.4;
            const loopR = _selfApproach(all, TH.LOOP_IDX_GAP, { yFilterMin: lowerStartY });
            const bottomLoop5 = loopR ? _closureScore(loopR.d, bb.h, TH.CLOSURE_RATIO) : 1;
            s = s * 0.5 + topBarScore * 25 + bottomLoop5 * 25;
        }
    } else if (num === 7) {
        // 상단 가로획(top bar) 존재 + 가로/세로 비율
        let topBarScore = 0;
        if (all.length >= 4) {
            const upperY = bb.minY + bb.h * 0.20;
            const upperPts = all.filter(p => p.y <= upperY);
            if (upperPts.length >= 2) {
                const xs = upperPts.map(p => p.x);
                const xspread = Math.max(...xs) - Math.min(...xs);
                const ratio = xspread / Math.max(bb.w, 1);
                topBarScore = Math.max(0, Math.min(1, (ratio - 0.30) / 0.30));  // 30%~60% spread
            }
        }
        let balance = 0.5;
        const xs = all.map(p => p.x), ys = all.map(p => p.y);
        const wsp = Math.max(...xs) - Math.min(...xs);
        const hsp = Math.max(...ys) - Math.min(...ys);
        if (hsp > 0) {
            const r = wsp / hsp;
            balance = Math.max(0, 1 - Math.abs(r - 0.7) / 0.7);
        }
        s = s * 0.5 + topBarScore * 25 + balance * 25;
    }

    // 4 sub-score
    if (num === 4 && all.length >= 3) sub.tallness4 = ar;

    return { score: Math.max(0, Math.min(100, Math.round(s))), sub: sub };
}

function evaluateTurn(item, canvasW, canvasH) {
    const strokes = item.strokes || [];
    const propResult = scoreProportion(item.num, strokes);
    const r = {
        num: item.num,
        shape: scoreShape(item.num, strokes),
        size: scoreSize(strokes, canvasW, canvasH),
        smooth: scoreSmooth(strokes, canvasW),
        prop: propResult.score,
        ...propResult.sub,
    };
    // 2 sub-score (scoreProportion에 안 넣은 메시지 전용 검사) — 아래쪽 가로 받침 충실도
    if (item.num === 2 && strokes.length > 0) {
        const all = strokes.flat();
        if (all.length >= 3) {
            const bb = _bbox(all);
            const lowerY = bb.minY + bb.h * 0.75;
            const lowerPts = all.filter(p => p.y >= lowerY);
            if (lowerPts.length >= 2) {
                const xs = lowerPts.map(p => p.x);
                const xspread = Math.max(...xs) - Math.min(...xs);
                const ratio = xspread / Math.max(bb.w, 1);
                r.bottom2 = Math.round(Math.max(0, Math.min(1, (ratio - 0.3) / 0.4)) * 100);
            } else {
                r.bottom2 = 0;
            }
        }
    }
    return r;
}

// 6 전용 분기 (shape/prop 양쪽에서 동일하게 사용)
function _tip6(sc) {
    if (sc.bottomClosure6 != null && sc.bottomClosure6 < 60) {
        return '6의 아래쪽 동그라미를 끝까지 닿도록 닫아주세요.';
    }
    if (sc.bottomLoop6 != null && sc.bottomLoop6 < 60) {
        return '6의 아래쪽 동그라미를 또렷하고 충분히 크게 그려주세요.';
    }
    return '6의 위쪽 갈고리를 충분히 길게 그려보세요.';
}

// 숫자별 특화 코멘트 — 가장 약한 축 1개를 골라 한 줄로
// 단, 크기가 TH.SIZE_PRIORITY 미만이면 항상 크기를 우선
function digitTip(num, sc) {
    if (sc.size < TH.SIZE_PRIORITY) {
        return num + '을 더 크게, 칸을 시원하게 써보세요.';
    }
    const weakest = ['shape','prop','smooth','size']
        .map(k => ({ k, v: sc[k] })).sort((a,b) => a.v - b.v)[0];
    if (weakest.v >= 75) return null;
    if (weakest.k === 'shape') {
        // 2: 아래쪽 받침이 약하면 받침 메시지, 아니면 위쪽 곡선 메시지
        if (num === 2) {
            if (sc.bottom2 != null && sc.bottom2 < 60) {
                return '2의 아래쪽을 가로로 길게 받쳐주세요.';
            }
            return '2의 위쪽을 동그랗게 굴려주세요.';
        }
        // 6: 헬퍼 호출 (prop과 공유)
        if (num === 6) return _tip6(sc);
        // 9: 윗 동그라미가 너무 작으면 크기 메시지, 아니면 닫기 메시지
        if (num === 9) {
            if (sc.topLoop9 != null && sc.topLoop9 < 60) {
                return '9의 위쪽 동그라미를 더 크게 그리고 아래 꼬리를 짧게 내려보세요.';
            }
            return '9의 위쪽 동그라미를 둥글게 닫아주세요.';
        }
        // 4: shape는 가로선 메시지만 (세로 길이는 prop 분기로 일원화)
        if (num === 4) return '4의 가로선이 가운데를 가로지르도록 그려보세요.';
        const map = {
            0:'0은 위에서 시작해 한 번에 동그랗게 그려보세요.',
            1:'1은 위에서 아래로 곧게 한 번에 그어보세요.',
            3:'3은 위·아래 둥근 부분을 매끄럽게 굴려서 그려보세요.',
            5:'5는 위 가로선을 긋고 아래에 곡선을 그려보세요.',
            7:'7은 가로 한 번, 비스듬한 선 한 번으로 또렷하게 써보세요.',
            8:'8은 위·아래 동그라미를 또렷하게 두 개로 그려보세요.',
        };
        return map[num];
    }
    if (weakest.k === 'prop') {
        if (num === 8) return '8은 위 동그라미와 아래 동그라미 크기를 비슷하게 해보세요.';
        if (num === 1) return '1은 옆으로 흔들리지 않게 곧게 세워서 써보세요.';
        if (num === 0) return '0의 동그라미가 끝까지 닿도록 닫아주세요.';
        // 2: 받침이 약하면 shape와 동일한 받침 메시지, 아니면 비례 fallback
        if (num === 2) {
            if (sc.bottom2 != null && sc.bottom2 < 60) {
                return '2의 아래쪽을 가로로 길게 받쳐주세요.';
            }
            return '2를 너무 좁거나 넓지 않게 그려보세요.';
        }
        if (num === 3) return '3의 위·아래가 똑같이 동그랗게 보이도록 그려보세요.';
        if (num === 5) return '5의 위쪽 가로획이 또렷하게 보이도록 그려보세요.';
        if (num === 9) {
            if (sc.topLoop9 != null && sc.topLoop9 < 60) {
                return '9의 위쪽 동그라미를 더 크게 그리고 아래 꼬리를 짧게 내려보세요.';
            }
            return '9의 위쪽 동그라미를 둥글게 닫아주세요.';
        }
        if (num === 6) return _tip6(sc);
        if (num === 4) {
            if (sc.tallness4 != null && sc.tallness4 < 0.5) {
                return '4의 세로선이 너무 길지 않게 그려보세요.';
            }
            return '4를 너무 좁거나 넓지 않게 그려보세요.';
        }
        if (num === 7) return '7은 가로획과 비스듬한 선의 길이 비율을 비슷하게 해보세요.';
        return num + '의 가로/세로 비율을 더 신경써 보세요.';
    }
    if (weakest.k === 'smooth') return num + '을 쓸 때 손에 힘을 빼고 천천히 그어보세요.';
    if (weakest.k === 'size')   return num + '을 더 크게, 칸을 시원하게 써보세요.';
    return null;
}

// 정답 모양 SVG (반투명 고스트 — 결과 카드 오버레이)
function ghostSVG(num) {
    const ref = NUM_STROKES[num];
    if (!ref) return '';
    const paths = ref.map(stroke => {
        if (stroke.length === 0) return '';
        const d = stroke.map((p, i) => (i===0 ? 'M' : 'L') + (p.x*100).toFixed(1) + ',' + (p.y*100).toFixed(1)).join(' ');
        return '<path d="'+d+'" fill="none" stroke="#5BC886" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.18"/>';
    }).join('');
    return '<svg class="ghost-overlay" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet">'+paths+'</svg>';
}

function showResults() {
_smGameCompleted=true;
    gameView.classList.add('hidden');
    resultView.classList.remove('hidden');
    speak('연습 완료! 잘했어요!');
    document.getElementById('result-title').textContent = '연습 완료!';
    document.getElementById('result-subtitle').textContent = G.nums.length === 1
        ? '숫자 ' + G.nums[0] + '을(를) ' + TOTAL_TURNS + '번 써봤어요'
        : TOTAL_TURNS + '개의 숫자를 모두 써봤어요';

    // ── 모든 턴 평가 ──
    const evals = G.history.map(item => evaluateTurn(item, LW, LH));

    // ── 결과 그리드 (썸네일 + 정답 고스트 + 점수 배지) ──
    const grid = document.getElementById('result-grid');
    grid.innerHTML = '';
    G.history.forEach((item, i) => {
        const cell = document.createElement('div');
        cell.className = 'result-cell';
        cell.innerHTML =
            '<div class="result-label">' + item.num + '</div>' +
            '<div class="img-wrap">' +
                ghostSVG(item.num) +
                '<img src="' + item.dataURL + '" alt="' + item.num + '">' +
            '</div>';
        grid.appendChild(cell);
    });

    // ── 4축 평균 + 막대 ──
    const axes = ['shape','size','smooth','prop'];
    const labels = { shape:'모양', size:'크기', smooth:'부드러움', prop:'비례' };
    const avg = {};
    axes.forEach(k => {
        avg[k] = Math.round(evals.reduce((s, e) => s + e[k], 0) / Math.max(evals.length, 1));
    });
    const sb = document.getElementById('score-bars');
    sb.innerHTML =
        '<div class="sb-title">✏️ 쓰기 평가</div>' +
        axes.map(k =>
            '<div class="bar-row">' +
              '<span class="bar-label">' + labels[k] + '</span>' +
              '<div class="bar-track"><div class="bar-fill" style="width:' + avg[k] + '%"></div></div>' +
              '<span class="bar-value">' + avg[k] + '</span>' +
            '</div>'
        ).join('');


    // ── 요약 팁: 가장 잘 쓴 / 연습 필요 / 한 줄 코멘트 ──
    const overalls = evals.map(e => ({
        num: e.num,
        v: (e.shape + e.size + e.smooth + e.prop) / 4,
        e
    }));
    const best = overalls.slice().sort((a,b) => b.v - a.v).slice(0, 2);
    // 더 연습해요: 단일 composite criticality
    // 각 축의 임계값 미달 정도에 가중치를 곱해 최댓값 사용 — 한 축이라도 심하게 약하면 우선
    const _uniq = arr => Array.from(new Set(arr));
    const _crit = (o) => Math.max(
        Math.max(0, TH.SIZE_CRIT  - o.e.size)  * 1.5,   // size 가중 (어린이에게 가장 행동 가능)
        Math.max(0, TH.SHAPE_CRIT - o.e.shape) * 1.0,
        Math.max(0, TH.PROP_CRIT  - o.e.prop)  * 0.8,
        Math.max(0, TH.AVG_LOW    - o.v)       * 0.6,
    );
    const worsts = overalls
        .filter(o => _crit(o) > 0)
        .slice()
        .sort((a, b) => _crit(b) - _crit(a))
        .slice(0, 3);
    const bestNums = _uniq(best.map(o => o.num)).slice(0, 2);
    const worstNums = _uniq(worsts.map(o => o.num));
    // 표시 순서는 숫자 오름차순으로 통일
    const worstsSorted = worsts.slice().sort((a, b) => a.num - b.num);

    // 모든 worst 숫자에 대해 디짓 팁 생성 (숫자 오름차순, 중복 제거)
    const perTips = [];
    const seenTips = new Set();
    worstsSorted.forEach(o => {
        const tip = digitTip(o.num, o.e);
        if (tip && !seenTips.has(tip)) {
            perTips.push(tip);
            seenTips.add(tip);
        }
    });

    // 전체 약축 기반 일반 팁 (worsts가 없을 때만 fallback)
    const weakestAxis = axes.slice().sort((a,b) => avg[a] - avg[b])[0];
    const generalTips = {
        shape: '모양을 신경 써서 또렷하게 그려보세요.',
        size:  '글자를 칸의 절반 이상 크게 써보세요.',
        smooth:'손에 힘을 빼고 천천히 한 번에 그어보세요.',
        prop:  '글자의 가로/세로 비율을 자연스럽게 맞춰보세요.',
    };

    const tipsEl = document.getElementById('summary-tips');
    let html = '';
    // 잘 쓴 = 워스트에 안 잡힌 숫자 중 평균 상위 2개 (sanity floor: avg ≥ 65)
    const _worstSet = new Set(worsts.map(o => o.num));
    const goodBest = overalls
        .filter(o => !_worstSet.has(o.num) && o.v >= 65)
        .sort((a, b) => b.v - a.v)
        .map(o => o.num);
    const goodBestUniq = _uniq(goodBest).slice(0, 2).sort((a, b) => a - b);
    const worstNumsSorted = worstNums.slice().sort((a, b) => a - b);
    if (goodBestUniq.length > 0) {
        html += '<div class="tip-row"><span class="tip-label">잘 쓴 숫자</span>' + goodBestUniq.join(', ') + '</div>';
    }
    if (worstNumsSorted.length > 0) {
        html += '<div class="tip-row"><span class="tip-label">더 연습해요</span>' + worstNumsSorted.join(', ') + '</div>';
        // 팁은 "더 연습해요" 숫자가 있을 때만 출력
        if (perTips.length > 0) {
            perTips.forEach(t => {
                html += '<div class="tip-row"><span class="tip-label">팁</span>' + t + '</div>';
            });
        } else if (avg[weakestAxis] < 80) {
            html += '<div class="tip-row"><span class="tip-label">팁</span>' + generalTips[weakestAxis] + '</div>';
        }
    }
    if (!html) {
        html = '<div class="tip-empty">균형 잡힌 글씨예요! 자세와 힘 조절 모두 잘 하고 있어요.</div>';
    }
    tipsEl.innerHTML = html;
}

/* ── localStorage / 문제별 실시간 기록 ── */
var _VK='sm_visits_'+_AK;
var _obsv=null,_prevQ=0,_prevSc=0;

function _gv(){try{return JSON.parse(localStorage.getItem(_VK))||[];}catch(e){return [];}}

function _startSession(mod){
  var today=new Date().toISOString().split('T')[0];
  var vv=_gv();
  var en=vv.find(function(x){return x.date===today;});
  if(!en){en={date:today,sessions:[],totalProblems:0,totalCorrect:0};vv.push(en);}
  en.sessions.push({total:0,correct:0,mode:mod,t:Date.now()});
  localStorage.setItem(_VK,JSON.stringify(vv));
}

function _recProblem(isCorrect){
  var today=new Date().toISOString().split('T')[0];
  var vv=_gv();
  var en=vv.find(function(x){return x.date===today;});
  if(!en) return;
  var sess=en.sessions[en.sessions.length-1];
  if(!sess) return;
  sess.total++;
  if(isCorrect) sess.correct++;
  en.totalProblems=(en.totalProblems||0)+1;
  if(isCorrect) en.totalCorrect=(en.totalCorrect||0)+1;
  localStorage.setItem(_VK,JSON.stringify(vv));
}

function _startObserving(){
  _stopObserving();
  var ql=document.getElementById('q-label')||document.getElementById('question-number')||document.getElementById('progress-label')||document.getElementById('dq-label')||document.getElementById('cv-question');
  var sl=document.getElementById('play-score')||document.getElementById('dscore')||document.getElementById('correctCount');
  _prevQ=1; _prevSc=0;
  if(ql){
    _obsv=new MutationObserver(function(){
      var m=(ql.textContent||'').match(/(\d+)/);
      if(!m) return;
      var qn=parseInt(m[1]);
      if(qn>_prevQ){
        var sc=parseInt((sl?sl.textContent:'0').replace(/[^0-9]/g,''))||0;
        _recProblem(sc>_prevSc);
        _prevSc=sc; _prevQ=qn;
      }
    });
    _obsv.observe(ql,{childList:true,characterData:true,subtree:true});
  } else if(sl){
    _prevSc=parseInt((sl.textContent||'').replace(/[^0-9]/g,''))||0;
    _obsv=new MutationObserver(function(){
      var sc=parseInt((sl.textContent||'').replace(/[^0-9]/g,''))||0;
      if(sc>_prevSc){ _recProblem(true); _prevSc=sc; }
    });
    _obsv.observe(sl,{childList:true,characterData:true,subtree:true});
  }
}

function _stopObserving(){
  if(_obsv){_obsv.disconnect();_obsv=null;}
}

function _recVisit(){
  if(_LK&&!localStorage.getItem(_LK)) return;
  var today=new Date().toISOString().split('T')[0];
  var vv=_gv();
  if(!vv.find(function(x){return x.date===today;})){
    vv.push({date:today,sessions:[],totalProblems:0,totalCorrect:0});
    localStorage.setItem(_VK,JSON.stringify(vv));
  }
}

window._smRec=function(isCorrect){ try{ _recProblem(!!isCorrect); }catch(e){} };
window._smStart=function(mode){ try{ _startSession(mode==null?null:mode); }catch(e){} };
window._smStop=function(){ try{ _stopObserving(); }catch(e){} };

      var sc=parseInt((sl?sl.textContent:'0').replace(/[^0-9]/g,''))||0;
      _recProblem(sc>_prevSc);
    }catch(e){}
    _stopObserving();
  };
}

/* ── socialLogin / doLogin 패치 (로그인 후 pending 탭 이동) ── */
function _smAfterLogin(){
  _showBar(true);

  if(window._smPendingTab){
    var pt=window._smPendingTab;window._smPendingTab=null;

var _oSL=typeof socialLogin==='function'?socialLogin:null;

}
var _oDL=typeof doLogin==='function'?doLogin:null;

/* ── 로그아웃 ── */
window._smLogout=function(){
  if(typeof logout==='function') logout();
  else if(typeof doLogout==='function') doLogout();
  else if(typeof socialLogout==='function') socialLogout();
  else if(_LK) localStorage.removeItem(_LK);
  var lbs=document.querySelectorAll('.logout-btn');
  for(var i=0;i<lbs.length;i++) lbs[i].style.display='none';
  setTimeout(function(){window._smTab('home');},10);
};

/* ── 달력 ── */
window._smCN=function(d){
  _cm+=d;
  if(_cm<0){_cm=11;_cy--;}
  if(_cm>11){_cm=0;_cy++;}
  _rCal();
};
var _MN=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

function _rCal(){
  var lbl=document.getElementById('sm-clbl');
  if(lbl) lbl.textContent=_cy+'년 '+_MN[_cm];
  var vv=_gv();var vm={};vv.forEach(function(v){vm[v.date]=v;});
  var today=new Date().toISOString().split('T')[0];
  var first=new Date(_cy,_cm,1).getDay();
  var days=new Date(_cy,_cm+1,0).getDate();
  var mT=0,mC=0,mD=0;
  for(var d=1;d<=days;d++){
    var ds=_cy+'-'+String(_cm+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    if(vm[ds]){mD++;mT+=vm[ds].totalProblems||0;mC+=vm[ds].totalCorrect||0;}
  }
  var su=document.getElementById('sm-msum');
  if(su) su.innerHTML=[
    '<div class="sm-mc"><div class="sm-mn">'+mD+'</div><div class="sm-ml">방문 일수</div></div>',
    '<div class="sm-mc"><div class="sm-mn">'+mT+'</div><div class="sm-ml">푼 문제 수</div></div>',
    '<div class="sm-mc"><div class="sm-mn">'+(mT>0?Math.round(mC/mT*100):0)+'%</div><div class="sm-ml">정답률</div></div>',
  ].join('');
  var body=document.getElementById('sm-cbody');
  if(!body) return;
  var html='<tr>';
  for(var i=0;i<first;i++) html+='<td><div class="sm-cd"></div></td>';
  for(var d=1;d<=days;d++){
    var ds=_cy+'-'+String(_cm+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    var cls='sm-cd';
    if(vm[ds]) cls+=' smd';
    if(ds===today) cls+=' smt';
    var cl=vm[ds]?'onclick="window._smDD(\''+ds+'\')"':'';
    html+='<td><div class="'+cls+'" '+cl+'>'+d+'</div></td>';
    if((first+d-1)%7===6&&d<days) html+='</tr><tr>';
  }
  body.innerHTML=html+'</tr>';
  var _recent=null;
  for(var _rd=days;_rd>=1;_rd--){
    var _rs=_cy+'-'+String(_cm+1).padStart(2,'0')+'-'+String(_rd).padStart(2,'0');
    if(vm[_rs]&&(vm[_rs].totalProblems||0)>0){_recent=_rs;break;}
  }
  if(_recent) window._smDD(_recent);
  else document.getElementById('sm-ddet').classList.add('smh');
  _rTrend();
}

function _rTrend(){
  var el=document.getElementById('sm-trend');
  if(!el) return;
  var vv=_gv();
  var monthData=vv.filter(function(v){
    var p=(v.date||'').split('-');
    return p.length===3 && parseInt(p[0])===_cy && parseInt(p[1])===_cm+1 && (v.totalProblems||0)>0;
  }).sort(function(a,b){return a.date<b.date?-1:1;});
  if(monthData.length===0){
    el.innerHTML='<div class="sm-tg-title">이달의 학습 추이</div><div class="sm-tg-empty">이번 달 기록이 없어요</div>';
    return;
  }
  var W=320,H=120,pad=14,bot=24,top=12;
  var maxP=0,totalP=0,totalC=0;
  monthData.forEach(function(v){
    if((v.totalProblems||0)>maxP) maxP=v.totalProblems;
    totalP+=v.totalProblems||0; totalC+=v.totalCorrect||0;
  });
  if(maxP<1) maxP=1;
  var innerW=W-pad*2;
  var n=monthData.length;
  var step=innerW/n;
  var barW=Math.max(2,Math.min(28,step*0.62));
  var chartH=H-top-bot;
  var midY=top+chartH*0.5;
  var refLine='<line x1="'+pad+'" y1="'+midY.toFixed(1)+'" x2="'+(W-pad)+'" y2="'+midY.toFixed(1)+'" stroke="#E0DAD2" stroke-width="0.7" stroke-dasharray="2,3"/>';
  var bars='',labels='',line='',dots='';
  var prevX=null,prevY=null;
  monthData.forEach(function(v,i){
    var cx=pad+step*(i+0.5);
    var probH=((v.totalProblems||0)/maxP)*chartH;
    var by=top+(chartH-probH);
    bars+='<rect x="'+(cx-barW/2).toFixed(1)+'" y="'+by.toFixed(1)+'" width="'+barW.toFixed(1)+'" height="'+probH.toFixed(1)+'" rx="2.5" fill="#6BADE8" opacity="0.85" style="cursor:pointer" onclick="window._smDD(\''+v.date+'\')"/>';
    var rate=(v.totalProblems||0)>0?(v.totalCorrect||0)/v.totalProblems:0;
    var ry=top+(1-rate)*chartH;
    if(prevX!==null) line+='<line x1="'+prevX.toFixed(1)+'" y1="'+prevY.toFixed(1)+'" x2="'+cx.toFixed(1)+'" y2="'+ry.toFixed(1)+'" stroke="#5BC886" stroke-width="1.8" stroke-linecap="round"/>';
    dots+='<circle cx="'+cx.toFixed(1)+'" cy="'+ry.toFixed(1)+'" r="4" fill="#5BC886" stroke="white" stroke-width="1.5" style="cursor:pointer" onclick="window._smDD(\''+v.date+'\')"/>';
    prevX=cx;prevY=ry;
    var day=parseInt((v.date||'').split('-')[2])||0;
    var showLbl=(n<=10)||(i%Math.ceil(n/10)===0)||(i===n-1);
    if(showLbl){
      labels+='<text x="'+cx.toFixed(1)+'" y="'+(H-8).toFixed(1)+'" text-anchor="middle" font-size="9" fill="#8C8070" font-weight="600">'+day+'일</text>';
    }
  });
  var axisY=top+chartH+0.5;
  var axis='<line x1="'+pad+'" y1="'+axisY+'" x2="'+(W-pad)+'" y2="'+axisY+'" stroke="#E0DAD2" stroke-width="1"/>';
  var maxLbl='<text x="'+pad+'" y="'+(top-2)+'" font-size="8" fill="#B8AD9E" font-weight="600">최대 '+maxP+'문제</text>';
  var accLbl100='<text x="'+(W-pad)+'" y="'+(top-2)+'" font-size="8" fill="#5BC886" font-weight="700" text-anchor="end">정답률 100%</text>';
  var accLbl50='<text x="'+(W-pad)+'" y="'+(midY-2).toFixed(1)+'" font-size="7" fill="#B8AD9E" font-weight="600" text-anchor="end">50%</text>';
  var midPVal=maxP/2;
  var midPStr=(midPVal===Math.floor(midPVal))?String(midPVal):midPVal.toFixed(1);
  var midLbl='<text x="'+pad+'" y="'+(midY-2).toFixed(1)+'" font-size="7" fill="#B8AD9E" font-weight="600">'+midPStr+'문제</text>';
  var svg='<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="월별 시간 내 추이">'+refLine+axis+maxLbl+accLbl100+accLbl50+midLbl+bars+line+dots+labels+'</svg>';
  var avgP=Math.round(totalP/monthData.length);
  var acc=totalP>0?Math.round(totalC/totalP*100):0;
  var summary='<div class="sm-tg-sum">일평균 <b>'+avgP+'</b>문제 · 정답률 <b>'+acc+'</b>%</div>';
  el.innerHTML='<div class="sm-tg-title">이달의 학습 추이</div><div class="sm-tg-chart">'+svg+'</div><div class="sm-tg-legend"><span class="sm-tg-lg sm-tg-lg-b">문제 수</span><span class="sm-tg-lg sm-tg-lg-l">정답률</span></div>'+summary;
}

window._smDD=function(ds){
  var vv=_gv();var v=vv.find(function(x){return x.date===ds;});
  var el=document.getElementById('sm-ddet');
  if(!el) return;
  if(!v){el.classList.add('smh');return;}
  var d=new Date(ds+'T00:00:00');
  var dl=(d.getMonth()+1)+'월 '+d.getDate()+'일';
  el.classList.remove('smh');
  el.innerHTML='<div class="sm-dt">📅 '+dl+' 기록</div>'
    +'<div class="sm-dr"><span class="sm-dl">총 푼 문제</span><span class="sm-dv">'+v.totalProblems+'문제</span></div>'
    +'<div class="sm-dr"><span class="sm-dl">정답</span><span class="sm-dv">'+v.totalCorrect+'개 <span class="sm-db">'+(v.totalProblems>0?Math.round(v.totalCorrect/v.totalProblems*100):0)+'%</span></span></div>';
};

/* ── 마이 ── */
function _rMy(){
  var ld=null;try{ld=_LK?JSON.parse(localStorage.getItem(_LK)):null;}catch(e){}
  var em=document.getElementById('sm-my-em');
  var pv=document.getElementById('sm-my-pv');

  }
}

/* ── 초기화 ── */
var _gameViewIds=['play-view','game-view','playView','gameView','result-view','resultView','quiz-view','drag-view','fill-view','wn-view','wrong-notes-view','wrongNotesView'];
function _anyGameVisible(){
  for(var i=0;i<_gameViewIds.length;i++){
    var el=document.getElementById(_gameViewIds[i]);
    if(!el) continue;
    if(el.classList.contains('hidden')||el.classList.contains('smh')) continue;
    var cs=window.getComputedStyle(el);
    if(cs.display!=='none') return true;
  }
  return false;
}
var _smSessionActive=false;
function _syncBarToGame(){
  var _vis=_anyGameVisible();
  if(_vis){
    _showBar(false);
    if(!_smSessionActive){
      try{ _startSession(null); }catch(e){}
      _smSessionActive=true;
      setTimeout(function(){ try{ _startObserving(); }catch(e){} },150);
    }
  } else {
    _showBar(true);
    if(_smSessionActive){
      try{ _stopObserving(); }catch(e){}
      _smSessionActive=false;
    }
  }
}
setTimeout(function(){
  _showBar(true);
  if(_isLI()) _recVisit();
  _gameViewIds.forEach(function(id){
    var el=document.getElementById(id);
    if(!el) return;
    try{ new MutationObserver(_syncBarToGame).observe(el,{attributes:true,attributeFilter:['class','style']}); }catch(e){}
  });
  _syncBarToGame();
  var lbs=document.querySelectorAll('.logout-btn');
  for(var i=0;i<lbs.length;i++){
    var lb=lbs[i];
    lb.removeAttribute('onclick');
    lb.onclick=null;
    lb.addEventListener('click',function(e){
      e.preventDefault();
      e.stopImmediatePropagation();
      window._smLogout();
    },true);
  }
},250);

})();

<!-- ===== 가입 환영 팝업 ===== -->
<style>
#sm-welcome-overlay {
  position: fixed; inset: 0; z-index: 99999;
  background: rgba(0,0,0,0.45);
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
  animation: smWelcomeFade .18s ease-out;
}
@keyframes smWelcomeFade { from { opacity: 0; } to { opacity: 1; } }
@keyframes smWelcomePop  { from { transform: scale(.92); opacity: 0; } to { transform: scale(1); opacity: 1; } }
#sm-welcome-overlay .sm-welcome-card {
  background: #FFFDF8;
  border: 1.5px solid #EDE0CC;
  border-radius: 22px;
  box-shadow: 0 12px 40px rgba(0,0,0,0.22);
  padding: 32px 28px 24px;
  width: 100%; max-width: 300px;
  text-align: center;
  animation: smWelcomePop .22s cubic-bezier(.2,.8,.2,1.05);
}
#sm-welcome-overlay .sm-welcome-emoji {
  font-size: 2.75rem; margin-bottom: 10px; line-height: 1;
}
#sm-welcome-overlay .sm-welcome-title {
  font-size: 1.2rem; font-weight: 900; color: #4A4035;
  margin-bottom: 10px; letter-spacing: -0.01em;
}
#sm-welcome-overlay .sm-welcome-desc {
  font-size: 0.88rem; color: #7B6545; line-height: 1.65; margin-bottom: 22px;
}
#sm-welcome-overlay .sm-welcome-btn {
  display: block; width: 100%;
  background: #6BADE8; color: #fff;
  border: none; border-radius: 14px;
  padding: 15px 0;
  font-size: 1rem; font-weight: 700; font-family: inherit;
  cursor: pointer;
  box-shadow: 0 4px 12px rgba(107,173,232,.3);
}
#sm-welcome-overlay .sm-welcome-btn:active { transform: scale(0.98); }
</style>
<script>
(function(){
  if (window.__smWelcomeInstalled) return;
  window.__smWelcomeInstalled = true;

  function showWelcome(){
    if (document.getElementById('sm-welcome-overlay')) return;
    var ov = document.createElement('div');
    ov.id = 'sm-welcome-overlay';
    ov.innerHTML =
      '<div class="sm-welcome-card" role="dialog" aria-modal="true">' +
        '<div class="sm-welcome-emoji">🎉</div>' +
        '<div class="sm-welcome-title">가입을 환영합니다!</div>' +
        '<div class="sm-welcome-desc">지금부터 하루 동안 모든 기능을<br>무료로 이용하실 수 있어요</div>' +
        '<button type="button" class="sm-welcome-btn">시작하기</button>' +
      '</div>';
    document.body.appendChild(ov);
    function close(e){
      if (e) { try { e.preventDefault(); e.stopPropagation(); } catch(_){} }
      if (ov && ov.parentNode) ov.parentNode.removeChild(ov);
    }
    var _btn = ov.querySelector('.sm-welcome-btn');
    // click + touchend 양쪽 바인딩: dot2dot 등 landscape 앱은 document 레벨에서
    // touchstart preventDefault 를 걸어 synthetic click 이 나오지 않으므로
    // touchend 를 명시적으로 받아 팝업을 닫는다.
    ['click','touchend'].forEach(function(ev){ _btn.addEventListener(ev, close); });
    ['click','touchend'].forEach(function(ev){
      ov.addEventListener(ev, function(e){ if (e.target === ov) close(e); });
    });
  }
  window._smShowWelcome = showWelcome;

  function wrap(name){
    var fn = window[name];
    if (typeof fn !== 'function' || fn.__smWelcomeWrapped) return false;
    var wrapped = function(){
      var r = fn.apply(this, arguments);
      try { setTimeout(showWelcome, 80); } catch(e) {}
      return r;
    };
    wrapped.__smWelcomeWrapped = true;
    window[name] = wrapped;
    return true;
  }

  function wrapAll(){
    wrap('socialLogin');
    wrap('doLogin');
  }

  // Re-wrap periodically; inline patches may redefine these after us.
  wrapAll();
  var tries = 0;
  var iv = setInterval(function(){
    wrapAll();
    if (++tries > 20) clearInterval(iv);
  }, 300);
})();
</script>
